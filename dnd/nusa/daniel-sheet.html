<style id="app-styles">

:root {
  --accent: #f59e0b;
  --accent-dim: #92590a;
  --accent-glow: rgba(245, 158, 11, 0.18);

  --bg: #0e0f12;
  --bg-panel: #15171c;
  --bg-card: #1c1f26;
  --bg-hover: #242832;
  --border: #2d3139;
  --text: #e5e7eb;
  --text-dim: #9ca3af;
  --text-muted: #6b7280;
  --danger: #ef4444;
  --warn: #f59e0b;
  --info: #60a5fa;
  --necrotic: #a855f7;
  --psychic: #ec4899;
  --radiant: #fbbf24;
  --concentration: #22d3ee;
}

/* Per-character theme overrides — set on <body data-theme="..."> */
body[data-theme="green-leaf"] {
  --accent: #7ce38b;
  --accent-dim: #3f7a4a;
  --accent-glow: rgba(124, 227, 139, 0.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }
h1, h2, h3, h4 { font-weight: 600; }
a { color: var(--accent); }
.hidden { display: none !important; }

/* ============ LOADER ============ */
.loader-overlay { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: var(--bg); }
.loader-box { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 40px; text-align: center; max-width: 480px; width: 90%; }
.loader-box h1 { color: var(--accent); text-shadow: 0 0 12px var(--accent-glow); margin-bottom: 12px; }
.loader-box p { color: var(--text-dim); margin-bottom: 18px; font-size: 14px; }
.loader-actions { margin: 20px 0; }
.loader-hint { font-size: 12px; color: var(--text-muted); font-style: italic; margin-top: 12px; }

/* ============ TOP BAR ============ */
.top-bar { display: flex; flex-wrap: wrap; gap: 12px 16px; align-items: center; padding: 12px 20px; background: linear-gradient(180deg, #1a1d24 0%, #15171c 100%); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.char-identity { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1 1 260px; }
.char-thumbnail { width: 56px; height: 56px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid var(--accent-dim); background: var(--bg-card); }
.char-thumbnail img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
.thumb-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: var(--accent); background: var(--bg-card); user-select: none; }
.char-name-block { min-width: 0; flex: 1 1 auto; overflow: hidden; }
.char-name { font-size: 22px; color: var(--accent); text-shadow: 0 0 12px var(--accent-glow); letter-spacing: 0.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.char-name-block .sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.top-stats { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.top-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.stat-block { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; text-align: center; min-width: 80px; }
.stat-block .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
.stat-block .value { font-size: 20px; font-weight: 700; color: var(--text); margin-top: 2px; }
.stat-block .sub { font-size: 10px; color: var(--text-muted); }
.hp-block { min-width: 160px; }
.hp-display { display: flex; align-items: center; gap: 6px; justify-content: center; margin-top: 4px; }
.hp-display input { width: 50px; background: transparent; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 2px 4px; text-align: center; font-size: 16px; font-weight: 700; }
.hp-display #hp-max { font-size: 16px; font-weight: 700; padding: 0 6px; }
.hp-display .sep { color: var(--text-muted); }
.btn-icon { background: var(--bg-hover); border: 1px solid var(--border); color: var(--text); width: 22px; height: 22px; border-radius: 4px; cursor: pointer; font-size: 14px; line-height: 1; }
.btn-icon:hover { background: var(--accent-dim); color: var(--bg); }
.temp-hp { font-size: 11px; color: var(--info); margin-top: 2px; }
.temp-hp input { width: 40px; background: transparent; color: var(--info); border: 1px solid var(--border); border-radius: 4px; padding: 0 4px; font-size: 11px; }
.inspiration-toggle { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--warn); background: var(--bg-card); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--warn); transition: all 0.2s; }
.inspiration-toggle.active { background: var(--warn); color: var(--bg); box-shadow: 0 0 16px rgba(245, 158, 11, 0.5); }
.rest-buttons { display: flex; gap: 8px; }
.rest-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; }
.rest-btn.short { border-color: var(--info); color: var(--info); }
.rest-btn.long { border-color: var(--accent); color: var(--accent); }
.rest-btn:hover { background: var(--bg-hover); }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 16px; }
.btn-ghost:hover { color: var(--accent); border-color: var(--accent-dim); }

/* ============ ADVISORY BANNER ============ */
.advisory-banner { position: relative; margin: 8px 16px 0; padding: 10px 38px 10px 14px; border: 1px solid #b45309; border-left: 4px solid #f59e0b; background: rgba(245, 158, 11, 0.08); border-radius: 6px; font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }
.advisory-banner strong { color: #fbbf24; }
.advisory-banner .advisory-close { position: absolute; top: 4px; right: 6px; width: 22px; height: 22px; border: none; background: transparent; color: #fbbf24; font-size: 18px; line-height: 1; cursor: pointer; padding: 0; border-radius: 4px; }

/* ============ MAIN LAYOUT ============ */
.main-layout { display: grid; grid-template-columns: 300px 1fr; gap: 16px; padding: 16px; }
@media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }

.sidebar-panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
.sidebar-panel h3 { color: var(--accent); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

.ability-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.ability-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 6px; text-align: center; position: relative; }
.ability-box.prof { border-color: var(--accent-dim); }
.ability-box .name { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
.ability-box .mod { font-size: 18px; font-weight: 700; color: var(--accent); margin-top: 2px; }
.ability-box .score { font-size: 11px; color: var(--text-muted); }
.ability-box .save { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
.ability-box.prof .save { color: var(--warn); }

.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 12px; border-bottom: 1px dotted rgba(255,255,255,0.05); }
.stat-row:last-child { border-bottom: none; }
.stat-row .val { color: var(--accent); font-weight: 600; }

.skill-row { display: grid; grid-template-columns: 14px 32px 1fr auto; gap: 6px; align-items: center; padding: 3px 0; font-size: 12px; }
.skill-dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid var(--text-muted); margin: 0 auto; }
.skill-dot.prof { background: var(--accent); border-color: var(--accent); }
.skill-dot.expertise { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 2px var(--bg-panel), 0 0 0 3px var(--accent); }
.skill-abil { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
.skill-name { color: var(--text-dim); }
.skill-mod { color: var(--accent); font-weight: 600; }

/* ============ MAIN CONTENT ============ */
.main-content { min-width: 0; }
.tab-bar { display: flex; flex-wrap: wrap; gap: 4px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 4px; margin-bottom: 12px; }
.tab-btn { background: transparent; border: none; color: var(--text-dim); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
.tab-btn:hover { color: var(--text); background: var(--bg-hover); }
.tab-btn.active { background: var(--accent-dim); color: var(--text); }

.tab-content { display: none; }
.tab-content.active { display: block; }

.filter-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.chip { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); padding: 4px 12px; border-radius: 999px; font-size: 11px; cursor: pointer; transition: all 0.15s; }
.chip:hover { border-color: var(--accent-dim); color: var(--text); }
.chip.active { background: var(--accent-dim); color: var(--text); border-color: var(--accent); }

.section-head { color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }

.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; transition: border-color 0.15s; }
.card:hover { border-color: var(--accent-dim); }
.card.hidden { display: none; }

.card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
.card-title { font-size: 14px; font-weight: 600; color: var(--text); }
.card-title .sub { font-size: 11px; color: var(--text-muted); font-weight: 400; margin-left: 4px; }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; border: 1px solid transparent; }
.tag.action     { background: rgba(239, 68, 68, 0.15);  color: #fca5a5; border-color: rgba(239, 68, 68, 0.3); }
.tag.bonus      { background: rgba(96, 165, 250, 0.15); color: #93c5fd; border-color: rgba(96, 165, 250, 0.3); }
.tag.reaction   { background: rgba(168, 85, 247, 0.15); color: #c4b5fd; border-color: rgba(168, 85, 247, 0.3); }
.tag.attack     { background: rgba(245, 158, 11, 0.15); color: #fcd34d; border-color: rgba(245, 158, 11, 0.3); }
.tag.free       { background: rgba(107, 114, 128, 0.15); color: var(--text-dim); border-color: rgba(107, 114, 128, 0.3); }
.tag.limited    { background: rgba(239, 68, 68, 0.12);  color: #fca5a5; border-color: rgba(239, 68, 68, 0.25); }
.tag.class      { background: rgba(245, 158, 11, 0.15); color: #fcd34d; }
.tag.subclass   { background: rgba(34, 211, 238, 0.15); color: #67e8f9; }
.tag.species    { background: rgba(168, 85, 247, 0.15); color: #c4b5fd; }
.tag.background { background: rgba(124, 227, 139, 0.15); color: #86efac; }
.tag.feat       { background: rgba(236, 72, 153, 0.15); color: #f9a8d4; }
.tag.cantrip    { background: rgba(99, 102, 241, 0.15);  color: #a5b4fc; border-color: rgba(99,102,241,0.3); }
.tag.lvl1       { background: rgba(34, 211, 238, 0.12);  color: #67e8f9; border-color: rgba(34,211,238,0.25); }
.tag.lvl2       { background: rgba(124, 58, 237, 0.15);  color: #c4b5fd; border-color: rgba(124,58,237,0.3); }
.tag.lvl3       { background: rgba(236, 72, 153, 0.15);  color: #f9a8d4; border-color: rgba(236,72,153,0.3); }
.tag.conc       { background: rgba(34, 211, 238, 0.15);  color: var(--concentration); border-color: rgba(34,211,238,0.4); }
.tag.ritual     { background: rgba(168, 85, 247, 0.12);  color: #c4b5fd; border-color: rgba(168,85,247,0.3); }
.tag.circle     { background: rgba(124, 227, 139, 0.15); color: #86efac; border-color: rgba(124,227,139,0.3); }

.card-stats { display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; color: var(--text-dim); padding: 6px 0; border-bottom: 1px dotted rgba(255,255,255,0.05); margin-bottom: 8px; }
.card-stats strong { color: var(--text); }
.card-body { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
.card-body p { margin-bottom: 6px; }
.card-body em { color: var(--text-muted); font-style: italic; }
.card-body strong { color: var(--text); }
.damage { color: var(--warn); font-weight: 600; }

.section-head.empty { display: none; }

/* Inline resource pips on action cards */
.card-resource { display: flex; align-items: center; gap: 10px; margin-top: 8px; padding-top: 8px; border-top: 1px dotted rgba(255,255,255,0.05); font-size: 11px; color: var(--text-dim); flex-wrap: wrap; }
.card-resource-label { font-weight: 600; color: var(--text); }
.card-resource-count { color: var(--accent); font-weight: 700; }
.card-resource .pips { gap: 4px; }
.pip.pip-sm { width: 15px; height: 15px; border-width: 2px; }

/* ============ OVERVIEW ============ */
.overview-simple { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.overview-portrait { float: right; width: 420px; max-width: 50%; margin: 0 0 14px 20px; border-radius: 8px; border: 2px solid var(--accent-dim); cursor: pointer; }
@media (max-width: 700px) { .overview-portrait { float: none; display: block; margin: 0 auto 14px; max-width: 85%; width: auto; } }
.overview-display-name { font-size: 26px; color: var(--accent); text-shadow: 0 0 12px var(--accent-glow); margin-bottom: 4px; }
.overview-subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }
.overview-section-head { color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin: 14px 0 8px; }
.overview-body p { margin-bottom: 10px; color: var(--text-dim); font-size: 14px; line-height: 1.7; }
.overview-body p:first-of-type::first-letter { color: var(--accent); font-size: 1.5em; font-weight: 700; }

/* ============ RESOURCES / PIPS ============ */
.pip-row { display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
.pip-label { font-size: 14px; font-weight: 600; color: var(--text); }
.pip-sub { display: block; font-size: 11px; color: var(--text-muted); font-weight: 400; margin-top: 2px; }
.pips { display: flex; flex-wrap: wrap; gap: 6px; }
.pip { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--accent-dim); background: transparent; cursor: pointer; transition: all 0.15s; }
.pip:hover { border-color: var(--accent); }
.pip.used { background: var(--accent-dim); }
.pip.ki { border-color: var(--warn); }
.pip.ki.used { background: var(--warn); }
.pip.radiant { border-color: var(--danger); }
.pip.radiant.used { background: var(--danger); }
.pip.slot { border-color: var(--info); }
.pip.slot.used { background: var(--info); }
.pip.luck { border-color: var(--warn); }
.pip.luck.used { background: var(--warn); }
.pip.witch { border-color: var(--necrotic); }
.pip.witch.used { background: var(--necrotic); }
.placeholder-note { font-size: 12px; color: var(--text-muted); font-style: italic; padding: 6px 14px 0; margin-bottom: 8px; }

/* ============ FORM CARDS ============ */
.card.form-card { border-left: 4px solid var(--radiant); }

/* ============ SELAK FORMS (custom tab) ============ */
.selak-intro { background: var(--bg-card); border: 1px solid var(--accent-dim); border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 12px; color: var(--text-dim); line-height: 1.7; }
.selak-intro strong { color: var(--accent); }
.selak-form { background: var(--bg-card); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 8px; padding: 16px; margin-bottom: 14px; }
.selak-form.ekek   { border-left-color: var(--danger); }
.selak-form.cahaya { border-left-color: var(--info); }
.selak-form.leyak  { border-left-color: var(--necrotic); }
.selak-form h3 { color: var(--accent); font-size: 15px; margin-bottom: 4px; }
.selak-form h3 .marker { margin-right: 6px; color: var(--warn); }
.selak-form h3 .subtitle { font-size: 12px; color: var(--text-dim); font-weight: 400; margin-left: 6px; }
.selak-form .tagline { font-size: 12px; color: var(--text-dim); font-style: italic; margin-bottom: 10px; }
.selak-form p { margin-bottom: 6px; font-size: 13px; color: var(--text-dim); line-height: 1.6; }
.selak-form p strong { color: var(--text); }

/* ============ PLAYSTYLE STANCES ============ */
.stance-block { background: var(--bg-card); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 8px; padding: 16px; margin-bottom: 14px; background-image: linear-gradient(135deg, rgba(245, 158, 11, 0.04) 0%, transparent 40%); }
.stance-block.inactive { border-left-color: var(--border); }
.stance-block h3 { color: var(--accent); font-size: 15px; margin-bottom: 4px; }
.stance-block .tagline { font-size: 12px; color: var(--text-dim); font-style: italic; margin-bottom: 10px; }
.stat-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.stat-pill { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px; font-size: 11px; color: var(--text-dim); }
.stat-pill strong { color: var(--accent); margin-right: 4px; }
.quote { background: rgba(245, 158, 11, 0.05); border-left: 3px solid var(--accent-dim); padding: 10px 14px; margin: 10px 0; font-style: italic; color: var(--text-dim); font-size: 13px; border-radius: 4px; }

/* ============ INVENTORY ============ */
.inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; margin-bottom: 14px; }
.item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
.item-name { font-weight: 600; color: var(--text); margin-bottom: 4px; font-size: 13px; }
.item-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

/* ============ BACKGROUND / NOTES ============ */
.bg-section { margin-bottom: 14px; }
.backstory-area { width: 100%; min-height: 200px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 6px; font-family: inherit; font-size: 13px; line-height: 1.6; resize: vertical; }
.notes-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 11px; color: var(--text-muted); }
.backstory-prose { font-size: 14px; line-height: 1.75; color: var(--text-dim); max-width: 72ch; }
.backstory-prose p { margin-bottom: 12px; }
.backstory-prose p:first-of-type::first-letter { color: var(--accent); font-size: 1.5em; font-weight: 700; }

/* ============ NOTES (markdown) ============ */
.notes-mode-toggle { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; }
.notes-preview { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 14px 18px; min-height: 240px; font-size: 13px; color: var(--text-dim); line-height: 1.65; }
.notes-preview h1, .notes-preview h2, .notes-preview h3, .notes-preview h4, .notes-preview h5, .notes-preview h6 { color: var(--accent); margin: 12px 0 6px; font-weight: 700; }
.notes-preview h1 { font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.notes-preview h2 { font-size: 16px; }
.notes-preview h3 { font-size: 14px; }
.notes-preview h4, .notes-preview h5, .notes-preview h6 { font-size: 13px; }
.notes-preview p { margin-bottom: 8px; }
.notes-preview ul, .notes-preview ol { margin: 4px 0 10px 22px; }
.notes-preview li { margin-bottom: 3px; }
.notes-preview code { background: var(--bg-panel); padding: 1px 5px; border-radius: 3px; font-family: ui-monospace, "Cascadia Code", Consolas, monospace; font-size: 12px; color: var(--info); }
.notes-preview pre { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 4px; padding: 10px 14px; overflow-x: auto; margin: 8px 0; font-size: 12px; }
.notes-preview pre code { background: transparent; padding: 0; color: var(--text); font-size: 12px; }
.notes-preview blockquote { border-left: 3px solid var(--accent-dim); padding: 4px 12px; margin: 8px 0; color: var(--text-muted); font-style: italic; }
.notes-preview hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
.notes-preview a { color: var(--accent); text-decoration: underline; }
.notes-preview strong { color: var(--text); font-weight: 700; }
.notes-preview em { color: var(--text-dim); font-style: italic; }

/* ============ MODALS ============ */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; }
.modal-overlay.active { display: flex; }
.modal { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 10px; padding: 20px; max-width: 420px; width: 90%; }
.modal h2 { color: var(--accent); margin-bottom: 12px; font-size: 16px; }
.modal p { color: var(--text-dim); margin-bottom: 14px; font-size: 13px; }
.modal ul { list-style: none; padding: 0; margin-bottom: 14px; }
.modal li { padding: 4px 0; font-size: 12px; color: var(--text-dim); border-bottom: 1px dotted rgba(255,255,255,0.05); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
.btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.btn:hover { background: var(--bg-hover); }
.btn-primary { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }
.btn-primary:hover { background: var(--accent); color: var(--bg); }

/* ============ SPELL UPCAST + CAST BUTTONS ============ */
.spell-upcast { margin-top: 4px; padding: 6px 10px; background: rgba(96, 165, 250, 0.06); border-left: 3px solid var(--info); font-size: 12px; color: var(--text-dim); border-radius: 3px; line-height: 1.5; }
.spell-upcast strong { color: var(--info); margin-right: 4px; }
.cast-row { display: flex; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px dotted rgba(255,255,255,0.05); flex-wrap: wrap; align-items: center; }
.cast-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-right: 4px; }
.btn-cast { background: transparent; border: 1px solid var(--accent-dim); color: var(--accent); padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; letter-spacing: 0.3px; transition: all 0.15s; }
.btn-cast:hover:not(:disabled) { background: var(--accent-dim); color: var(--text); }
.btn-cast.base { background: var(--accent-dim); color: var(--text); }
.btn-cast.base:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
.btn-cast:disabled { opacity: 0.35; cursor: not-allowed; }

/* ============ LIGHTBOX ============ */
.lightbox-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
.lightbox-overlay.active { display: flex; }
.lightbox-overlay img { max-width: 100%; max-height: 100%; border-radius: 8px; }

/* ============ DRAG-DROP PORTRAIT TARGETS ============ */
[data-portrait-target] { position: relative; transition: box-shadow 0.15s, outline 0.15s; }
[data-portrait-target].drag-over { outline: 3px dashed var(--accent); outline-offset: 3px; box-shadow: 0 0 20px var(--accent-glow); }
[data-portrait-target].drag-over::after { content: "Drop to replace"; position: absolute; inset: 0; background: rgba(0,0,0,0.55); color: var(--accent); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; border-radius: inherit; text-align: center; padding: 4px; letter-spacing: 0.5px; pointer-events: none; z-index: 4; }
.portrait-replace-btn { background: rgba(0,0,0,0.72); color: var(--accent); border: 1px solid var(--accent-dim); border-radius: 4px; font-weight: 700; cursor: pointer; transition: opacity 0.15s, background 0.15s; letter-spacing: 0.3px; }
.portrait-replace-btn:hover { background: var(--accent-dim); color: var(--text); }
/* Thumbnail (top bar): tiny overlay at the corner, only visible on hover */
.char-thumbnail .portrait-replace-btn { position: absolute; bottom: -4px; right: -4px; padding: 2px 6px; font-size: 9px; text-transform: uppercase; opacity: 0; z-index: 5; }
.char-thumbnail:hover .portrait-replace-btn { opacity: 1; }
/* Overview: small centered button sitting directly below the portrait, inside the same float */
.overview-portrait-wrap { float: right; width: 420px; max-width: 50%; margin: 0 0 14px 20px; text-align: center; }
@media (max-width: 700px) { .overview-portrait-wrap { float: none; margin: 0 auto 14px; width: auto; max-width: 85%; } }
.overview-portrait-wrap .overview-portrait { width: 100%; max-width: 100%; margin: 0; float: none; display: block; }
.overview-portrait-wrap .portrait-replace-btn { position: static; display: inline-block; margin-top: 6px; padding: 3px 12px; font-size: 10px; text-transform: uppercase; opacity: 0.5; }
.overview-portrait-wrap:hover .portrait-replace-btn { opacity: 1; }

/* ============ TOAST ============ */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--bg-panel); border: 1px solid var(--accent-dim); color: var(--text); padding: 10px 16px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 3000; box-shadow: 0 4px 16px rgba(0,0,0,0.5); pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { border-color: var(--danger); }

/* ============ PLAY-STATE BAR ============ */
#play-state-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; padding: 10px 20px; background: linear-gradient(180deg, rgba(245,158,11,0.04) 0%, transparent 100%); border-bottom: 1px solid var(--border); font-size: 12px; }
.play-section { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.play-label { color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-size: 10px; font-weight: 700; }
.btn-xs { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); padding: 3px 8px; border-radius: 999px; font-size: 10px; cursor: pointer; font-weight: 600; }
.btn-xs:hover { border-color: var(--accent-dim); color: var(--text); }
.btn-xs.disabled, .btn-xs:disabled { opacity: 0.4; cursor: not-allowed; }

/* Conditions */
.conditions-list { display: flex; flex-wrap: wrap; gap: 4px; }
.condition-pill { background: rgba(168, 85, 247, 0.15); border: 1px solid rgba(168, 85, 247, 0.4); color: #c4b5fd; padding: 2px 4px 2px 9px; border-radius: 999px; display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; }
.condition-pill button { background: none; border: none; color: inherit; cursor: pointer; padding: 0 4px; font-size: 13px; line-height: 1; opacity: 0.7; }
.condition-pill button:hover { opacity: 1; }
.condition-pill em { font-style: italic; opacity: 0.85; font-weight: 400; margin-left: 2px; }
.conditions-list:empty::before { content: "— none —"; color: var(--text-muted); font-style: italic; font-size: 11px; }

/* Condition menu */
.condition-menu { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); padding: 6px; z-index: 2500; min-width: 220px; max-height: 70vh; overflow-y: auto; }
.condition-menu-header { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 6px 10px; font-weight: 700; }
.condition-option { padding: 6px 10px; font-size: 13px; cursor: pointer; border-radius: 4px; color: var(--text); }
.condition-option:hover { background: var(--bg-hover); color: var(--accent); }
.condition-option.selected { background: var(--accent-dim); color: var(--text); }
.condition-menu-divider { height: 1px; background: var(--border); margin: 4px 0; }
.condition-custom { display: flex; gap: 4px; padding: 6px 10px; }
.condition-custom input { flex: 1; background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; font-size: 12px; font-family: inherit; }
.condition-custom button { background: var(--accent-dim); border: 1px solid var(--accent); color: var(--text); padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }

/* Concentration */
.concentration-pill { background: rgba(34, 211, 238, 0.15); border: 1px solid rgba(34, 211, 238, 0.4); color: var(--concentration); padding: 2px 4px 2px 9px; border-radius: 999px; display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; }
.concentration-pill button { background: none; border: none; color: inherit; cursor: pointer; padding: 0 4px; font-size: 13px; line-height: 1; opacity: 0.7; }
.concentration-pill button:hover { opacity: 1; }
.card-conc-toggle { margin-top: 8px; padding-top: 6px; border-top: 1px dotted rgba(255,255,255,0.05); }
.card-conc-toggle .btn-xs.active { background: rgba(34, 211, 238, 0.15); border-color: var(--concentration); color: var(--concentration); }
.card.spell-card.is-concentrating { border-color: var(--concentration); box-shadow: 0 0 0 1px var(--concentration), 0 0 12px rgba(34, 211, 238, 0.12); }

/* Death saves */
.death-saves-section { padding: 2px 10px; background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; }
.ds-pips { display: inline-flex; gap: 4px; align-items: center; }
.ds-pip { width: 14px; height: 14px; border-radius: 50%; border: 2px solid; display: inline-block; cursor: pointer; box-sizing: border-box; transition: all 0.15s; }
.ds-pip.success { border-color: #22c55e; }
.ds-pip.success.used { background: #22c55e; }
.ds-pip.failure { border-color: var(--danger); }
.ds-pip.failure.used { background: var(--danger); }
.ds-pip:hover { transform: scale(1.1); }
.ds-sep { color: var(--text-muted); padding: 0 4px; }
.ds-status { font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.5px; }
.ds-status.stable { background: rgba(34, 197, 94, 0.15); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.4); }
.ds-status.dead   { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.5); }

/* Exhaustion */
.exhaustion-section .ex-stepper { display: inline-flex; align-items: center; gap: 4px; }
.ex-stepper button { width: 22px; height: 22px; background: var(--bg-hover); border: 1px solid var(--border); color: var(--text); border-radius: 4px; cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
.ex-stepper button:disabled { opacity: 0.3; cursor: not-allowed; }
.ex-value { font-weight: 700; min-width: 16px; text-align: center; color: var(--text); }
.ex-penalty { color: var(--text-dim); font-size: 11px; font-style: italic; }
.exhaustion-section.warn .ex-value { color: var(--warn); }
.exhaustion-section.warn .ex-penalty { color: var(--warn); }
.exhaustion-section.danger .ex-value,
.exhaustion-section.danger .ex-penalty { color: var(--danger); }
.exhaustion-section.critical { background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.4); border-radius: 8px; padding: 2px 10px; }
.exhaustion-section.critical .ex-value,
.exhaustion-section.critical .ex-penalty { color: var(--danger); font-weight: 700; }

</style>
</head>

<div id="app" class="hidden">
  <div class="top-bar">
    <div class="char-identity">
      <div class="char-thumbnail" id="char-thumbnail-wrap" data-portrait-target="thumbnail" title="Drag an image here to replace the thumbnail"></div>
      <div class="char-name-block">
        <div class="char-name" id="char-name"></div>
        <div class="sub" id="char-subtitle"></div>
      </div>
    </div>
    <div class="top-stats">
      <div class="stat-block hp-block">
        <div class="label">Hit Points</div>
        <div class="hp-display">
          <button class="btn-icon" onclick="adjustHP(-1)">&minus;</button>
          <input type="number" id="hp-current">
          <span class="sep">/</span>
          <span id="hp-max"></span>
          <button class="btn-icon" onclick="adjustHP(1)">+</button>
        </div>
        <div class="temp-hp">Temp: <input type="number" id="hp-temp"></div>
      </div>
      <div class="stat-block"><div class="label">AC</div><div class="value" id="ac-value"></div><div class="sub" id="ac-source"></div></div>
      <div class="stat-block"><div class="label">Initiative</div><div class="value" id="initiative-value"></div></div>
      <div class="inspiration-toggle" id="inspiration-toggle" onclick="toggleInspiration()" title="Inspiration">&starf;</div>
    </div>
    <div class="top-actions">
      <div class="rest-buttons">
        <button class="rest-btn short" onclick="openRest('short')">Short Rest</button>
        <button class="rest-btn long" onclick="openRest('long')">Long Rest</button>
      </div>
      <button class="btn-ghost" onclick="saveSessionState()" title="Save session backup (character + state) to a JSON file">&#x1F4BE;</button>
      <button class="btn-ghost" onclick="openSessionImportPicker()" title="Import a saved session backup">&#x1F4E4;</button>
    </div>
  </div>
  <div id="advisory-banners"></div>
  <div id="play-state-bar" class="hidden"></div>
  <div id="play-state-bar" class="hidden"></div>
  <div class="main-layout">
    <aside>
      <div class="sidebar-panel"><h3>Ability Scores</h3><div class="ability-grid" id="ability-grid"></div></div>
      <div class="sidebar-panel"><h3>Combat</h3><div id="combat-stats"></div></div>
      <div class="sidebar-panel"><h3>Skills</h3><div id="skills-list"></div></div>
      <div class="sidebar-panel"><h3>Proficiencies</h3><div id="proficiencies-list"></div></div>
      <div class="sidebar-panel"><h3>Languages</h3><div id="languages-list"></div></div>
    </aside>
    <main class="main-content"><div class="tab-bar" id="tab-bar"></div><div id="tab-contents"></div></main>
  </div>
</div>
<div class="modal-overlay" id="rest-modal">
  <div class="modal">
    <h2 id="rest-title">Take a Rest?</h2>
    <p id="rest-desc"></p>
    <div id="rest-list"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeRest()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmRest()">Confirm</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="hit-die-modal">
  <div class="modal">
    <h2>Spend Hit Die</h2>
    <p id="hit-die-desc"></p>
    <div style="margin-bottom:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <label style="font-size:13px;color:var(--text-dim);">Rolled:</label>
      <input type="number" id="hit-die-roll" min="1" style="width:70px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:4px;font-size:14px;text-align:center;">
      <span id="hit-die-total" style="color:var(--accent);font-weight:700;"></span>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeHitDieModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmHitDieSpend()">Spend</button>
    </div>
  </div>
</div>
<div class="lightbox-overlay" id="lightbox" onclick="closeLightbox(event)">
  <img id="lightbox-img" alt="">
</div>

,"level":2},"categories":["free"],"passive":true,"text":"While wearing armor, +1 bonus to AC. Already included in AC 19."},{"kind":"feature","id":"paladin.divineSmite","name":"Divine Smite (declare on hit)","subtitle":"Paladin 2 · no action · spell-slot fueled","source":{"type":"class","name":"Paladin","level":2},"categories":["free"],"text":"When you hit with a melee weapon attack, you can expend a paladin spell slot to deal extra Radiant damage to the target. 1st-level slot: 2d8. 2nd-level slot: 3d8. (3rd: 4d8, 4th: 5d8 cap — future.) +1d8 if target is a Fiend or Undead (cap 6d8). No action; declared after seeing the d20 result. Stacks with Necrotic Shroud's once-per-turn rider on the same hit."},{"kind":"trait","id":"paladin.divineHealth","name":"Divine Health","subtitle":"Paladin 3","source":{"type":"class","name":"Paladin","level":3},"categories":["free"],"passive":true,"text":"Immune to disease."},{"kind":"feature","id":"paladin.channelDivinity","name":"Channel Divinity (general)","subtitle":"Paladin 3 · 1/SR · DC 15","source":{"type":"class","name":"Paladin","level":3},"categories":[],"text":"Your oath allows you to channel divine energy. 1 use per Short or Long Rest. Save DC 15 (8 + PB + CHA). Options for Oathbreaker: Control Undead, Dreadful Aspect. Note: 'Harness Divine Power' (Tasha's optional class feature) is NOT base 2014 — confirm with DM whether it's in play."},{"kind":"feature","id":"paladin.extraAttack","name":"Extra Attack","subtitle":"Paladin 5","source":{"type":"class","name":"Paladin","level":5},"categories":[],"text":"Attack twice instead of once when you take the Attack action."},{"kind":"feature","id":"subclass.oathbreaker.oathSpells","name":"Oath Spells","subtitle":"Oathbreaker · always prepared","source":{"type":"subclass","name":"Oathbreaker","level":3},"categories":[],"tags":["Always Prepared"],"text":"Always prepared, don't count against your prepared limit. Paladin Lv 3: Hellish Rebuke, Inflict Wounds. Lv 5: Crown of Madness, Darkness. Lv 9: Animate Dead, Bestow Curse (future). Lv 13: Blight, Confusion (future). Lv 17: Contagion, Dominate Person (future)."},{"kind":"action","id":"subclass.oathbreaker.controlUndead","name":"Channel Divinity: Control Undead","subtitle":"Oathbreaker · 1 action · 30 ft · CR ≤ 5","source":{"type":"subclass","name":"Oathbreaker","level":3},"categories":["action","limited"],"actionType":"action","tags":["1/SR"],"uses":{"consumes":{"resourceId":"paladin.channelDivinity","amount":1}},"save":{"ability":"WIS","dc":"=spellSaveDC","effect":"obey your commands for 24 hours (or until you use this option again)"},"text":"Target one Undead within 30 ft you can see. WIS save DC 15 or charmed/obedient for 24 hours. Undead with CR ≥ your Paladin level (5) are immune."},{"kind":"action","id":"subclass.oathbreaker.dreadfulAspect","name":"Channel Divinity: Dreadful Aspect","subtitle":"Oathbreaker · 1 action · 30 ft · 1 min","source":{"type":"subclass","name":"Oathbreaker","level":3},"categories":["action","limited"],"actionType":"action","tags":["1/SR"],"uses":{"consumes":{"resourceId":"paladin.channelDivinity","amount":1}},"save":{"ability":"WIS","dc":"=spellSaveDC","effect":"Frightened of you for 1 minute"},"text":"Each chosen creature within 30 ft that can see you saves vs WIS DC 15 or is Frightened of you for 1 min. A frightened creature ending its turn more than 30 ft away can repeat the save to end the effect on itself."},{"kind":"feature","id":"subclass.oathbreaker.auraOfHate","name":"Aura of Hate (Lv 7) — not yet active","subtitle":"Oathbreaker 7 (future)","source":{"type":"subclass","name":"Oathbreaker","level":7},"categories":[],"tags":["Lv 7+"],"text":"You and any Fiends and Undead within 10 ft (30 ft at Lv 18) gain a bonus to melee weapon damage rolls equal to your CHA mod (min +1). Active while conscious."},{"kind":"feature","id":"species.aasimar.traits","name":"Aasimar Traits (Volo's)","source":{"type":"species","name":"Aasimar","level":1},"categories":[],"text":"Creature Type: Humanoid. Size: Medium. Base Speed: 30 ft. Darkvision 60 ft. Celestial Resistance (Necrotic + Radiant). Healing Hands (action, touch, heal HP = level, 1/LR). Light Bearer (Light cantrip; CHA spellcasting). Languages: Common, Celestial. ASI: +2 CHA (base) + 1 STR (Fallen subrace)."},{"kind":"trait","id":"species.aasimar.darkvision","name":"Darkvision 60 ft","subtitle":"Aasimar","source":{"type":"species","name":"Aasimar","level":1},"categories":["free"],"passive":true,"text":"See in dim light within 60 ft as if bright light, and in darkness as if dim light. Greyscale only."},{"kind":"trait","id":"species.aasimar.celestialResistance","name":"Celestial Resistance","subtitle":"Aasimar","source":{"type":"species","name":"Aasimar","level":1},"categories":["free"],"passive":true,"text":"Resistance to Necrotic damage and Radiant damage."},{"kind":"action","id":"species.aasimar.healingHands","name":"Healing Hands","subtitle":"Aasimar · 1/LR · action · touch","source":{"type":"species","name":"Aasimar","level":1},"categories":["action","limited"],"actionType":"action","tags":["1/LR"],"uses":{"consumes":{"resourceId":"aasimar.healingHands","amount":1}},"heal":{"flat":5,"note":"= character level"},"text":"Action, touch a creature; it regains 5 HP (= character level)."},{"kind":"trait","id":"species.aasimar.lightBearer","name":"Light Bearer","subtitle":"Aasimar","source":{"type":"species","name":"Aasimar","level":1},"categories":[],"passive":true,"text":"You know the Light cantrip. Charisma is your spellcasting ability for it."},{"kind":"form","id":"species.aasimar.necroticShroud","name":"Necrotic Shroud","subtitle":"Fallen Aasimar 3 · 1/LR","source":{"type":"species","name":"Aasimar (Fallen)","level":3},"categories":["action","limited"],"entry":{"actionType":"action","consumes":{"resourceId":"aasimar.necroticShroud","amount":1},"earlyExit":"bonus action on a later turn"},"duration":"1 minute","tags":["1/LR"],"save":{"ability":"CHA","dc":"=spellSaveDC","effect":"Frightened of you until end of your next turn (on transform only)"},"grants":{"riders":[{"trigger":"oncePerTurnOnAttackOrDamagingSpell","damage":{"bonus":5,"type":"necrotic"},"text":"Once on each of your turns, when you deal damage to a creature with an attack or a spell, deal +5 Necrotic damage (= character level)."}]},"text":"Action; eyes turn into pools of darkness and two skeletal, ghostly, flightless wings sprout from your back (no fly speed). On activation: each creature within 10 ft other than you that can see you saves vs CHA DC 15 or is Frightened of you until the end of your next turn. Lasts 1 minute or end as a bonus action. Stacks with Divine Smite on the same hit (smite = once per slot, shroud = once per turn — both can apply to one attack)."},{"kind":"feature","id":"background.knightOfTheOrder","name":"Knightly Regard","subtitle":"Knight of the Order (SCAG)","source":{"type":"background","name":"Knight of the Order","level":1},"categories":[],"text":"You receive shelter and succor from members of your knightly order and those sympathetic to its aims. Fellow knights provide lodging and food when needed and pay for your funeral if necessary. High-ranking members may grant you an audience. Sworn enemies of your order may end up in your way. Specific order TBD with DM (Silver Chalice, Order of the Gauntlet, Knights of Samular, etc.)."},{"kind":"feature","id":"feat.slasher","name":"Slasher","subtitle":"Level 4 ASI · Tasha's Cauldron of Everything","source":{"type":"feat","name":"Slasher","level":4},"categories":[],"text":"+1 to STR or DEX (max 20). Slowing Strike (1/turn): when you hit a creature with an attack that deals slashing damage, reduce its Speed by 10 ft until the start of your next turn. Critical Wound: when you score a critical hit dealing slashing damage, the target has Disadvantage on attack rolls until the start of your next turn."},{"kind":"trait","id":"feat.slasher.passive","name":"Slasher (always-on weapon rider)","subtitle":"Feat passive","source":{"type":"feat","name":"Slasher","level":4},"categories":["free"],"passive":true,"text":"On a slashing hit (1/turn): target's Speed −10 ft until start of your next turn. On a slashing critical hit: target has Disadvantage on attack rolls until start of your next turn."},{"kind":"action","id":"weapon.longsword","name":"Longsword","subtitle":"martial · versatile · ×2 via Extra Attack","categories":["action","attack"],"actionType":"action","itemRef":"inv.longsword","attack":{"ability":"STR","toHit":"+7","reach":"5 ft","type":"melee weapon attack"},"damage":"1d8 + 4 Slashing (1H) / 1d10 + 4 Slashing (versatile, 2H)","properties":["Versatile"],"text":"Take Attack action to swing twice (Extra Attack, Lv 5). Slasher rider applies on slashing hits (Speed −10 ft, 1/turn) and crits (Disadvantage on attacks). Smite on hit: expend a 1st-level slot for +2d8 Radiant or 2nd-level slot for +3d8 Radiant (+1d8 vs Fiend/Undead)."},{"kind":"action","id":"universal.opportunityAttack","name":"Opportunity Attack","categories":["reaction"],"actionType":"reaction","text":"When a creature leaves your reach without Disengaging, make one melee weapon attack against it. Longsword: +7 to hit, 1d8 + 4 Slashing."},{"kind":"spell","id":"spell.light","name":"Light","subtitle":"Aasimar Light Bearer · CHA spellcasting","spellLevel":0,"school":"Evocation","source":{"type":"species","name":"Aasimar (Light Bearer)","level":1},"castingTime":"action","range":"Touch","components":{"v":true,"m":"a firefly or phosphorescent moss"},"duration":"1 hour","categories":["action"],"actionType":"action","tags":["Cantrip"],"alwaysPrepared":true,"text":"Touch one object no larger than 10 ft in any dimension. Until the spell ends, the object sheds bright light in a 20-ft radius and dim light for an additional 20 ft. Color of your choice. Covering the object opaquely blocks the light. If you target an object held or worn by a hostile creature, that creature must succeed on a DEX save (DC 15) to avoid the spell. Ends if you cast it again or dismiss it as an action."},{"kind":"spell","id":"spell.hellishRebuke","name":"Hellish Rebuke","subtitle":"Oath spell — always prepared","spellLevel":1,"school":"Evocation","source":{"type":"subclass","name":"Oathbreaker (oath spell)","level":3},"castingTime":"1 reaction, when you take damage from a creature within 60 ft that you can see","range":"60 ft","components":{"v":true,"s":true},"duration":"Instantaneous","categories":["reaction"],"actionType":"reaction","tags":["Always Prepared","Oath"],"alwaysPrepared":true,"save":{"ability":"DEX","dc":"=spellSaveDC","effect":"2d10 Fire on fail, half on success"},"upcast":"+1d10 per slot level above 1st (3d10 at 2nd-level slot).","text":"Trigger: when damaged by a visible creature within 60 ft. The creature is surrounded by hellish flames; DEX save DC 15 or 2d10 Fire (half on success)."},{"kind":"spell","id":"spell.inflictWounds","name":"Inflict Wounds","subtitle":"Oath spell — always prepared","spellLevel":1,"school":"Necromancy","source":{"type":"subclass","name":"Oathbreaker (oath spell)","level":3},"castingTime":"action","range":"Touch","components":{"v":true,"s":true},"duration":"Instantaneous","categories":["action","attack"],"actionType":"action","tags":["Always Prepared","Oath"],"alwaysPrepared":true,"attack":{"ability":"CHA","toHit":"=spellAttack","reach":"5 ft","type":"melee spell attack"},"damage":"3d10 Necrotic","upcast":"+1d10 per slot level above 1st (4d10 at 2nd-level slot).","text":"Make a melee spell attack at +7. On a hit, the target takes 3d10 Necrotic damage."},{"kind":"spell","id":"spell.bless","name":"Bless","spellLevel":1,"school":"Enchantment","castingTime":"action","range":"30 ft","components":{"v":true,"s":true,"m":"a sprinkling of holy water"},"duration":"Concentration, 1 min","concentration":true,"categories":["action"],"actionType":"action","tags":["Prepared"],"prepared":true,"upcast":"+1 additional target per slot level above 1st.","text":"Bless up to 3 creatures of your choice within range. Whenever a target makes an attack roll or a saving throw before the spell ends, it can roll a d4 and add the result to the roll."},{"kind":"spell","id":"spell.cureWounds","name":"Cure Wounds","spellLevel":1,"school":"Evocation","castingTime":"action","range":"Touch","components":{"v":true,"s":true},"duration":"Instantaneous","categories":["action"],"actionType":"action","tags":["Prepared"],"prepared":true,"upcast":"+1d8 healing per slot level above 1st (2d8 + 4 at 2nd-level slot).","text":"A creature you touch regains 1d8 + 4 HP. No effect on Undead or Constructs. (2014 RAW: 1d8 + spellcasting mod — NOT the 2024 PHB's 2d8 baseline.)"},{"kind":"spell","id":"spell.thunderousSmite","name":"Thunderous Smite","spellLevel":1,"school":"Evocation","castingTime":"bonus","range":"Self","components":{"v":true},"duration":"Concentration, 1 min","concentration":true,"categories":["bonus"],"actionType":"bonus","tags":["Prepared","Smite"],"prepared":true,"save":{"ability":"STR","dc":"=spellSaveDC","effect":"pushed 10 ft and knocked Prone"},"text":"The first time you hit with a melee weapon attack during this spell's duration, +2d6 Thunder damage (audible 300 ft). If the target is a creature: STR save DC 15 or pushed 10 ft away and knocked Prone."},{"kind":"spell","id":"spell.detectEvilAndGood","name":"Detect Evil and Good","spellLevel":1,"school":"Divination","castingTime":"action","range":"Self","components":{"v":true,"s":true},"duration":"Concentration, 10 min","concentration":true,"categories":["action"],"actionType":"action","tags":["Prepared"],"prepared":true,"text":"For the duration, you know if there's an Aberration, Celestial, Elemental, Fey, Fiend, or Undead within 30 ft, and where the creature is located. Also detects places or objects within 30 ft that have been magically consecrated or desecrated. Blocked by 1 ft of stone, 1 inch of common metal, a thin sheet of lead, or 3 ft of wood/dirt. Note: does NOT detect alignment ('good' or 'evil') — only the listed creature types."},{"kind":"spell","id":"spell.crownOfMadness","name":"Crown of Madness","subtitle":"Oath spell — always prepared","spellLevel":2,"school":"Enchantment","source":{"type":"subclass","name":"Oathbreaker (oath spell)","level":5},"castingTime":"action","range":"120 ft","components":{"v":true,"s":true},"duration":"Concentration, 1 min","concentration":true,"categories":["action"],"actionType":"action","tags":["Always Prepared","Oath"],"alwaysPrepared":true,"save":{"ability":"WIS","dc":"=spellSaveDC","effect":"Charmed and forced to make a melee attack each turn against a target you choose"},"text":"One Humanoid you can see within range; WIS save DC 15 or Charmed for the duration. A twisted iron crown appears on its head. While charmed, the target must use its action before moving on each of its turns to make a melee attack against a creature (other than itself) that you mentally choose. You must use your action each turn to maintain control or the spell ends. Target re-saves WIS at end of each of its turns to break free."},{"kind":"spell","id":"spell.darkness","name":"Darkness","subtitle":"Oath spell — always prepared","spellLevel":2,"school":"Evocation","source":{"type":"subclass","name":"Oathbreaker (oath spell)","level":5},"castingTime":"action","range":"60 ft","components":{"v":true,"m":"bat fur and a drop of pitch or piece of coal"},"duration":"Concentration, 10 min","concentration":true,"categories":["action"],"actionType":"action","tags":["Always Prepared","Oath"],"alwaysPrepared":true,"text":"Magical darkness spreads from a point you choose, filling a 15-ft-radius sphere. Spreads around corners. Darkvision can't see through it; nonmagical light can't illuminate it. Can be cast on an object you hold or carry — moves with the object. Covering the source with an opaque object blocks the darkness. If overlapping with a light spell of 3rd level or lower, that light spell is dispelled."},{"kind":"spell","id":"spell.brandingSmite","name":"Branding Smite","spellLevel":2,"school":"Evocation","castingTime":"bonus","range":"Self","components":{"v":true},"duration":"Concentration, 1 min","concentration":true,"categories":["bonus"],"actionType":"bonus","tags":["Prepared","Smite"],"prepared":true,"upcast":"+1d6 Radiant per slot level above 2nd.","text":"The next time you hit a creature with a weapon attack before the spell ends, the weapon gleams with astral radiance: +2d6 Radiant damage. Target becomes visible if Invisible, sheds dim light in a 5-ft radius, and can't become Invisible until the spell ends."},{"kind":"spell","id":"spell.prayerOfHealing","name":"Prayer of Healing","spellLevel":2,"school":"Evocation","castingTime":"10 minutes","range":"30 ft","components":{"v":true},"duration":"Instantaneous","categories":["action"],"actionType":"action","tags":["Prepared","Out of Combat"],"prepared":true,"upcast":"+1d8 healing per slot level above 2nd.","text":"Up to 6 creatures of your choice within range each regain 2d8 + 4 HP. No effect on Undead or Constructs. 10-minute cast time — out-of-combat tool only."}],"inventory":[{"id":"inv.longsword","name":"Longsword","quantity":1,"equipped":true,"description":"Martial melee. 1d8 / 1d10 versatile Slashing. Daniel's primary weapon — Slashing damage type triggers Slasher feat riders."},{"id":"inv.shield","name":"Shield","quantity":1,"equipped":true,"description":"+2 AC. One-handed. Already in AC 19."},{"id":"inv.chainMail","name":"Chain Mail (presumed)","quantity":1,"equipped":true,"description":"Heavy armor. Base AC 16 (no DEX). Stealth Disadvantage. Don 10 min / Doff 5 min. Confirm exact armor with player — AC 19 also works with splint or scale + Defense."},{"id":"inv.javelins","name":"Javelins","quantity":5,"description":"Simple melee/thrown. 1d6 Piercing. Thrown 30/120 ft. Paladin starting equipment."},{"id":"inv.holySymbol","name":"Holy Symbol","quantity":1,"equipped":true,"description":"Spellcasting focus for paladin spells. Can be embedded in a shield, worn on a chain, or held."},{"id":"inv.signet","name":"Signet, banner, or seal of the order","quantity":1,"description":"Marks Daniel's place or rank in the knightly order. Knight of the Order background item."},{"id":"inv.travelersClothes","name":"Traveler's Clothes","quantity":1,"description":"Standard outfit for the road."},{"id":"inv.beltPouch","name":"Belt Pouch","quantity":1,"description":"Holds the 10 gp starting purse."},{"id":"inv.priestsPack","name":"Priest's Pack OR Explorer's Pack","quantity":1,"description":"Paladin starting kit choice — confirm which with player. Priest's Pack: backpack, blanket, 10 candles, tinderbox, alms box, 2 blocks of incense, censer, vestments, 2 days of rations, waterskin. Explorer's Pack: backpack, bedroll, mess kit, tinderbox, 10 torches, 10 days of rations, waterskin, 50 ft hempen rope."},{"id":"inv.gamingSet","name":"Gaming Set or Musical Instrument","quantity":1,"description":"Player's choice — proficiency from Knight of the Order background."},{"id":"inv.gold","name":"10 gp","quantity":1,"description":"Starting funds from Knight of the Order background."}],"wishlist":[{"name":"+1 Longsword","description":"+1 to hit and damage on a slashing weapon — directly amplifies the Slasher rider chain and stacks with Divine Smite."},{"name":"Cloak of Protection","description":"+1 AC and +1 to all saves. Daniel's WIS save is already proficient but only +2; the cloak helps with the non-proficient INT/CON saves common in late-game."},{"name":"+1 Plate Armor","description":"AC 19 (plate) + 2 (shield) + 1 (Defense) + 1 (magic) = 23 — top-tier defense."}],"narrative":{"knownAs":null,"flavorLine":"Oathbreaker Paladin — fallen from the Order, channeling necrotic shadow through what was once celestial light.","flavorNote":"An Aasimar whose celestial spark soured into something darker. The wings still come — but black, skeletal, and flightless. The radiant power is gone; what remains is a necromantic shadow he can wrap around himself like a cloak.","personalityTraits":["(To be filled in.)"],"ideals":["(To be filled in.)"],"bonds":["(To be filled in.)"],"flaws":["(To be filled in.)"],"physicalDescription":"A Fallen Aasimar with the celestial spark soured. When transformed via Necrotic Shroud, two skeletal, ghostly wings sprout from his back and his eyes blacken to pools of shadow.","overviewSummary":"Daniel was once a sworn knight of an order — a paladin in the most literal sense, oath-bound and uniformed. He broke that oath. The DMG calls what he is now an Oathbreaker: a paladin who has abandoned the sacred ideals of his original calling in pursuit of darker ends. The celestial heritage that once made his light shine pure has soured into necrotic shadow — Healing Hands still works, but the wings of the revelation come out black and flightless, and the bonus damage on his strikes is necrotic, not radiant. He is still proficient with the longsword, still channels divine power, still smites — but the power answers to a different master now.","backstoryFull":"(To be filled in.)","dmHooks":"Open questions for the player and DM:\n- Which knightly order does Daniel belong to (or did he, before falling)?\n- What was the oath he broke, and what did he break it for?\n- Which language did he take from the Knight of the Order background?\n- Did the Slasher feat ASI go to STR (16→17 + race +1 = 18) or DEX (14→15)?\n- Is 'Harness Divine Power' (Tasha's optional class feature) in play at the table?\n- Personality traits, ideals, bonds, flaws."},"tabs":[{"id":"overview","title":"Overview"},{"id":"actions","title":"Actions"},{"id":"spells","title":"Spells"},{"id":"resources","title":"Resources"},{"id":"features","title":"Features"},{"id":"inventory","title":"Inventory"},{"id":"background","title":"Background"},{"id":"notes","title":"Notes"}],"advisoryBanners":[{"id":"ruleset-2014","tone":"info","title":"Built on the 2014 5e ruleset.","body":"Aasimar from Volo's Guide to Monsters (2016, Fallen subrace), Paladin from PHB 2014, Oathbreaker from DMG 2014 Appendix D, Knight of the Order from SCAG 2015, Slasher feat from Tasha's Cauldron of Everything (2020). Spell damage uses 2014 dice (e.g., Cure Wounds is 1d8+mod, NOT the 2024 PHB's 2d8+mod baseline).","dismissible":true},{"id":"harness-divine-power","tone":"warn","title":"Harness Divine Power is Tasha's optional — not on this build.","body":"The source notes mention 'Harness Divine Power' alongside Channel Divinity, but that's a 2024 PHB / Tasha's Optional Class Feature, not part of base 2014 Paladin. Confirm with the DM whether Tasha's optional features are in play before invoking.","dismissible":true},{"id":"deception-and-armor","tone":"info","title":"Cross-checks for the player to confirm.","body":"(1) Source PDF originally showed Deception at +0 — corrected to +4 (untrained CHA mod). (2) Armor type isn't shown explicitly; AC 19 is consistent with chain mail + shield + Defense. (3) The Slasher ASI was assumed to go to STR (yielding 18) — confirm whether DEX would be preferred.","dismissible":true}]};
