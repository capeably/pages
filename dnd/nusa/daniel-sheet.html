function renderText(text) {
  if (!text) return "";
  return String(text).split(/\n\n+/).map(p => `<p>${esc(p).replace(/\n/g,"<br>")}</p>`).join("");
}

// Minimal markdown renderer for the Notes tab — supports headings, bold, italic, code,
// links, lists, blockquotes, horizontal rules, and paragraphs. URL sanitization blocks
// javascript:/data: schemes.
function renderMarkdown(md) {
  if (!md) return "";
  const out = [];
  const lines = String(md).split(/\r?\n/);
  let listType = null;
  let inCode = false;
  const codeBuf = [];
  const closeList = () => { if (listType) { out.push(`</${listType}>`); listType = null; } };
  const escRaw = (s) => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const inline = (text) => {
    let t = escRaw(text);
    t = t.replace(/`([^`]+)`/g, (_m, c) => `<code>${c}</code>`);
    t = t.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    t = t.replace(/__([^_]+)__/g, "<strong>$1</strong>");
    t = t.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
    t = t.replace(/(^|[^_])_([^_\n]+)_/g, "$1<em>$2</em>");
    t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_m, txt, url) => {
      if (/^(javascript|data):/i.test(url.trim())) return txt;
      const safeUrl = url.replace(/"/g, "&quot;");
      return `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${txt}</a>`;
    });
    return t;
  };
  for (const line of lines) {
    if (/^```/.test(line)) {
      if (inCode) { out.push(`<pre><code>${codeBuf.map(escRaw).join("\n")}</code></pre>`); codeBuf.length = 0; inCode = false; }
      else       { closeList(); inCode = true; }
      continue;
    }
    if (inCode) { codeBuf.push(line); continue; }
    if (!line.trim()) { closeList(); continue; }
    const h = line.match(/^(#{1,6})\s+(.*)/);
    if (h) { closeList(); out.push(`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`); continue; }
    if (/^---+$/.test(line.trim())) { closeList(); out.push("<hr>"); continue; }
    if (/^>\s?/.test(line)) { closeList(); out.push(`<blockquote>${inline(line.replace(/^>\s?/, ""))}</blockquote>`); continue; }
    let m = line.match(/^\s*[-*+]\s+(.*)/);
    if (m) {
      if (listType !== "ul") { closeList(); out.push("<ul>"); listType = "ul"; }
      out.push(`<li>${inline(m[1])}</li>`);
      continue;
    }
    m = line.match(/^\s*\d+\.\s+(.*)/);
    if (m) {
      if (listType !== "ol") { closeList(); out.push("<ol>"); listType = "ol"; }
      out.push(`<li>${inline(m[1])}</li>`);
      continue;
    }
    closeList();
    out.push(`<p>${inline(line)}</p>`);
  }
  closeList();
  if (inCode && codeBuf.length) out.push(`<pre><code>${codeBuf.map(escRaw).join("\n")}</code></pre>`);
  return out.join("\n");
}

// ============ TOKEN RESOLUTION ============
function resolveToken(tok) {
  if (!derived) return null;
  for (const k of ABILITY_KEYS) {
    if (tok === "=" + k.toLowerCase())         return derived.abilities[k].total;
    if (tok === "=" + k.toLowerCase() + "Mod") return derived.abilities[k].mod;
  }
  if (tok === "=pb")           return derived.pb;
  if (tok === "=level")        return derived.totalLevel;
  if (tok === "=walkingSpeed") return derived.walkingSpeed;
  if (tok === "=monkDC")       return derived.monkDC;
  if (tok === "=spellSaveDC")  return derived.spellSaveDC;
  if (tok === "=spellAttack")  return derived.spellAttack != null ? fmt(derived.spellAttack) : null;
  const m = tok.match(/^=(\w+?)Level$/);
  if (m) {
    const name = m[1].toLowerCase();
    const cls = (character.classes || []).find(c => c.name.toLowerCase() === name);
    return cls ? cls.level : 0;
  }
  console.warn("Unknown token:", tok);
  return null;
}
function resolveValue(v) {
  if (typeof v === "string" && v.startsWith("=")) return resolveToken(v);
  return v;
}

// ============ DERIVATION ============
function derive() {
  const abilities = {};
  for (const k of ABILITY_KEYS) {
    const base = (character.abilities && character.abilities[k]) ?? 10;
    const bumps = (character.abilityBumps || []).filter(b => b.ability === k);
    const total = base + bumps.reduce((s, b) => s + (b.bonus || 0), 0);
    abilities[k] = { base, total, mod: abilityMod(total), bumps };
  }
  const totalLevel = (character.classes || []).reduce((s, c) => s + (c.level || 0), 0);
  const pb = PB_BY_LEVEL[totalLevel] || 2;
  const classLevels = {};
  for (const c of character.classes || []) classLevels[c.name.toLowerCase()] = c.level;
  const monkLevel = classLevels["monk"] || 0;

  let walkingSpeed = (character.speeds && character.speeds.walk) || 30;
  const hasTrait = (id) => (character.abilities_list || []).some(a => a.id === id);
  if (hasTrait("monk.unarmoredMovement") && monkLevel >= 2) walkingSpeed += 10;

  let ac, acSource;
  if (character.ac?.value != null) {
    ac = character.ac.value;
    acSource = character.ac.source || "";
  } else if (hasTrait("monk.unarmoredDefense")) {
    ac = 10 + abilities.DEX.mod + abilities.WIS.mod;
    acSource = "Unarmored Defense (DEX + WIS)";
  } else {
    ac = 10 + abilities.DEX.mod;
    acSource = "10 + DEX";
  }

  const monkDC = monkLevel > 0 ? (8 + pb + abilities.WIS.mod) : null;
  let spellSaveDC = null, spellAttack = null;
  if (character.spellcasting?.ability) {
    const mod = abilities[character.spellcasting.ability].mod;
    spellSaveDC = 8 + pb + mod;
    spellAttack = pb + mod;
  }

  const initiative = abilities.DEX.mod;
  const saveProfs = (character.proficiencies && character.proficiencies.saves) || [];
  const saves = {};
  for (const k of ABILITY_KEYS) {
    const prof = saveProfs.includes(k);
    saves[k] = { mod: abilities[k].mod + (prof ? pb : 0), proficient: prof };
  }
  const skillProfs = (character.proficiencies && character.proficiencies.skills) || [];
  const extraBonuses = character.skillBonuses || [];
  const resolveInline = (v) => {
    if (typeof v === "number") return v;
    if (typeof v !== "string" || !v.startsWith("=")) return 0;
    const m = v.match(/^=(str|dex|con|int|wis|cha)Mod$/i);
    if (m) return abilities[m[1].toUpperCase()].mod;
    if (v === "=pb") return pb;
    return 0;
  };
  const skills = {};
  for (const [name, abil] of Object.entries(SKILLS_TABLE)) {
    const profEntry = skillProfs.find(s => s.skill === name);
    const mod = abilities[abil].mod;
    const extras = extraBonuses.filter(b => b.skill === name).map(b => ({ amount: resolveInline(b.bonus), source: b.source, raw: b.bonus }));
    const extraTotal = extras.reduce((s, e) => s + e.amount, 0);
    const bonus = mod + (profEntry ? pb : 0) + extraTotal;
    skills[name] = { ability: abil, mod, proficient: !!profEntry, bonus, source: profEntry?.source, extras };
  }
  return { abilities, totalLevel, pb, classLevels, walkingSpeed, ac, acSource, monkDC, spellSaveDC, spellAttack, initiative, saves, skills };
}

// ============ RUNTIME STATE ============
function storageKey() { return character.storageKey || "charsheet_default"; }
function defaultRuntime() {
  const rt = {
    hp: { current: character.hp?.max ?? 10, temp: 0 },
    inspiration: false, resources: {}, userNotes: "",
    advisoryDismissed: {}, activeTab: (character.tabs || [{id:"overview"}])[0].id,
    activeFilters: {},
    // play-state
    conditions: [],
    concentration: null,
    deathSaves: { successes: 0, failures: 0 },
    exhaustion: 0,
    notesMode: "write"
  };
  for (const res of character.resources || []) {
    const max = resolveValue(res.max);
    if (res.poolType === "pips")   rt.resources[res.id] = new Array(max).fill(false);
    else if (res.poolType === "hpPool") rt.resources[res.id] = max;
  }
  return rt;
}
function loadRuntime() {
  const d = defaultRuntime();
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(storageKey()) || "null"); } catch(e) {}
  if (!saved) return d;
  const merged = {
    hp: { current: saved.hp?.current ?? d.hp.current, temp: saved.hp?.temp ?? 0 },
    inspiration: !!saved.inspiration,
    resources: { ...d.resources },
    userNotes: saved.userNotes || "",
    advisoryDismissed: saved.advisoryDismissed || {},
    activeTab: saved.activeTab || d.activeTab,
    activeFilters: saved.activeFilters || {},
    conditions: Array.isArray(saved.conditions) ? saved.conditions : [],
    concentration: saved.concentration || null,
    deathSaves: {
      successes: Math.max(0, Math.min(3, saved.deathSaves?.successes || 0)),
      failures:  Math.max(0, Math.min(3, saved.deathSaves?.failures  || 0))
    },
    exhaustion: Math.max(0, Math.min(6, typeof saved.exhaustion === "number" ? saved.exhaustion : 0)),
    notesMode: saved.notesMode === "preview" ? "preview" : "write"
  };
  if (merged.hp.current > character.hp.max) merged.hp.current = character.hp.max;
  if (merged.hp.current < 0) merged.hp.current = 0;
  for (const res of character.resources || []) {
    const max = resolveValue(res.max);
    const savedVal = saved.resources?.[res.id];
    if (res.poolType === "pips") {
      if (Array.isArray(savedVal)) merged.resources[res.id] = new Array(max).fill(false).map((_, i) => savedVal[i] === true);
      else merged.resources[res.id] = new Array(max).fill(false);
    } else if (res.poolType === "hpPool") {
      merged.resources[res.id] = Math.min(max, typeof savedVal === "number" ? savedVal : max);
    }
  }
  return merged;
}
function saveRuntime() { try { localStorage.setItem(storageKey(), JSON.stringify(runtime)); } catch(e) {} }

// ============ RENDER — TOP BAR ============
function renderThumbFallback(el) {
  const name = (character?.identity?.name || "?").trim();
  const initial = (name.charAt(0) || "?").toUpperCase();
  el.innerHTML = `<div class="thumb-fallback">${esc(initial)}</div>`;
}
function thumbFailed(img) {
  const parent = img.parentElement;
  if (parent) renderThumbFallback(parent);
}
function renderTopBar() {
  const thumbWrap = document.getElementById("char-thumbnail-wrap");
  const replaceBtn = `<button class="portrait-replace-btn" onclick="event.stopPropagation();openPortraitPicker('thumbnail')" title="Replace thumbnail (or drag a new image here)">Replace</button>`;
  if (character.thumbnail?.src) {
    thumbWrap.innerHTML = `<img src="${esc(character.thumbnail.src)}" alt="${esc(character.thumbnail.alt || '')}" onclick="openLightbox(this.src, this.alt)" onerror="thumbFailed(this)">${replaceBtn}`;
  } else {
    renderThumbFallback(thumbWrap);
    thumbWrap.insertAdjacentHTML("beforeend", replaceBtn);
  }
  const nameEl = document.getElementById("char-name");
  const subEl = document.getElementById("char-subtitle");
  const name = character.identity?.name || "— unnamed —";
  const sub = character.identity?.subtitle || "";
  nameEl.textContent = name; nameEl.title = name;
  subEl.textContent = sub;   subEl.title = sub;

  document.getElementById("hp-current").value = runtime.hp.current;
  document.getElementById("hp-max").textContent = character.hp.max;
  document.getElementById("hp-temp").value = runtime.hp.temp;
  document.getElementById("ac-value").textContent = derived.ac;
  document.getElementById("ac-source").textContent = derived.acSource;
  document.getElementById("initiative-value").textContent = fmt(derived.initiative);
  document.getElementById("inspiration-toggle").classList.toggle("active", runtime.inspiration);
}

function renderBanners() {
  const container = document.getElementById("advisory-banners");
  container.innerHTML = "";
  for (const banner of character.advisoryBanners || []) {
    if (runtime.advisoryDismissed[banner.id]) continue;
    const el = document.createElement("div");
    el.className = "advisory-banner";
    el.innerHTML = `<button class="advisory-close" onclick="dismissBanner('${esc(banner.id)}')">&times;</button><strong>${esc(banner.title)}</strong> ${esc(banner.body)}`;
    container.appendChild(el);
  }
}

function renderSidebar() {
  const grid = document.getElementById("ability-grid");
  grid.innerHTML = "";
  for (const k of ABILITY_KEYS) {
    const a = derived.abilities[k];
    const save = derived.saves[k];
    const bumpNotes = a.bumps.length ? a.bumps.map(b => `+${b.bonus} from ${b.source}`).join("; ") : "no ASI applied";
    const tip = `${k} ${a.total} = ${a.base} rolled${a.bumps.length ? " (" + bumpNotes + ")" : ""}\nSave ${fmt(save.mod)} = ${fmt(a.mod)} mod${save.proficient ? " + " + derived.pb + " prof" : ""}`;
    const el = document.createElement("div");
    el.className = "ability-box" + (save.proficient ? " prof" : "");
    el.title = tip;
    el.innerHTML = `<div class="name">${k}</div><div class="mod">${fmt(a.mod)}</div><div class="score">${a.total}</div><div class="save">save ${fmt(save.mod)}${save.proficient ? " ★" : ""}</div>`;
    grid.appendChild(el);
  }
  const combat = document.getElementById("combat-stats");
  const rows = [];
  rows.push({ label:"Proficiency", value: fmt(derived.pb) });
  rows.push({ label:"Speed", value: derived.walkingSpeed + " ft" });
  if ((character.abilities_list || []).some(a => a.id === "monk.unarmoredMovement")) rows.push({ label:"Unarmored Movement", value:"+10 ft" });
  const classes = character.classes || [];
  const hitDie = character.hp?.hitDie || "d8";
  if (classes.length === 1) rows.push({ label:"Hit Dice", value: classes[0].level + hitDie });
  else if (classes.length > 1) rows.push({ label:"Hit Dice", value: classes.map(c => c.level + (c.hitDie || "d8")).join(" + ") });
  if (derived.spellSaveDC != null) {
    rows.push({ label:"Spell Save DC", value: derived.spellSaveDC });
    rows.push({ label:"Spell Attack",  value: fmt(derived.spellAttack) });
  }
  rows.push({ label:"Passive Perception",    value: 10 + derived.skills["Perception"].bonus });
  rows.push({ label:"Passive Insight",       value: 10 + derived.skills["Insight"].bonus });
  rows.push({ label:"Passive Investigation", value: 10 + derived.skills["Investigation"].bonus });
  if (derived.monkDC !== null) rows.push({ label:"Ki Save DC", value: derived.monkDC });
  combat.innerHTML = rows.map(r => `<div class="stat-row"><span>${esc(r.label)}</span><span class="val">${esc(r.value)}</span></div>`).join("");

  const skillsEl = document.getElementById("skills-list");
  const skillNames = Object.keys(SKILLS_TABLE).sort();
  skillsEl.innerHTML = skillNames.map(name => {
    const s = derived.skills[name];
    const extraLines = (s.extras || []).map(x => `+${x.amount} from ${x.source}`).join("; ");
    const baseLine = s.proficient
      ? `Proficient from ${s.source}. ${fmt(s.mod)} ${s.ability} mod + ${derived.pb} prof`
      : `Not proficient. ${fmt(s.mod)} ${s.ability} mod`;
    const tip = `${fmt(s.bonus)} = ${baseLine}${extraLines ? " + " + extraLines : ""}.`;
    return `<div class="skill-row" title="${esc(tip)}"><div class="skill-dot ${s.proficient ? "prof" : ""}"></div><span class="skill-abil">${s.ability}</span><span class="skill-name">${esc(name)}</span><span class="skill-mod">${fmt(s.bonus)}</span></div>`;
  }).join("");

  const p = character.proficiencies || {};
  const profEl = document.getElementById("proficiencies-list");
  const armor = (p.armor || []).map(x => x.specific || x.category).filter(Boolean);
  const weapons = (p.weapons || []).map(x => x.specific || x.category).filter(Boolean);
  const tools = (p.tools || []).map(x => x.tool).filter(Boolean);
  profEl.innerHTML = `<div class="stat-row"><span>Armor</span><span class="val">${armor.length ? esc(armor.join(", ")) : "None"}</span></div><div class="stat-row"><span>Weapons</span><span class="val">${weapons.length ? esc(weapons.join(", ")) : "None"}</span></div><div class="stat-row"><span>Tools</span><span class="val">${tools.length ? esc(tools.join(", ")) : "None"}</span></div>`;

  const langs = character.languages || [];
  document.getElementById("languages-list").innerHTML = langs.map(l => `<div class="stat-row"><span>${esc(l.language)}</span></div>`).join("");
}

// ============ TABS ============
function renderTabBar() {
  const bar = document.getElementById("tab-bar");
  bar.innerHTML = "";
  const tabs = character.tabs || [{ id:"overview", title:"Overview" }];
  for (const t of tabs) {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (t.id === runtime.activeTab ? " active" : "");
    btn.dataset.tab = t.id;
    btn.textContent = t.title || t.id;
    btn.onclick = () => switchTab(t.id);
    bar.appendChild(btn);
  }
}
function switchTab(id) {
  runtime.activeTab = id; saveRuntime();
  document.querySelectorAll("#tab-contents .tab-content").forEach(el => el.classList.toggle("active", el.dataset.tabId === id));
  document.querySelectorAll(".tab-btn").forEach(el => el.classList.toggle("active", el.dataset.tab === id));
}
function renderTabContents() {
  const container = document.getElementById("tab-contents");
  container.innerHTML = "";
  const tabs = character.tabs || [{ id:"overview", title:"Overview" }];
  for (const t of tabs) {
    const div = document.createElement("div");
    div.className = "tab-content" + (t.id === runtime.activeTab ? " active" : "");
    div.dataset.tabId = t.id;
    div.id = "tab-" + t.id;
    div.innerHTML = renderTabBody(t);
    container.appendChild(div);
  }
  wireFilterChips();
}
function renderTabBody(tab) {
  if (tab.custom) {
    const custom = character.customTabs?.[tab.id];
    if (custom?.type === "stances")     return renderStances(custom);
    if (custom?.type === "selak-forms") return renderSelakForms(custom);
    return `<p>[Unknown custom tab type: ${esc(custom?.type || "none")}]</p>`;
  }
  switch (tab.id) {
    case "overview":   return renderOverviewTab();
    case "actions":    return renderActionsTab();
    case "spells":     return renderSpellsTab();
    case "features":   return renderFeaturesTab();
    case "resources":  return renderResourcesTab();
    case "inventory":  return renderInventoryTab();
    case "background": return renderBackgroundTab();
    case "backstory":  return renderBackstoryTab();
    case "notes":      return renderNotesTab();
    default:           return `<p>[Tab ${esc(tab.id)} not yet implemented]</p>`;
  }
}

// ---------- Overview ----------
function renderOverviewTab() {
  const n = character.narrative || {};
  const replaceBtn = `<button class="portrait-replace-btn" onclick="event.stopPropagation();openPortraitPicker('portrait')" title="Replace portrait (or drag a new image here)">Replace</button>`;
  const portrait = character.portrait?.src
    ? `<div class="overview-portrait-wrap" data-portrait-target="portrait"><img class="overview-portrait" src="${esc(character.portrait.src)}" alt="${esc(character.portrait.alt || '')}" onclick="openLightbox(this.src, this.alt)" title="Click to enlarge · drag an image here or use Replace to set a new portrait">${replaceBtn}</div>`
    : `<div class="overview-portrait-wrap" data-portrait-target="portrait" onclick="openPortraitPicker('portrait')" style="cursor:pointer;"><div class="overview-portrait" style="display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--text-muted);font-style:italic;">Drag or click to set a portrait</div>${replaceBtn}</div>`;
  const summary = renderText(n.overviewSummary || "");
  return `<div class="overview-simple">${portrait}<div class="overview-display-name">${esc(character.identity?.name || "")}</div><div class="overview-subtitle">${esc(character.identity?.subtitle || "")}</div><div class="overview-section-head">Backstory &amp; Personality</div><div class="overview-body">${summary}</div></div>`;
}

// ---------- Actions ----------
function renderActionsTab() {
  const all = character.abilities_list || [];
  const items = all.filter(a => Array.isArray(a.categories) && a.categories.length > 0);
  const chips = ACTIONS_FILTER_CHIPS.map(c => {
    const active = (runtime.activeFilters.actions || "all") === c.filter;
    return `<div class="chip ${active ? "active" : ""}" data-filter="${esc(c.filter)}">${esc(c.label)}</div>`;
  }).join("");
  const groupOrder = ["class","subclass","species","background","feat","universal"];
  const groups = {};
  for (const item of items) (groups[item.source?.type || "universal"] = groups[item.source?.type || "universal"] || []).push(item);
  let body = "";
  for (const key of groupOrder) {
    const entries = groups[key] || [];
    if (!entries.length) continue;
    body += `<div class="section-head" data-section-group="actions">${esc(ACTION_SOURCE_LABEL[key] || key)}</div>`;
    for (const item of entries) body += renderCard(item);
  }
  return `<div class="filter-chips" data-filter-group="actions">${chips}</div>${body}`;
}

// ---------- Features ----------
function renderFeaturesTab() {
  const all = character.abilities_list || [];
  const items = all.filter(a => a.source && FEATURE_SOURCE_ORDER.includes(a.source.type));
  const chips = FEATURES_FILTER_CHIPS.map(c => {
    const active = (runtime.activeFilters.features || "all") === c.filter;
    return `<div class="chip ${active ? "active" : ""}" data-filter="${esc(c.filter)}">${esc(c.label)}</div>`;
  }).join("");
  const grouped = {};
  for (const item of items) {
    const t = item.source.type, n = item.source.name || "";
    if (!grouped[t]) grouped[t] = {};
    if (!grouped[t][n]) grouped[t][n] = [];
    grouped[t][n].push(item);
  }
  for (const t of Object.keys(grouped)) for (const n of Object.keys(grouped[t]))
    grouped[t][n].sort((a, b) => (a.source.level || 0) - (b.source.level || 0));
  let body = "";
  for (const t of FEATURE_SOURCE_ORDER) {
    if (!grouped[t]) continue;
    for (const name of Object.keys(grouped[t])) {
      body += `<div class="section-head" data-section-group="features">${esc(name || FEATURE_SOURCE_LABEL[t])}</div>`;
      for (const item of grouped[t][name]) body += renderCard(item);
    }
  }
  return `<div class="filter-chips" data-filter-group="features">${chips}</div>${body}`;
}

// ---------- Card renderer ----------
function renderCard(item) {
  const classes = ["card"];
  if (item.kind === "form")  classes.push("form-card");
  if (item.kind === "spell") classes.push("spell-card");
  if (item.kind === "spell" && item.concentration && runtime.concentration?.spellId === item.id) classes.push("is-concentrating");
  const cats = (item.categories || []).join(" ");
  const sourceType = item.source?.type || "";

  const tags = [];
  const catTagOrder = ["attack","action","bonus","reaction","free","limited"];
  for (const c of catTagOrder) {
    if ((item.categories || []).includes(c)) {
      const label = { attack:"Attack", action:"Action", bonus:"Bonus", reaction:"Reaction", free:"Passive", limited:limitedLabel(item) }[c];
      tags.push(`<span class="tag ${c}">${esc(label)}</span>`);
    }
  }
  if (sourceType && FEATURE_SOURCE_ORDER.includes(sourceType)) tags.push(`<span class="tag ${sourceType}">${esc(FEATURE_SOURCE_LABEL[sourceType])}</span>`);
  if (item.kind === "spell") {
    const lvl = item.spellLevel;
    if (lvl === 0) tags.push(`<span class="tag cantrip">Cantrip</span>`);
    else if (lvl === 1) tags.push(`<span class="tag lvl1">1st</span>`);
    else if (lvl === 2) tags.push(`<span class="tag lvl2">2nd</span>`);
    else if (lvl === 3) tags.push(`<span class="tag lvl3">3rd</span>`);
    else if (lvl > 0)   tags.push(`<span class="tag lvl3">${lvl}th</span>`);
    if (item.concentration) tags.push(`<span class="tag conc">Concentration</span>`);
    if (item.ritual)        tags.push(`<span class="tag ritual">Ritual</span>`);
    if (isCircleSpell(item))tags.push(`<span class="tag circle">Circle</span>`);
  }

  const stats = [];
  if (item.kind === "spell") {
    const ct = castingTimeLabel(item.castingTime);
    if (ct) stats.push(`<span><strong>${esc(ct)}</strong></span>`);
    if (item.range) stats.push(`<span>${esc(item.range)}</span>`);
    const comps = componentsLabel(item.components);
    if (comps) stats.push(`<span>${esc(comps)}</span>`);
    if (item.duration) stats.push(`<span>${esc(item.duration)}</span>`);
  }
  if (item.attack?.toHit) {
    const toHit = resolveValue(item.attack.toHit);
    stats.push(`<span><strong>To Hit:</strong> ${esc(toHit ?? item.attack.toHit)}</span>`);
  }
  if (item.attack?.reach) stats.push(`<span><strong>Reach:</strong> ${esc(item.attack.reach)}</span>`);
  if (item.attack?.range && item.kind !== "spell") stats.push(`<span><strong>Range:</strong> ${esc(item.attack.range)}</span>`);
  if (item.attack?.ability && item.kind !== "spell") stats.push(`<span><strong>Ability:</strong> ${esc(item.attack.ability)}</span>`);
  if (item.attack?.type) stats.push(`<span><strong>Type:</strong> ${esc(item.attack.type)}</span>`);
  if (item.properties?.length) stats.push(`<span><strong>Properties:</strong> ${esc(item.properties.join(", "))}</span>`);
  if (item.damage) stats.push(`<span><strong>Damage:</strong> <span class="damage">${esc(item.damage)}</span></span>`);
  if (item.save) {
    const dc = resolveValue(item.save.dc);
    const dcStr = dc != null ? `DC ${dc}` : esc(item.save.dc || "");
    stats.push(`<span><strong>Save:</strong> ${esc(item.save.ability)} ${dcStr}${item.save.effect ? " — " + esc(item.save.effect) : ""}</span>`);
  }
  if (item.heal) {
    const dice = resolveValue(item.heal.dice);
    stats.push(`<span><strong>Heal:</strong> ${dice ?? item.heal.dice} × ${esc(item.heal.dieSize)}</span>`);
  }

  // Upcast info for leveled spells
  const upcastBlock = (item.kind === "spell" && item.upcast)
    ? `<div class="spell-upcast"><strong>Higher levels:</strong> ${esc(item.upcast)}</div>`
    : "";

  let formBlock = "";
  if (item.kind === "form" && item.grants) {
    const flyRaw = item.grants.flySpeed;
    const fly = resolveValue(flyRaw);
    const flyStr = flyRaw ? (fly != null ? `${fly} ft` : esc(flyRaw)) : "";
    const dur = item.duration ? esc(item.duration) : "";
    const entry = item.entry?.actionType ? `<span><strong>Entry:</strong> ${esc(item.entry.actionType)} action</span>` : "";
    const flyPill = flyStr ? `<span><strong>Fly speed:</strong> ${flyStr}</span>` : "";
    const durPill = dur ? `<span><strong>Duration:</strong> ${dur}</span>` : "";
    const riders = (item.grants.riders || []).map(r => {
      if (r.damage) {
        const bonus = resolveValue(r.damage.bonus);
        return `<p><em>Rider: +${bonus ?? r.damage.bonus} ${esc(r.damage.type || "")} damage — ${esc(r.text || "")}</em></p>`;
      }
      return r.text ? `<p><em>Rider: ${esc(r.text)}</em></p>` : "";
    }).join("");
    const extraStats = [entry, flyPill, durPill].filter(Boolean).join("");
    formBlock = extraStats ? `<div class="card-stats">${extraStats}</div>${riders}` : riders;
  }

  // Resource pips — if this ability consumes a pip resource, show them inline (single source of truth; cross-tab synced)
  let resourceBlock = "";
  const consumesInfo = item.uses?.consumes || item.uses?.optional?.consumes;
  const isOptional   = !!item.uses?.optional?.consumes;
  if (consumesInfo?.resourceId) {
    const res = (character.resources || []).find(r => r.id === consumesInfo.resourceId);
    if (res && res.poolType === "pips") {
      const max = resolveValue(res.max);
      const arr = runtime.resources[res.id] || [];
      const pipsHtml = Array.from({length: max}, (_, i) =>
        `<div class="pip pip-sm${res.pipClass ? " " + esc(res.pipClass) : ""}${arr[i] ? " used" : ""}" data-resource="${esc(res.id)}" data-idx="${i}"></div>`
      ).join("");
      const remaining = arr.filter(v => !v).length;
      const labelSuffix = isOptional ? " (optional)" : "";
      resourceBlock = `<div class="card-resource"><span class="card-resource-label">${esc(res.display)}${labelSuffix}</span><span class="card-resource-count">${remaining}/${max}</span><div class="pips">${pipsHtml}</div></div>`;
    }
  }

  // Concentration toggle button — appears only on spells with concentration:true
  let concBlock = "";
  if (item.kind === "spell" && item.concentration) {
    const active = runtime.concentration?.spellId === item.id;
    const label = active ? "&check; Concentrating — click to drop" : "Start concentrating";
    // Use data attributes + delegated listener (safer than inline onclick with arbitrary spell names)
    concBlock = `<div class="card-conc-toggle"><button class="btn-xs conc-toggle-btn ${active ? "active" : ""}" data-spell-id="${esc(item.id)}" data-spell-name="${esc(item.name)}">${label}</button></div>`;
  }

  // Cast buttons for leveled spells — one per available slot level, base level highlighted
  const castBlock = renderCastButtons(item);

  const title = `${esc(item.name)}${item.subtitle ? ` <span class="sub">${esc(item.subtitle)}</span>` : ""}`;
  const spellAttrs = item.kind === "spell"
    ? ` data-spell-level="${item.spellLevel ?? ''}" data-conc="${!!item.concentration}" data-ritual="${!!item.ritual}" data-circle="${isCircleSpell(item)}"`
    : "";

  return `<div class="${classes.join(" ")}" data-categories="${esc(cats)}" data-sourcetype="${esc(sourceType)}" data-kind="${esc(item.kind)}"${spellAttrs}><div class="card-header"><div class="card-title">${title}</div><div class="card-tags">${tags.join("")}</div></div>${stats.length ? `<div class="card-stats">${stats.join("")}</div>` : ""}${upcastBlock}${formBlock}<div class="card-body">${renderText(item.text || "")}</div>${castBlock}${concBlock}${resourceBlock}</div>`;
}

function renderCastButtons(spell) {
  if (!spell || spell.kind !== "spell") return "";
  const base = spell.spellLevel;
  if (typeof base !== "number" || base < 1) return ""; // cantrips handled separately (concentration toggle suffices)

  // Find character's max slot level (look at spell.slots.N resources)
  const slotResources = (character.resources || []).filter(r => /^spell\.slots\.\d+$/.test(r.id));
  if (!slotResources.length) return "";
  const maxLevel = Math.max(...slotResources.map(r => parseInt(r.id.split(".")[2])));
  if (maxLevel < base) return ""; // character can't cast at this level

  const buttons = [];
  for (let lvl = base; lvl <= maxLevel; lvl++) {
    const resId = `spell.slots.${lvl}`;
    const arr = runtime.resources[resId] || [];
    const remaining = arr.filter(v => !v).length;
    const total = arr.length;
    const disabled = remaining === 0;
    const isBase = lvl === base;
    const label = isBase ? `Cast (L${lvl})` : `Upcast L${lvl}`;
    const title = `${remaining}/${total} ${ordinal(lvl)}-level slots remaining`;
    buttons.push(`<button class="btn-cast ${isBase ? 'base' : ''}" data-cast-spell="${esc(spell.id)}" data-cast-level="${lvl}" ${disabled ? 'disabled' : ''} title="${esc(title)}">${label}</button>`);
  }
  return `<div class="cast-row"><span class="cast-label">Cast</span>${buttons.join("")}</div>`;
}

function ordinal(n) {
  const s = ["th","st","nd","rd"], v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function castSpell(spellId, slotLevel) {
  const spell = (character.abilities_list || []).find(a => a.id === spellId);
  if (!spell) return;

  // Consume slot
  const resId = `spell.slots.${slotLevel}`;
  const arr = runtime.resources[resId];
  if (!Array.isArray(arr)) { showToast(`No ${ordinal(slotLevel)}-level slots.`, "error"); return; }
  const firstAvail = arr.findIndex(v => !v);
  if (firstAvail === -1) { showToast(`No ${ordinal(slotLevel)}-level slots remaining.`, "error"); return; }
  arr[firstAvail] = true;

  // Sync pip visuals across all tabs for this slot
  document.querySelectorAll(`.pip[data-resource="${CSS.escape(resId)}"][data-idx="${firstAvail}"]`).forEach(p => p.classList.add("used"));
  document.querySelectorAll(`.card-resource`).forEach(el => {
    if (!el.querySelector(`.pip[data-resource="${CSS.escape(resId)}"]`)) return;
    const countEl = el.querySelector(".card-resource-count");
    if (countEl) countEl.textContent = `${arr.filter(v => !v).length}/${arr.length}`;
  });

  // Trigger concentration if spell is a concentration spell
  let concNote = "";
  if (spell.concentration) {
    const wasConc = runtime.concentration?.spellId;
    runtime.concentration = { spellId: spell.id, spellName: spell.name };
    concNote = wasConc && wasConc !== spell.id ? " (concentration replaced)" : " (now concentrating)";
  }

  saveRuntime();
  renderPlayStateBar();
  // Re-render spells + actions tabs so cast button disabled states reflect new slot counts
  reRenderTab("spells");
  reRenderTab("actions");

  const upcastNote = slotLevel > spell.spellLevel ? ` (upcast from ${ordinal(spell.spellLevel)})` : "";
  showToast(`Cast ${spell.name} at ${ordinal(slotLevel)} level${upcastNote}${concNote}.`);
}

function isCircleSpell(item) {
  if (!item || item.kind !== "spell") return false;
  return item.source?.type === "subclass" && /Circle Spell/i.test(item.source.name || "");
}
function castingTimeLabel(ct) {
  if (!ct) return null;
  if (typeof ct === "string") {
    if (ct === "action")   return "Action";
    if (ct === "bonus")    return "Bonus Action";
    if (ct === "reaction") return "Reaction";
    return ct;
  }
  return null;
}
function componentsLabel(c) {
  if (!c) return null;
  const bits = [];
  if (c.v) bits.push("V");
  if (c.s) bits.push("S");
  if (c.m) bits.push("M");
  return bits.length ? bits.join(", ") : null;
}
function limitedLabel(item) {
  if (item.uses?.consumes?.resourceId) {
    const res = (character.resources || []).find(r => r.id === item.uses.consumes.resourceId);
    if (res) {
      const amt = item.uses.consumes.amount || 1;
      return `${amt} ${res.display}`;
    }
  }
  const tag = (item.tags || []).find(t => /\/ ?LR$|\/ ?SR$|LR|SR/i.test(t));
  return tag || "Limited";
}

// ---------- Spells ----------
function renderSpellsTab() {
  const all = character.abilities_list || [];
  const spells = all.filter(a => a.kind === "spell");
  const chips = SPELLS_FILTER_CHIPS
    .filter(c => c.filter !== "all" ? spellChipApplies(c.filter, spells) : true)
    .map(c => {
      const active = (runtime.activeFilters.spells || "all") === c.filter;
      return `<div class="chip ${active ? "active" : ""}" data-filter="${esc(c.filter)}">${esc(c.label)}</div>`;
    }).join("");

  const slotRes = (character.resources || []).filter(r => /^spell\.slots\./.test(r.id));
  let slotsBlock = "";
  if (slotRes.length) {
    const rows = slotRes.map(res => {
      const max = resolveValue(res.max);
      const arr = runtime.resources[res.id] || [];
      const pips = Array.from({length: max}, (_, i) =>
        `<div class="pip${res.pipClass ? " " + esc(res.pipClass) : ""}${arr[i] ? " used" : ""}" data-resource="${esc(res.id)}" data-idx="${i}"></div>`
      ).join("");
      return `<div class="pip-row" style="margin:0 0 6px;padding:6px 10px;"><div class="pip-label">${esc(res.display)} <span class="pip-sub">${max} slots</span></div><div class="pips">${pips}</div></div>`;
    }).join("");
    slotsBlock = `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:16px;"><div style="font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:8px;">Spell Slots (click to expend/recover)</div>${rows}</div>`;
  }

  const byLevel = {};
  for (const s of spells) (byLevel[s.spellLevel ?? -1] = byLevel[s.spellLevel ?? -1] || []).push(s);
  const levels = Object.keys(byLevel).map(Number).sort((a, b) => a - b);
  let body = "";
  for (const lvl of levels) {
    const items = byLevel[lvl];
    const circle = items.filter(isCircleSpell);
    const regular = items.filter(s => !isCircleSpell(s));
    if (regular.length) {
      body += `<div class="section-head" data-section-group="spells">${esc(SPELL_LEVEL_LABEL[lvl] || "Level " + lvl)}${lvl === 0 ? "" : " (Prepared)"}</div>`;
      for (const s of regular) body += renderCard(s);
    }
    if (circle.length) {
      body += `<div class="section-head" data-section-group="spells">${esc(SPELL_LEVEL_LABEL[lvl] || "Level " + lvl)} — Circle / Always Prepared</div>`;
      for (const s of circle) body += renderCard(s);
    }
  }
  const swap = (character.spellsSwapCandidates || []);
  const swapBlock = swap.length ? `<div class="quote"><strong>Swap candidates</strong> (change on Long Rest): ${swap.map(s => esc(s.name) + (s.reason ? ` (${esc(s.reason)})` : "")).join(", ")}.</div>` : "";
  return `<div class="filter-chips" data-filter-group="spells">${chips}</div>${slotsBlock}${body}${swapBlock}`;
}
function spellChipApplies(filter, spells) {
  if (filter === "cantrip") return spells.some(s => s.spellLevel === 0);
  const m = filter.match(/^lvl(\d)$/);
  if (m) return spells.some(s => s.spellLevel === parseInt(m[1]));
  if (filter === "conc")    return spells.some(s => s.concentration);
  if (filter === "ritual")  return spells.some(s => s.ritual);
  if (filter === "circle")  return spells.some(isCircleSpell);
  return true;
}

// ---------- Selak Forms (custom tab type) ----------
function renderSelakForms(cfg) {
  const intro = cfg.intro ? `<div class="selak-intro">${esc(cfg.intro).replace(/·/g, "<strong style=\"color:var(--accent)\">·</strong>")}</div>` : "";
  const forms = (cfg.forms || []).map(f => {
    const pills = (f.statPills || []).map(p => `<div class="stat-pill"><strong>${esc(p.label)}</strong> ${esc(p.value)}</div>`).join("");
    const body = (f.body || []).map(p => `<p>${esc(p)}</p>`).join("");
    const marker = f.marker ? `<span class="marker">${esc(f.marker)}</span>` : "";
    const subtitle = f.subtitle ? `<span class="subtitle">${esc(f.subtitle)}</span>` : "";
    return `<div class="selak-form ${esc(f.colorClass || "")}"><h3>${marker}${esc(f.name)}${subtitle}</h3>${f.tagline ? `<div class="tagline">${esc(f.tagline)}</div>` : ""}${pills ? `<div class="stat-pills">${pills}</div>` : ""}<div class="card-body">${body}</div></div>`;
  }).join("");
  const shared = cfg.shared ? `<div class="section-head">${esc(cfg.shared.title || "Shared")}</div><div class="card"><div class="card-body">${(cfg.shared.body || []).map(p => `<p>${esc(p)}</p>`).join("")}</div></div>` : "";
  const footer = cfg.footer ? `<div class="section-head">${esc(cfg.footer.title || "")}</div><div class="card"><div class="card-body">${(cfg.footer.body || []).map(p => `<p>${esc(p)}</p>`).join("")}</div></div>` : "";
  return `${intro}${forms}${shared}${footer}`;
}

// ---------- Resources ----------
function renderResourcesTab() {
  let body = "";
  for (const res of character.resources || []) {
    const max = resolveValue(res.max);
    if (res.poolType === "pips") {
      const pips = runtime.resources[res.id] || [];
      const pipsHtml = Array.from({length: max}, (_, i) =>
        `<div class="pip${res.pipClass ? " " + esc(res.pipClass) : ""}${pips[i] ? " used" : ""}" data-resource="${esc(res.id)}" data-idx="${i}"></div>`
      ).join("");
      body += `<div class="section-head">${esc(res.display)}</div><div class="pip-row"><div class="pip-label">${esc(res.display)}<span class="pip-sub">${max} total · refreshes on <strong>${esc(refreshLabel(res.refresh))}</strong></span></div><div class="pips">${pipsHtml}</div></div>${res.note ? `<div class="placeholder-note">${esc(res.note)}</div>` : ""}`;
    }
  }
  return body;
}
function refreshLabel(r) { return { shortRest:"Short Rest", longRest:"Long Rest", longRestHalf:"Long Rest (up to half)", dawn:"Dawn", dusk:"Dusk", endOfCombat:"End of Combat" }[r] || r; }

// ---------- Inventory ----------
function renderInventoryTab() {
  const inv = character.inventory || [];
  const wish = character.wishlist || [];
  const items = inv.map(i => `<div class="item"><div class="item-name">${esc(i.name)}${i.quantity > 1 ? ` × ${i.quantity}` : ""}</div><div class="item-desc">${esc(i.description || "")}</div></div>`).join("");
  const wishItems = wish.map(i => `<div class="item"><div class="item-name">${esc(i.name)}</div><div class="item-desc">${esc(i.description || "")}</div></div>`).join("");
  return `<div class="section-head">Inventory</div><div class="inventory-grid">${items}</div>${wish.length ? `<div class="section-head">Upgrade Wishlist</div><div class="inventory-grid">${wishItems}</div>` : ""}`;
}

// ---------- Background ----------
function renderBackgroundTab() {
  const n = character.narrative || {};
  const id = character.identity || {};
  const sections = [];
  const hasBackstoryTab = (character.tabs || []).some(t => t.id === "backstory");

  const identityBits = [];
  if (id.name) identityBits.push(`<strong>Name:</strong> <strong>${esc(id.name)}</strong>${id.birthName ? ` <span style="color:var(--text-muted);">(birth name: <em>${esc(id.birthName)}</em>)</span>` : ""}`);
  if (character.species?.name) identityBits.push(`<strong>Species:</strong> ${esc(character.species.name)}`);
  if (id.pronouns)  identityBits.push(`<strong>Pronouns:</strong> ${esc(id.pronouns)}`);
  if (id.age)       identityBits.push(`<strong>Age:</strong> ${esc(id.age)}`);
  if (id.height)    identityBits.push(`<strong>Height:</strong> ${esc(id.height)}`);
  if (id.heritage)  identityBits.push(`<strong>Heritage:</strong> ${esc(id.heritage)}`);
  if (id.alignment) identityBits.push(`<strong>Alignment:</strong> ${esc(id.alignment)}`);
  if (identityBits.length) sections.push({ head:"Identity", body:`<p>${identityBits.join("</p><p>")}</p>` });

  if (n.knownAs?.chant) sections.push({ head:"Known As — the town's chant", body:`<div class="quote" style="font-size:16px;"><em>"${esc(n.knownAs.chant)}"</em></div>${n.knownAs.chantNote ? `<p style="font-size:12px;color:var(--text-dim);margin-top:8px;">${esc(n.knownAs.chantNote)}</p>` : ""}` });
  if (n.flavorLine) sections.push({ head:"Flavor — the concept in one line", body:`<p><em>"${esc(n.flavorLine)}"</em></p>${n.flavorNote ? `<p class="placeholder-note">${esc(n.flavorNote)}</p>` : ""}` });
  if (n.personalityTraits?.length) sections.push({ head:"Personality Traits", body: n.personalityTraits.map(t => `<p>• ${esc(t)}</p>`).join("") });
  if (n.ideals?.length) sections.push({ head:"Ideals", body: n.ideals.map(t => `<p>• ${esc(t)}</p>`).join("") });
  if (n.bonds?.length)  sections.push({ head:"Bonds",  body: n.bonds.map(t => `<p>• ${esc(t)}</p>`).join("") });
  if (n.flaws?.length)  sections.push({ head:"Flaws",  body: n.flaws.map(t => `<p>• ${esc(t)}</p>`).join("") });
  if (n.physicalDescription) sections.push({ head:"Physical Description", body:`<p class="placeholder-note">${esc(n.physicalDescription)}</p>` });

  // Only include the full backstory here if there's no dedicated Backstory tab
  if (!hasBackstoryTab && n.backstoryFull) {
    const dm = n.dmHook || n.dmHooks;
    sections.push({ head:"Full Backstory", body:`<div>${renderText(n.backstoryFull)}</div>${dm ? `<p style="font-size:11px;color:var(--text-muted);font-style:italic;margin-top:8px;">${esc(dm)}</p>` : ""}` });
  }

  return sections.map(s => `<div class="section-head">${esc(s.head)}</div><div class="card"><div class="card-body">${s.body}</div></div>`).join("");
}

// ---------- Backstory (read-only prose) ----------
function renderBackstoryTab() {
  const n = character.narrative || {};
  if (!n.backstoryFull) return `<p style="color:var(--text-muted);">(No backstory written.)</p>`;
  const dm = n.dmHook || n.dmHooks;
  return `<div class="card"><div class="card-body backstory-prose">${renderText(n.backstoryFull)}${dm ? `<p style="font-size:11px;color:var(--text-muted);font-style:italic;margin-top:16px;border-top:1px dotted rgba(255,255,255,0.05);padding-top:12px;"><strong>DM Hooks:</strong> ${esc(dm)}</p>` : ""}</div></div>`;
}

// ---------- Notes (markdown-aware) ----------
function renderNotesTab() {
  const mode = runtime.notesMode === "preview" ? "preview" : "write";
  const notes = runtime.userNotes || "";
  const placeholder = "Combat log, DM rulings, NPC names, loot, session recap, questions to ask at the table…\n\n# Heading\n## Subheading\n**bold**, *italic*, `code`, [link](https://example.com)\n- list item\n1. numbered item\n> blockquote\n---";
  const writeActive   = mode === "write"   ? "active" : "";
  const previewActive = mode === "preview" ? "active" : "";
  const body = mode === "write"
    ? `<textarea class="backstory-area" id="user-notes" oninput="onUserNotesChange()" placeholder="${esc(placeholder)}">${esc(notes)}</textarea>
       <div class="notes-actions"><span id="user-notes-status">Saved</span><button class="btn" onclick="clearUserNotes()">Clear notes</button></div>`
    : `<div class="notes-preview">${notes.trim() ? renderMarkdown(notes) : '<p style="color:var(--text-muted);font-style:italic;">No notes yet — switch to Write to add some.</p>'}</div>`;
  return `<div class="section-head">Session Notes</div><div class="card"><div class="card-body"><div class="notes-mode-toggle"><button class="btn-xs ${writeActive}" onclick="setNotesMode('write')">Write</button><button class="btn-xs ${previewActive}" onclick="setNotesMode('preview')">Preview</button><span style="flex:1"></span><span style="font-size:11px;color:var(--text-muted);font-style:italic;">Markdown supported — preview to see formatting</span></div>${body}</div></div>`;
}

function setNotesMode(mode) {
  runtime.notesMode = mode === "preview" ? "preview" : "write";
  saveRuntime();
  const tab = document.querySelector('[data-tab-id="notes"]');
  if (tab) tab.innerHTML = renderNotesTab();
}

// ---------- Stances ----------
function renderStances(cfg) {
  const stances = (cfg.stances || []).map(s => {
    const pills = (s.statPills || []).map(p => `<div class="stat-pill"><strong>${esc(p.label)}</strong> ${esc(p.value)}</div>`).join("");
    const body = (s.body || []).map(p => `<p>${esc(p)}</p>`).join("");
    return `<div class="stance-block ${s.active ? "" : "inactive"}"><h3>${esc(s.name)}</h3>${s.tagline ? `<div class="tagline">${esc(s.tagline)}</div>` : ""}${pills ? `<div class="stat-pills">${pills}</div>` : ""}<div class="card-body">${body}</div></div>`;
  }).join("");
  return `${cfg.intro ? `<p style="font-size:13px;color:var(--text-dim);margin-bottom:14px;">${esc(cfg.intro)}</p>` : ""}${stances}${cfg.footer ? `<div class="quote">${esc(cfg.footer)}</div>` : ""}`;
}

// ============ EVENTS ============
function adjustHP(delta) {
  const oldHP = runtime.hp.current;
  runtime.hp.current = Math.max(0, Math.min(character.hp.max + runtime.hp.temp, runtime.hp.current + delta));
  // Leaving 0 HP clears death saves; entering 0 HP keeps them (start rolling)
  if (oldHP === 0 && runtime.hp.current > 0) runtime.deathSaves = { successes: 0, failures: 0 };
  document.getElementById("hp-current").value = runtime.hp.current;
  saveRuntime();
  renderPlayStateBar();
}
function onHPChange() {
  const oldHP = runtime.hp.current;
  const cur = parseInt(document.getElementById("hp-current").value) || 0;
  const temp = parseInt(document.getElementById("hp-temp").value) || 0;
  runtime.hp.current = Math.max(0, Math.min(character.hp.max + temp, cur));
  runtime.hp.temp = Math.max(0, temp);
  if (oldHP === 0 && runtime.hp.current > 0) runtime.deathSaves = { successes: 0, failures: 0 };
  saveRuntime();
  renderPlayStateBar();
}
function toggleInspiration() {
  runtime.inspiration = !runtime.inspiration;
  document.getElementById("inspiration-toggle").classList.toggle("active", runtime.inspiration);
  saveRuntime();
}
function wireFilterChips() {
  document.querySelectorAll(".filter-chips").forEach(group => {
    const groupName = group.dataset.filterGroup;
    group.querySelectorAll(".chip").forEach(chip => {
      chip.onclick = () => {
        const filter = chip.dataset.filter;
        runtime.activeFilters[groupName] = filter;
        group.querySelectorAll(".chip").forEach(c => c.classList.toggle("active", c === chip));
        applyFilter(group.closest(".tab-content"), groupName, filter);
        saveRuntime();
      };
    });
    applyFilter(group.closest(".tab-content"), groupName, runtime.activeFilters[groupName] || "all");
  });
}
function applyFilter(tabEl, groupName, filter) {
  if (!tabEl) return;
  tabEl.querySelectorAll(".card").forEach(card => {
    let matches;
    if (filter === "all") matches = true;
    else if (groupName === "actions")  matches = (card.dataset.categories || "").split(/\s+/).includes(filter);
    else if (groupName === "features") matches = card.dataset.sourcetype === filter;
    else if (groupName === "spells") {
      const m = filter.match(/^lvl(\d)$/);
      if (filter === "cantrip") matches = card.dataset.spellLevel === "0";
      else if (m)               matches = card.dataset.spellLevel === m[1];
      else if (filter === "conc")   matches = card.dataset.conc === "true";
      else if (filter === "ritual") matches = card.dataset.ritual === "true";
      else if (filter === "circle") matches = card.dataset.circle === "true";
      else matches = true;
    } else matches = true;
    card.classList.toggle("hidden", !matches);
  });
  tabEl.querySelectorAll(".section-head").forEach(head => {
    let hasVisible = false;
    let sib = head.nextElementSibling;
    while (sib && !sib.classList.contains("section-head")) {
      if (sib.classList.contains("card") && !sib.classList.contains("hidden")) { hasVisible = true; break; }
      sib = sib.nextElementSibling;
    }
    head.classList.toggle("empty", !hasVisible);
  });
}
function togglePip(resourceId, idx) {
  const arr = runtime.resources[resourceId];
  if (!Array.isArray(arr)) return;

  // Special case: hit-die resources open a spend modal when going unused → used.
  // Going used → unused is a plain toggle (mistake recovery).
  const res = (character.resources || []).find(r => r.id === resourceId);
  if (res?.hitDie && !arr[idx]) {
    openHitDieModal(resourceId, idx, res);
    return;
  }

  arr[idx] = !arr[idx];
  saveRuntime();
  syncPipVisuals(resourceId, arr);
}

function syncPipVisuals(resourceId, arr) {
  // Sync every pip matching this resource/idx across every tab (Resources, Spells, Actions)
  document.querySelectorAll(`.pip[data-resource="${CSS.escape(resourceId)}"]`).forEach(pip => {
    const i = parseInt(pip.dataset.idx);
    pip.classList.toggle("used", !!arr[i]);
  });
  // Update each visible resource-count on action cards for this resource
  document.querySelectorAll(`.card-resource`).forEach(el => {
    const anyPip = el.querySelector(`.pip[data-resource="${CSS.escape(resourceId)}"]`);
    if (!anyPip) return;
    const remaining = arr.filter(v => !v).length;
    const countEl = el.querySelector(".card-resource-count");
    if (countEl) countEl.textContent = `${remaining}/${arr.length}`;
  });
}

// ---------- Hit Die spending ----------
let pendingHitDie = null;

function openHitDieModal(resourceId, idx, res) {
  const conMod = derived.abilities.CON.mod;
  pendingHitDie = { resourceId, pipIdx: idx, hitDie: res.hitDie, conMod };

  const desc = `Roll one ${esc(res.hitDie)}, add your CON mod (${fmt(conMod)}), and regain that many HP. Minimum 1.`;
  document.getElementById("hit-die-desc").innerHTML = desc;
  const input = document.getElementById("hit-die-roll");
  input.value = "";
  document.getElementById("hit-die-total").textContent = "";
  input.oninput = updateHitDieTotalPreview;
  input.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); confirmHitDieSpend(); } };
  document.getElementById("hit-die-modal").classList.add("active");
  setTimeout(() => input.focus(), 50);
}

function updateHitDieTotalPreview() {
  if (!pendingHitDie) return;
  const roll = parseInt(document.getElementById("hit-die-roll").value);
  if (isNaN(roll) || roll < 1) {
    document.getElementById("hit-die-total").textContent = "";
    return;
  }
  const heal = Math.max(1, roll + pendingHitDie.conMod);
  document.getElementById("hit-die-total").textContent = `= +${heal} HP`;
}

function closeHitDieModal() {
  document.getElementById("hit-die-modal").classList.remove("active");
  pendingHitDie = null;
}

function confirmHitDieSpend() {
  if (!pendingHitDie) return;
  const roll = parseInt(document.getElementById("hit-die-roll").value);
  if (isNaN(roll) || roll < 1) {
    showToast("Enter a valid roll.", "error");
    return;
  }
  const heal = Math.max(1, roll + pendingHitDie.conMod);

  // Mark the die spent
  const arr = runtime.resources[pendingHitDie.resourceId];
  if (Array.isArray(arr)) arr[pendingHitDie.pipIdx] = true;

  // Apply healing (clamped to max + temp HP)
  const cap = character.hp.max + (runtime.hp.temp || 0);
  runtime.hp.current = Math.min(cap, runtime.hp.current + heal);

  saveRuntime();
  document.getElementById("hp-current").value = runtime.hp.current;
  syncPipVisuals(pendingHitDie.resourceId, arr);

  const modNote = pendingHitDie.conMod >= 0 ? `+${pendingHitDie.conMod}` : `${pendingHitDie.conMod}`;
  showToast(`Spent 1 ${pendingHitDie.hitDie}. Rolled ${roll} ${modNote} = +${heal} HP.`);
  closeHitDieModal();
}
document.addEventListener("click", (e) => {
  const pip = e.target.closest(".pip");
  if (pip && pip.dataset.resource) {
    togglePip(pip.dataset.resource, parseInt(pip.dataset.idx));

    toggleConcentration(concBtn.dataset.spellId, concBtn.dataset.spellName);

  }
});

// ---------- Rest modal ----------
function openRest(type) {
  pendingRest = type;
  const modal = document.getElementById("rest-modal");
  document.getElementById("rest-title").textContent = type === "short" ? "Take a Short Rest?" : "Take a Long Rest?";
  const list = document.getElementById("rest-list");
  const items = [];
  items.push(type === "short" ? "1 hour of rest" : "8 hours of rest");
  if (type === "long") {
    items.push(`Restore HP to max (${character.hp.max})`);
    items.push("Temp HP cleared");
    items.push("Heroic Inspiration granted (if feature applies)");
  }
  for (const res of character.resources || []) {
    if (type === "short" && (res.refresh === "shortRest" || res.refresh === "endOfCombat")) items.push(`Refresh ${res.display}`);
    else if (type === "long" && (res.refresh === "longRest" || res.refresh === "shortRest" || res.refresh === "longRestHalf" || res.refresh === "endOfCombat")) {
      if (res.refresh === "longRestHalf") items.push(`Recover half of ${res.display}`);
      else items.push(`Refresh ${res.display}`);
    }
  }
  document.getElementById("rest-desc").textContent = type === "short" ? "Short rest will reset short-rest resources." : "Long rest will heal you to full and reset all long-rest resources.";
  list.innerHTML = "<ul>" + items.map(i => `<li>${esc(i)}</li>`).join("") + "</ul>";
  modal.classList.add("active");
}
function closeRest() {
  document.getElementById("rest-modal").classList.remove("active");
  pendingRest = null;
}
function confirmRest() {
  const type = pendingRest;
  if (type === "long") {
    runtime.hp.current = character.hp.max;
    runtime.hp.temp = 0;
    // 2024: Long Rest reduces exhaustion by 1
    runtime.exhaustion = Math.max(0, (runtime.exhaustion || 0) - 1);
    // Clear death saves (if they were alive enough to take a long rest)
    runtime.deathSaves = { successes: 0, failures: 0 };
  }
  for (const res of character.resources || []) {
    if (res.poolType !== "pips") continue;
    const max = resolveValue(res.max);
    if (type === "short" && (res.refresh === "shortRest" || res.refresh === "endOfCombat")) runtime.resources[res.id] = new Array(max).fill(false);
    else if (type === "long") {
      if (res.refresh === "longRest" || res.refresh === "shortRest" || res.refresh === "endOfCombat") runtime.resources[res.id] = new Array(max).fill(false);
      else if (res.refresh === "longRestHalf") {
        const arr = runtime.resources[res.id] || [];
        const spent = arr.filter(Boolean).length;
        const recover = Math.floor(spent / 2);
        let recovered = 0;
        for (let i = 0; i < arr.length && recovered < recover; i++) if (arr[i]) { arr[i] = false; recovered++; }
      }
    }
  }
  closeRest();
  saveRuntime();
  renderAll();
}

// ============ PLAY-STATE BAR ============
function renderPlayStateBar() {
  const bar = document.getElementById("play-state-bar");
  if (!bar) return;
  const parts = [];

  // Conditions
  const conds = (runtime.conditions || []).map(c =>
    `<span class="condition-pill">${esc(c.name)}${c.note ? ` <em>(${esc(c.note)})</em>` : ""}<button onclick="removeCondition('${esc(c.name)}')" title="Remove">&times;</button></span>`
  ).join("");
  parts.push(`<div class="play-section"><span class="play-label">Conditions</span><div class="conditions-list">${conds}</div><button class="btn-xs" onclick="openConditionMenu(event, this)">+ Add</button></div>`);

  // Concentration (always visible — makes it easy to spot)
  if (runtime.concentration) {
    parts.push(`<div class="play-section"><span class="play-label">Concentrating</span><span class="concentration-pill">${esc(runtime.concentration.spellName)}<button onclick="clearConcentration()" title="Drop concentration">&times;</button></span></div>`);
  } else {
    parts.push(`<div class="play-section"><span class="play-label">Concentrating</span><span style="color:var(--text-muted);font-style:italic;font-size:11px;">— none —</span></div>`);
  }

  // Death saves (only visible when at 0 HP)
  if ((runtime.hp?.current ?? 1) === 0) {
    const ds = runtime.deathSaves || { successes: 0, failures: 0 };
    const sPips = [0,1,2].map(i => `<span class="ds-pip success ${i < ds.successes ? 'used' : ''}" onclick="toggleDeathSave('successes', ${i})"></span>`).join("");
    const fPips = [0,1,2].map(i => `<span class="ds-pip failure ${i < ds.failures  ? 'used' : ''}" onclick="toggleDeathSave('failures', ${i})"></span>`).join("");
    const status = ds.successes >= 3 ? `<span class="ds-status stable">Stabilized</span>`
                 : ds.failures  >= 3 ? `<span class="ds-status dead">Dead</span>` : "";
    parts.push(`<div class="play-section death-saves-section"><span class="play-label">Death Saves</span><span class="ds-pips">${sPips}</span><span class="ds-sep">/</span><span class="ds-pips">${fPips}</span>${status}</div>`);
  }

  // Exhaustion (2024: −2 × level to all d20 tests)
  const ex = runtime.exhaustion || 0;
  const exClass = ex === 0 ? "" : ex < 3 ? "warn" : ex < 5 ? "danger" : "critical";
  const exPenalty = ex > 0 ? `<span class="ex-penalty">−${ex*2} d20 tests</span>` : "";
  parts.push(`<div class="play-section exhaustion-section ${exClass}"><span class="play-label">Exhaustion</span><div class="ex-stepper"><button onclick="adjustExhaustion(-1)" ${ex <= 0 ? "disabled" : ""}>−</button><span class="ex-value">${ex}</span><button onclick="adjustExhaustion(1)" ${ex >= 6 ? "disabled" : ""}>+</button></div>${exPenalty}</div>`);

  bar.innerHTML = parts.join("");
  bar.classList.remove("hidden");
}

// ============ PORTRAIT DRAG-DROP + FILE PICKER + AUTO-OPTIMIZE ============
function setupPortraitDragDrop() {
  // Use delegated listeners on document so re-renders don't lose them
  if (window.__portraitDDSetup) return;
  window.__portraitDDSetup = true;

  document.addEventListener("dragover", e => {
    const target = e.target.closest("[data-portrait-target]");
    if (!target) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "copy";
    target.classList.add("drag-over");
  });
  document.addEventListener("dragleave", e => {
    const target = e.target.closest("[data-portrait-target]");
    if (!target) return;
    if (!target.contains(e.relatedTarget)) target.classList.remove("drag-over");
  });
  document.addEventListener("drop", e => {
    const target = e.target.closest("[data-portrait-target]");
    if (!target) return;
    e.preventDefault();
    target.classList.remove("drag-over");
    const file = e.dataTransfer.files?.[0];
    if (!file) return;
    if (!file.type.startsWith("image/")) {
      showToast("Not an image file.", "error");
      return;
    }
    processDroppedImage(file, target.dataset.portraitTarget);
  });
  // Right-click on any portrait target opens the file picker (power-user shortcut)
  document.addEventListener("contextmenu", e => {
    const target = e.target.closest("[data-portrait-target]");
    if (!target) return;
    e.preventDefault();
    openPortraitPicker(target.dataset.portraitTarget);
  });
}

// File picker fallback — click the Replace button or right-click the portrait
function openPortraitPicker(targetKey) {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.onchange = (e) => {
    const file = e.target.files?.[0];
    if (file) processDroppedImage(file, targetKey);
  };
  input.click();
}

async function processDroppedImage(file, targetKey) {
  const cfg = PORTRAIT_TARGETS[targetKey];
  if (!cfg) return;
  const oldSize = file.size;
  showToast(`Processing ${formatBytes(oldSize)} image…`);

  try {
    const dataUrl = await new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload  = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });

    const img = new Image();
    await new Promise((resolve, reject) => {
      img.onload  = resolve;
      img.onerror = reject;
      img.src = dataUrl;
    });

    // Compute crop/scale
    const srcW = img.naturalWidth, srcH = img.naturalHeight;
    let sx = 0, sy = 0, sw = srcW, sh = srcH, targetW, targetH;
    if (cfg.squareCrop) {
      const side = Math.min(srcW, srcH);
      sx = (srcW - side) / 2; sy = (srcH - side) / 2;
      sw = side; sh = side;
      targetW = targetH = Math.min(cfg.maxSide, side);
    } else {
      const ratio = Math.min(cfg.maxSide / srcW, cfg.maxSide / srcH, 1);
      targetW = Math.round(srcW * ratio);
      targetH = Math.round(srcH * ratio);
    }

    const canvas = document.createElement("canvas");
    canvas.width  = targetW;
    canvas.height = targetH;
    canvas.getContext("2d").drawImage(img, sx, sy, sw, sh, 0, 0, targetW, targetH);

    // Try WebP first (better compression); fall back to JPEG if browser lacks WebP encode
    let optimized = canvas.toDataURL("image/webp", cfg.quality);
    if (!optimized.startsWith("data:image/webp")) {
      optimized = canvas.toDataURL("image/jpeg", cfg.quality);
    }

    // Rough byte size (base64 overhead ~4:3)
    const base64 = optimized.split(",")[1] || "";
    const newSize = Math.round(base64.length * 0.75);

    // Write into character (both src and alt if missing)
    if (!character[targetKey]) character[targetKey] = {};
    character[targetKey].src = optimized;
    if (!character[targetKey].alt) character[targetKey].alt = (character.identity?.name || "portrait") + " — " + targetKey;

    // Persist as inline so edits survive across refreshes (supersedes any fetch ref)
    saveLastCharacterRef({ type: "inline", json: character });

    // Re-render the affected UI
    renderTopBar();
    if (targetKey === "portrait") reRenderTab("overview");

    const savings = oldSize > 0 ? Math.round((1 - newSize / oldSize) * 100) : 0;
    showToast(`Optimized: ${formatBytes(oldSize)} → ${formatBytes(newSize)}${savings > 0 ? ` (saved ${savings}%)` : ""}`);
  } catch (err) {
    console.error(err);
    showToast("Could not process image: " + err.message, "error");
  }
}

function formatBytes(n) {
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return (n / 1024).toFixed(0) + " KB";
  return (n / 1024 / 1024).toFixed(1) + " MB";
}

function showToast(msg, variant) {
  document.querySelectorAll(".toast").forEach(t => t.remove());
  const toast = document.createElement("div");
  toast.className = "toast" + (variant === "error" ? " error" : "");
  toast.textContent = msg;
  document.body.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add("show"));
  setTimeout(() => {
    toast.classList.remove("show");
    setTimeout(() => toast.remove(), 300);
  }, 2600);
}

function applyCharacter(json) {
  // Preserve embedded (data-URI) portraits across same-character reloads.
  // Rationale: dragging an image onto the portrait embeds it as a data URI in the
  // in-memory character + localStorage. But re-loading the on-disk JSON (via file
  // picker or auto-fetch) has only the relative path — which would otherwise blow
  // away the embed. When loading the SAME character (matched by storageKey), keep
  // any existing data URIs rather than replacing them with disk paths.
  try {
    const lastRef = loadLastCharacterRef();
    const prev = lastRef?.type === "inline" ? lastRef.json : null;
    if (prev && prev.storageKey && json.storageKey && prev.storageKey === json.storageKey) {
      for (const key of ["portrait", "thumbnail"]) {
        const incoming = json[key]?.src || "";
        const cached   = prev[key]?.src   || "";
        // Only override if the incoming isn't already a data URI and the cached one IS.
        if (!incoming.startsWith("data:") && cached.startsWith("data:")) {
          json[key] = { ...(json[key] || {}), src: cached, alt: json[key]?.alt || prev[key]?.alt };
        }
      }
    }
  } catch(_) { /* best-effort merge */ }

  character = json;
  document.body.dataset.theme = json.theme || "default";
  derived = derive();
  runtime = loadRuntime();
  const loader = document.getElementById("loader");
  if (loader) loader.classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  renderAll();
}

// ============ FILE LOADING ============
function saveLastCharacterRef(ref) { try { localStorage.setItem(LAST_CHAR_KEY, JSON.stringify(ref)); } catch(e) {} }
function loadLastCharacterRef()    { try { return JSON.parse(localStorage.getItem(LAST_CHAR_KEY) || "null"); } catch(e) { return null; } }

async function tryFetchDefault(path) {
  try {
    const res = await fetch(path);
    if (!res.ok) return false;
    const json = await res.json();
    applyCharacter(json);
    saveLastCharacterRef({ type:"fetch", path });
    return true;
  } catch(e) { return false; }
}
function onFileInput(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const json = JSON.parse(reader.result);
      // Detect the type of file by content shape
      if (json.type === "charsheet-session-backup") {
        importSessionState(json);
      } else if (json.schemaVersion && json.abilities_list) {
        applyCharacter(json);
        saveLastCharacterRef({ type:"inline", json });
      } else {
        alert("Couldn't identify file — expected a character JSON or a session backup.");
      }
    } catch(err) { alert("Could not parse JSON: " + err.message); }
    // Reset file input so re-selecting the same file fires change again
    try { e.target.value = ""; } catch(_) {}
  };
  reader.readAsText(file);
}

// Folder picker — primary character-loading flow. Grabs every file in the picked folder
// (JSON + portraits) so we can auto-embed portraits into the character without needing
// drag-drop or HTTP. Works on file:// in Chrome/Firefox/Safari.
async function onFolderInput(e) {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;

  // Pick the shallowest .json file in the tree (typically character.json at the folder root)
  const jsonFiles = files.filter(f => f.name.toLowerCase().endsWith(".json"));
  if (!jsonFiles.length) {
    showToast("No .json file found in that folder.", "error");
    try { e.target.value = ""; } catch(_) {}
    return;
  }
  jsonFiles.sort((a, b) => a.webkitRelativePath.split("/").length - b.webkitRelativePath.split("/").length);
  const jsonFile = jsonFiles[0];

  let json;
  try { json = JSON.parse(await jsonFile.text()); }
  catch(err) { showToast("Could not parse " + jsonFile.name + ": " + err.message, "error"); try { e.target.value = ""; } catch(_) {} return; }

  // Session backups are self-contained — no folder-relative assets to merge
  if (json.type === "charsheet-session-backup") {
    importSessionState(json);
    try { e.target.value = ""; } catch(_) {}
    return;
  }
  if (!json.schemaVersion || !json.abilities_list) {
    showToast(jsonFile.name + " doesn't look like a character JSON.", "error");
    try { e.target.value = ""; } catch(_) {}
    return;
  }

  // Index every file by its webkitRelativePath for portrait lookup
  const byPath = new Map();
  for (const f of files) byPath.set(f.webkitRelativePath, f);

  // Embed portraits by matching the JSON's declared path against files in the folder.
  // JSON typically declares paths like "characters/vaerith/portraits/full.png"; the folder
  // picker's webkitRelativePath is rooted at the SELECTED folder, so we match on suffixes.
  let embedCount = 0;
  for (const key of ["portrait", "thumbnail"]) {
    const src = json[key]?.src;
    if (!src || src.startsWith("data:") || /^https?:\/\//i.test(src)) continue;
    const filename = src.split("/").pop();
    const parent = src.split("/").slice(-2, -1)[0] || "";
    // Prefer match on "<parent>/<filename>" (e.g. portraits/full.png); fall back to filename alone
    let match = null;
    if (parent) {
      for (const [path, f] of byPath) if (path.endsWith(`${parent}/${filename}`)) { match = f; break; }
    }
    if (!match) for (const [path, f] of byPath) if (path.endsWith(`/${filename}`) || path === filename) { match = f; break; }
    if (!match) continue;
    try {
      const dataUrl = await new Promise((resolve, reject) => {
        const r = new FileReader(); r.onload = () => resolve(r.result); r.onerror = reject; r.readAsDataURL(match);
      });
      json[key].src = dataUrl;
      embedCount++;
    } catch(err) { console.warn("Could not embed " + key + ":", err); }
  }

  applyCharacter(json);
  saveLastCharacterRef({ type: "inline", json });
  const name = json.identity?.name || "character";
  showToast(embedCount > 0 ? `Loaded ${name} · embedded ${embedCount} portrait${embedCount === 1 ? "" : "s"}.` : `Loaded ${name}.`);
  try { e.target.value = ""; } catch(_) {}
}

// ============ SESSION STATE SAVE / IMPORT ============
// A session backup bundles: the character definition + the full runtime state
// (HP, pips used, conditions, concentration, notes, etc.), so a single file
// can restore exactly where you left off on any device / exported HTML.
function saveSessionState() {
  if (!character || !runtime) return;
  const backup = {
    type: "charsheet-session-backup",
    schemaVersion: 1,
    savedAt: new Date().toISOString(),
    characterName: character.identity?.name || "character",
    storageKey: character.storageKey || null,
    character: character,
    runtime: runtime
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const slug = (character.identity?.name || "session").toLowerCase().replace(/[^a-z0-9]+/g, "-");
  const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");
  const a = document.createElement("a");
  a.href = url;
  a.download = `${slug}-session-${ts}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("Session state saved.");
}

function importSessionState(backup) {
  if (!backup || backup.type !== "charsheet-session-backup" || !backup.character || !backup.runtime) {
    showToast("Not a valid session backup file.", "error");
    return;
  }
  // Apply the character first (sets storageKey, schema, etc.)
  applyCharacter(backup.character);
  saveLastCharacterRef({ type: "inline", json: backup.character });
  // Then overwrite runtime with the saved snapshot
  try { localStorage.setItem(character.storageKey || "charsheet_default", JSON.stringify(backup.runtime)); } catch(_) {}
  runtime = loadRuntime();
  renderAll();
  const when = backup.savedAt ? ` (saved ${new Date(backup.savedAt).toLocaleString()})` : "";
  showToast(`Session restored — ${backup.characterName || "character"}${when}.`);
}

// File picker fallback for session import (used by the 📤 button in both main app and exported HTML)
function openSessionImportPicker() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,application/json";
  input.onchange = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const json = JSON.parse(reader.result);
        if (json.type === "charsheet-session-backup") importSessionState(json);
        else showToast("Not a valid session backup — use 📂 for character JSONs.", "error");
      } catch(err) { showToast("Could not parse JSON: " + err.message, "error"); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ============ STANDALONE EXPORT ============
async function exportStandalone() {
  const exportBtn = document.getElementById("export-standalone");
  if (exportBtn) { exportBtn.disabled = true; exportBtn.textContent = "…"; }
  try {
    // Read CSS and JS straight from the inlined <style> and <script> elements — no fetch needed
    const cssText = document.getElementById("app-styles")?.textContent || "";
    const jsText  = document.getElementById("app-js")?.textContent || "";
    if (!cssText || !jsText) throw new Error("Could not read app assets from the page");

    // Favicon — already inline in this page as a data URI on the <link rel="icon">
    let faviconInline = "";
    const iconLink = document.querySelector('link[rel="icon"]');
    if (iconLink?.href?.startsWith("data:")) {
      faviconInline = `<link rel="icon" type="image/svg+xml" href="${esc(iconLink.href)}">`;
    }

    const embedded = JSON.parse(JSON.stringify(character));
    const portraitNote = await embedImageField(embedded, "portrait");
    const thumbNote    = await embedImageField(embedded, "thumbnail");

    const title = esc(embedded.identity?.name || "Character Sheet");
    const slug  = (embedded.identity?.name || "character").toLowerCase().replace(/[^a-z0-9]+/g, "-");
    const html  = buildStandaloneHtml({ title, faviconInline, cssText, jsText, characterJson: JSON.stringify(embedded) });

    const blob = new Blob([html], { type:"text/html" });
    const url  = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `${slug}-sheet.html`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);

    const warnings = [portraitNote, thumbNote].filter(Boolean);
    if (warnings.length) {
      // Soft warning via toast — the export still works (initials render as fallback in the missing cases)
      showToast("Exported with caveats — see console.", "error");
      console.warn("Export caveats:\n" + warnings.join("\n"));
    } else {
      showToast("Exported successfully.");
    }
  } catch (e) {
    alert("Export failed: " + e.message);
  } finally {
    if (exportBtn) { exportBtn.disabled = false; exportBtn.innerHTML = "&#x1F4E5;"; }
  }
}

// Returns a warning string if the image exists but couldn't be embedded. Silently clears src if the file doesn't exist.
async function embedImageField(obj, key) {
  const src = obj?.[key]?.src;
  if (!src) return null;
  if (src.startsWith("data:") || /^https?:\/\//i.test(src)) return null; // already embeddable / remote

  // Path A: fetch (works on HTTP; blocked on file://)
  try {
    const res = await fetch(src);
    if (res.ok) {
      const blob = await res.blob();
      const dataUrl = await new Promise((resolve, reject) => {
        const r = new FileReader(); r.onload = () => resolve(r.result); r.onerror = reject; r.readAsDataURL(blob);
      });
      obj[key].src = dataUrl;
      return null;
    }
  } catch(e) { /* fall through */ }

  // Path B: try loading via <img>. Distinguish "image exists" from "image doesn't exist".
  const result = await new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      try {
        const canvas = document.createElement("canvas");
        canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
        canvas.getContext("2d").drawImage(img, 0, 0);
        resolve({ loaded: true, dataUrl: canvas.toDataURL("image/png") });
      } catch (err) {
        // Loaded but the canvas was tainted — file exists, we can't read it
        resolve({ loaded: true, dataUrl: null });
      }
    };
    img.onerror = () => resolve({ loaded: false, dataUrl: null });
    img.src = src;
  });

  if (result.dataUrl) { obj[key].src = result.dataUrl; return null; }

  // Embed failed (Chrome file:// cross-origin taint, or image missing). Leave the src untouched — if the exported
  // HTML is opened in a folder where the relative path resolves, the image still renders. The "Replace"
  // button / drag-drop flow is the way to get portraits permanently embedded into the character JSON.
  const action = `drag-drop the image onto the ${key === "thumbnail" ? "thumbnail circle" : "portrait"} (or click the Replace button) in the app, then export again.`;
  return result.loaded
    ? `${key}: file exists but Chrome's file:// sandbox blocks embedding it. To embed permanently: ${action}`
    : `${key}: file not found at ${src}. To set a portrait: ${action}`;
}

function buildStandaloneHtml({ title, faviconInline, cssText, jsText, characterJson }) {
  const skeleton = `
<div id="app" class="hidden">
  <div class="top-bar">
    <div class="char-identity">

      <div class="char-name-block">
        <div class="char-name" id="char-name"></div>
        <div class="sub" id="char-subtitle"></div>
      </div>
    </div>
    <div class="top-stats">
      <div class="stat-block hp-block">
        <div class="label">Hit Points</div>
        <div class="hp-display">
          <button class="btn-icon" onclick="adjustHP(-1)">&minus;</button>
          <input type="number" id="hp-current">
          <span class="sep">/</span>

          <button class="btn-icon" onclick="adjustHP(1)">+</button>
        </div>
