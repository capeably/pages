<style id="app-styles">

:root {
  --accent: #f59e0b;
  --accent-dim: #92590a;
  --accent-glow: rgba(245, 158, 11, 0.18);

  --bg: #0e0f12;
  --bg-panel: #15171c;
  --bg-card: #1c1f26;
  --bg-hover: #242832;
  --border: #2d3139;
  --text: #e5e7eb;
  --text-dim: #9ca3af;
  --text-muted: #6b7280;
  --danger: #ef4444;
  --warn: #f59e0b;
  --info: #60a5fa;
  --necrotic: #a855f7;
  --psychic: #ec4899;
  --radiant: #fbbf24;
  --concentration: #22d3ee;
}

/* Per-character theme overrides — set on <body data-theme="..."> */
body[data-theme="green-leaf"] {
  --accent: #7ce38b;
  --accent-dim: #3f7a4a;
  --accent-glow: rgba(124, 227, 139, 0.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }
h1, h2, h3, h4 { font-weight: 600; }
a { color: var(--accent); }
.hidden { display: none !important; }

/* ============ LOADER ============ */
.loader-overlay { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: var(--bg); }
.loader-box { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 40px; text-align: center; max-width: 480px; width: 90%; }
.loader-box h1 { color: var(--accent); text-shadow: 0 0 12px var(--accent-glow); margin-bottom: 12px; }
.loader-box p { color: var(--text-dim); margin-bottom: 18px; font-size: 14px; }
.loader-actions { margin: 20px 0; }
.loader-hint { font-size: 12px; color: var(--text-muted); font-style: italic; margin-top: 12px; }

/* ============ TOP BAR ============ */
.top-bar { display: flex; flex-wrap: wrap; gap: 12px 16px; align-items: center; padding: 12px 20px; background: linear-gradient(180deg, #1a1d24 0%, #15171c 100%); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.char-identity { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1 1 260px; }
.char-thumbnail { width: 56px; height: 56px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid var(--accent-dim); background: var(--bg-card); }
.char-thumbnail img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
.thumb-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: var(--accent); background: var(--bg-card); user-select: none; }
.char-name-block { min-width: 0; flex: 1 1 auto; overflow: hidden; }
.char-name { font-size: 22px; color: var(--accent); text-shadow: 0 0 12px var(--accent-glow); letter-spacing: 0.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.char-name-block .sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.top-stats { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.top-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.stat-block { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; text-align: center; min-width: 80px; }
.stat-block .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
.stat-block .value { font-size: 20px; font-weight: 700; color: var(--text); margin-top: 2px; }
.stat-block .sub { font-size: 10px; color: var(--text-muted); }
.hp-block { min-width: 160px; }
.hp-display { display: flex; align-items: center; gap: 6px; justify-content: center; margin-top: 4px; }
.hp-display input { width: 50px; background: transparent; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 2px 4px; text-align: center; font-size: 16px; font-weight: 700; }
.hp-display #hp-max { font-size: 16px; font-weight: 700; padding: 0 6px; }
.hp-display .sep { color: var(--text-muted); }
.btn-icon { background: var(--bg-hover); border: 1px solid var(--border); color: var(--text); width: 22px; height: 22px; border-radius: 4px; cursor: pointer; font-size: 14px; line-height: 1; }
.btn-icon:hover { background: var(--accent-dim); color: var(--bg); }
.temp-hp { font-size: 11px; color: var(--info); margin-top: 2px; }
.temp-hp input { width: 40px; background: transparent; color: var(--info); border: 1px solid var(--border); border-radius: 4px; padding: 0 4px; font-size: 11px; }
.inspiration-toggle { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--warn); background: var(--bg-card); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--warn); transition: all 0.2s; }
.inspiration-toggle.active { background: var(--warn); color: var(--bg); box-shadow: 0 0 16px rgba(245, 158, 11, 0.5); }
.rest-buttons { display: flex; gap: 8px; }
.rest-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; }
.rest-btn.short { border-color: var(--info); color: var(--info); }
.rest-btn.long { border-color: var(--accent); color: var(--accent); }
.rest-btn:hover { background: var(--bg-hover); }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 16px; }
.btn-ghost:hover { color: var(--accent); border-color: var(--accent-dim); }

/* ============ ADVISORY BANNER ============ */
.advisory-banner { position: relative; margin: 8px 16px 0; padding: 10px 38px 10px 14px; border: 1px solid #b45309; border-left: 4px solid #f59e0b; background: rgba(245, 158, 11, 0.08); border-radius: 6px; font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }
.advisory-banner strong { color: #fbbf24; }
.advisory-banner .advisory-close { position: absolute; top: 4px; right: 6px; width: 22px; height: 22px; border: none; background: transparent; color: #fbbf24; font-size: 18px; line-height: 1; cursor: pointer; padding: 0; border-radius: 4px; }

/* ============ MAIN LAYOUT ============ */
.main-layout { display: grid; grid-template-columns: 300px 1fr; gap: 16px; padding: 16px; }
@media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }

.sidebar-panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
.sidebar-panel h3 { color: var(--accent); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

.ability-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.ability-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 6px; text-align: center; position: relative; }
.ability-box.prof { border-color: var(--accent-dim); }
.ability-box .name { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
.ability-box .mod { font-size: 18px; font-weight: 700; color: var(--accent); margin-top: 2px; }
.ability-box .score { font-size: 11px; color: var(--text-muted); }
.ability-box .save { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
.ability-box.prof .save { color: var(--warn); }

.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 12px; border-bottom: 1px dotted rgba(255,255,255,0.05); }
.stat-row:last-child { border-bottom: none; }
.stat-row .val { color: var(--accent); font-weight: 600; }

.skill-row { display: grid; grid-template-columns: 14px 32px 1fr auto; gap: 6px; align-items: center; padding: 3px 0; font-size: 12px; }
.skill-dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid var(--text-muted); margin: 0 auto; }
.skill-dot.prof { background: var(--accent); border-color: var(--accent); }
.skill-dot.expertise { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 2px var(--bg-panel), 0 0 0 3px var(--accent); }
.skill-abil { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
.skill-name { color: var(--text-dim); }
.skill-mod { color: var(--accent); font-weight: 600; }

/* ============ MAIN CONTENT ============ */
.main-content { min-width: 0; }
.tab-bar { display: flex; flex-wrap: wrap; gap: 4px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 4px; margin-bottom: 12px; }
.tab-btn { background: transparent; border: none; color: var(--text-dim); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
.tab-btn:hover { color: var(--text); background: var(--bg-hover); }
.tab-btn.active { background: var(--accent-dim); color: var(--text); }

.tab-content { display: none; }
.tab-content.active { display: block; }

.filter-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.chip { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); padding: 4px 12px; border-radius: 999px; font-size: 11px; cursor: pointer; transition: all 0.15s; }
.chip:hover { border-color: var(--accent-dim); color: var(--text); }
.chip.active { background: var(--accent-dim); color: var(--text); border-color: var(--accent); }

.section-head { color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }

.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; transition: border-color 0.15s; }
.card:hover { border-color: var(--accent-dim); }
.card.hidden { display: none; }

.card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
.card-title { font-size: 14px; font-weight: 600; color: var(--text); }
.card-title .sub { font-size: 11px; color: var(--text-muted); font-weight: 400; margin-left: 4px; }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; border: 1px solid transparent; }
.tag.action     { background: rgba(239, 68, 68, 0.15);  color: #fca5a5; border-color: rgba(239, 68, 68, 0.3); }
.tag.bonus      { background: rgba(96, 165, 250, 0.15); color: #93c5fd; border-color: rgba(96, 165, 250, 0.3); }
.tag.reaction   { background: rgba(168, 85, 247, 0.15); color: #c4b5fd; border-color: rgba(168, 85, 247, 0.3); }
.tag.attack     { background: rgba(245, 158, 11, 0.15); color: #fcd34d; border-color: rgba(245, 158, 11, 0.3); }
.tag.free       { background: rgba(107, 114, 128, 0.15); color: var(--text-dim); border-color: rgba(107, 114, 128, 0.3); }
.tag.limited    { background: rgba(239, 68, 68, 0.12);  color: #fca5a5; border-color: rgba(239, 68, 68, 0.25); }
.tag.class      { background: rgba(245, 158, 11, 0.15); color: #fcd34d; }
.tag.subclass   { background: rgba(34, 211, 238, 0.15); color: #67e8f9; }
.tag.species    { background: rgba(168, 85, 247, 0.15); color: #c4b5fd; }
.tag.background { background: rgba(124, 227, 139, 0.15); color: #86efac; }
.tag.feat       { background: rgba(236, 72, 153, 0.15); color: #f9a8d4; }
.tag.cantrip    { background: rgba(99, 102, 241, 0.15);  color: #a5b4fc; border-color: rgba(99,102,241,0.3); }
.tag.lvl1       { background: rgba(34, 211, 238, 0.12);  color: #67e8f9; border-color: rgba(34,211,238,0.25); }
.tag.lvl2       { background: rgba(124, 58, 237, 0.15);  color: #c4b5fd; border-color: rgba(124,58,237,0.3); }
.tag.lvl3       { background: rgba(236, 72, 153, 0.15);  color: #f9a8d4; border-color: rgba(236,72,153,0.3); }
.tag.conc       { background: rgba(34, 211, 238, 0.15);  color: var(--concentration); border-color: rgba(34,211,238,0.4); }
.tag.ritual     { background: rgba(168, 85, 247, 0.12);  color: #c4b5fd; border-color: rgba(168,85,247,0.3); }
.tag.circle     { background: rgba(124, 227, 139, 0.15); color: #86efac; border-color: rgba(124,227,139,0.3); }

.card-stats { display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; color: var(--text-dim); padding: 6px 0; border-bottom: 1px dotted rgba(255,255,255,0.05); margin-bottom: 8px; }
.card-stats strong { color: var(--text); }
.card-body { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
.card-body p { margin-bottom: 6px; }
.card-body em { color: var(--text-muted); font-style: italic; }
.card-body strong { color: var(--text); }
.damage { color: var(--warn); font-weight: 600; }

.section-head.empty { display: none; }

/* Inline resource pips on action cards */
.card-resource { display: flex; align-items: center; gap: 10px; margin-top: 8px; padding-top: 8px; border-top: 1px dotted rgba(255,255,255,0.05); font-size: 11px; color: var(--text-dim); flex-wrap: wrap; }
.card-resource-label { font-weight: 600; color: var(--text); }
.card-resource-count { color: var(--accent); font-weight: 700; }
.card-resource .pips { gap: 4px; }
.pip.pip-sm { width: 15px; height: 15px; border-width: 2px; }

/* ============ OVERVIEW ============ */
.overview-simple { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.overview-portrait { float: right; width: 420px; max-width: 50%; margin: 0 0 14px 20px; border-radius: 8px; border: 2px solid var(--accent-dim); cursor: pointer; }
@media (max-width: 700px) { .overview-portrait { float: none; display: block; margin: 0 auto 14px; max-width: 85%; width: auto; } }
.overview-display-name { font-size: 26px; color: var(--accent); text-shadow: 0 0 12px var(--accent-glow); margin-bottom: 4px; }
.overview-subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }
.overview-section-head { color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin: 14px 0 8px; }
.overview-body p { margin-bottom: 10px; color: var(--text-dim); font-size: 14px; line-height: 1.7; }
.overview-body p:first-of-type::first-letter { color: var(--accent); font-size: 1.5em; font-weight: 700; }

/* ============ RESOURCES / PIPS ============ */
.pip-row { display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
.pip-label { font-size: 14px; font-weight: 600; color: var(--text); }
.pip-sub { display: block; font-size: 11px; color: var(--text-muted); font-weight: 400; margin-top: 2px; }
.pips { display: flex; flex-wrap: wrap; gap: 6px; }
.pip { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--accent-dim); background: transparent; cursor: pointer; transition: all 0.15s; }
.pip:hover { border-color: var(--accent); }
.pip.used { background: var(--accent-dim); }
.pip.ki { border-color: var(--warn); }
.pip.ki.used { background: var(--warn); }
.pip.radiant { border-color: var(--danger); }
.pip.radiant.used { background: var(--danger); }
.pip.slot { border-color: var(--info); }
.pip.slot.used { background: var(--info); }
.pip.luck { border-color: var(--warn); }
.pip.luck.used { background: var(--warn); }
.pip.witch { border-color: var(--necrotic); }
.pip.witch.used { background: var(--necrotic); }
.placeholder-note { font-size: 12px; color: var(--text-muted); font-style: italic; padding: 6px 14px 0; margin-bottom: 8px; }

/* ============ FORM CARDS ============ */
.card.form-card { border-left: 4px solid var(--radiant); }

/* ============ SELAK FORMS (custom tab) ============ */
.selak-intro { background: var(--bg-card); border: 1px solid var(--accent-dim); border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 12px; color: var(--text-dim); line-height: 1.7; }
.selak-intro strong { color: var(--accent); }
.selak-form { background: var(--bg-card); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 8px; padding: 16px; margin-bottom: 14px; }
.selak-form.ekek   { border-left-color: var(--danger); }
.selak-form.cahaya { border-left-color: var(--info); }
.selak-form.leyak  { border-left-color: var(--necrotic); }
.selak-form h3 { color: var(--accent); font-size: 15px; margin-bottom: 4px; }
.selak-form h3 .marker { margin-right: 6px; color: var(--warn); }
.selak-form h3 .subtitle { font-size: 12px; color: var(--text-dim); font-weight: 400; margin-left: 6px; }
.selak-form .tagline { font-size: 12px; color: var(--text-dim); font-style: italic; margin-bottom: 10px; }
.selak-form p { margin-bottom: 6px; font-size: 13px; color: var(--text-dim); line-height: 1.6; }
.selak-form p strong { color: var(--text); }

/* ============ PLAYSTYLE STANCES ============ */
.stance-block { background: var(--bg-card); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 8px; padding: 16px; margin-bottom: 14px; background-image: linear-gradient(135deg, rgba(245, 158, 11, 0.04) 0%, transparent 40%); }
.stance-block.inactive { border-left-color: var(--border); }
.stance-block h3 { color: var(--accent); font-size: 15px; margin-bottom: 4px; }
.stance-block .tagline { font-size: 12px; color: var(--text-dim); font-style: italic; margin-bottom: 10px; }
.stat-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.stat-pill { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px; font-size: 11px; color: var(--text-dim); }
.stat-pill strong { color: var(--accent); margin-right: 4px; }
.quote { background: rgba(245, 158, 11, 0.05); border-left: 3px solid var(--accent-dim); padding: 10px 14px; margin: 10px 0; font-style: italic; color: var(--text-dim); font-size: 13px; border-radius: 4px; }

/* ============ INVENTORY ============ */
.inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; margin-bottom: 14px; }
.item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
.item-name { font-weight: 600; color: var(--text); margin-bottom: 4px; font-size: 13px; }
.item-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

/* ============ BACKGROUND / NOTES ============ */
.bg-section { margin-bottom: 14px; }
.backstory-area { width: 100%; min-height: 200px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 6px; font-family: inherit; font-size: 13px; line-height: 1.6; resize: vertical; }
.notes-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 11px; color: var(--text-muted); }
.backstory-prose { font-size: 14px; line-height: 1.75; color: var(--text-dim); max-width: 72ch; }
.backstory-prose p { margin-bottom: 12px; }
.backstory-prose p:first-of-type::first-letter { color: var(--accent); font-size: 1.5em; font-weight: 700; }

/* ============ MODALS ============ */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; }
.modal-overlay.active { display: flex; }
.modal { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 10px; padding: 20px; max-width: 420px; width: 90%; }
.modal h2 { color: var(--accent); margin-bottom: 12px; font-size: 16px; }
.modal p { color: var(--text-dim); margin-bottom: 14px; font-size: 13px; }
.modal ul { list-style: none; padding: 0; margin-bottom: 14px; }
.modal li { padding: 4px 0; font-size: 12px; color: var(--text-dim); border-bottom: 1px dotted rgba(255,255,255,0.05); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
.btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.btn:hover { background: var(--bg-hover); }
.btn-primary { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }
.btn-primary:hover { background: var(--accent); color: var(--bg); }

/* ============ SPELL UPCAST + CAST BUTTONS ============ */
.spell-upcast { margin-top: 4px; padding: 6px 10px; background: rgba(96, 165, 250, 0.06); border-left: 3px solid var(--info); font-size: 12px; color: var(--text-dim); border-radius: 3px; line-height: 1.5; }
.spell-upcast strong { color: var(--info); margin-right: 4px; }
.cast-row { display: flex; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px dotted rgba(255,255,255,0.05); flex-wrap: wrap; align-items: center; }
.cast-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-right: 4px; }
.btn-cast { background: transparent; border: 1px solid var(--accent-dim); color: var(--accent); padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; letter-spacing: 0.3px; transition: all 0.15s; }
.btn-cast:hover:not(:disabled) { background: var(--accent-dim); color: var(--text); }
.btn-cast.base { background: var(--accent-dim); color: var(--text); }
.btn-cast.base:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
.btn-cast:disabled { opacity: 0.35; cursor: not-allowed; }

/* ============ LIGHTBOX ============ */
.lightbox-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
.lightbox-overlay.active { display: flex; }
.lightbox-overlay img { max-width: 100%; max-height: 100%; border-radius: 8px; }

/* ============ DRAG-DROP PORTRAIT TARGETS ============ */
[data-portrait-target] { position: relative; transition: box-shadow 0.15s, outline 0.15s; }
[data-portrait-target].drag-over { outline: 3px dashed var(--accent); outline-offset: 3px; box-shadow: 0 0 20px var(--accent-glow); }
[data-portrait-target].drag-over::after { content: "Drop to replace"; position: absolute; inset: 0; background: rgba(0,0,0,0.55); color: var(--accent); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; border-radius: inherit; text-align: center; padding: 4px; letter-spacing: 0.5px; pointer-events: none; z-index: 4; }
.portrait-replace-btn { background: rgba(0,0,0,0.72); color: var(--accent); border: 1px solid var(--accent-dim); border-radius: 4px; font-weight: 700; cursor: pointer; transition: opacity 0.15s, background 0.15s; letter-spacing: 0.3px; }
.portrait-replace-btn:hover { background: var(--accent-dim); color: var(--text); }
/* Thumbnail (top bar): tiny overlay at the corner, only visible on hover */
.char-thumbnail .portrait-replace-btn { position: absolute; bottom: -4px; right: -4px; padding: 2px 6px; font-size: 9px; text-transform: uppercase; opacity: 0; z-index: 5; }
.char-thumbnail:hover .portrait-replace-btn { opacity: 1; }
/* Overview: small centered button sitting directly below the portrait, inside the same float */
.overview-portrait-wrap { float: right; width: 420px; max-width: 50%; margin: 0 0 14px 20px; text-align: center; }
@media (max-width: 700px) { .overview-portrait-wrap { float: none; margin: 0 auto 14px; width: auto; max-width: 85%; } }
.overview-portrait-wrap .overview-portrait { width: 100%; max-width: 100%; margin: 0; float: none; display: block; }
.overview-portrait-wrap .portrait-replace-btn { position: static; display: inline-block; margin-top: 6px; padding: 3px 12px; font-size: 10px; text-transform: uppercase; opacity: 0.5; }
.overview-portrait-wrap:hover .portrait-replace-btn { opacity: 1; }

/* ============ TOAST ============ */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--bg-panel); border: 1px solid var(--accent-dim); color: var(--text); padding: 10px 16px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 3000; box-shadow: 0 4px 16px rgba(0,0,0,0.5); pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { border-color: var(--danger); }

/* ============ PLAY-STATE BAR ============ */
#play-state-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; padding: 10px 20px; background: linear-gradient(180deg, rgba(245,158,11,0.04) 0%, transparent 100%); border-bottom: 1px solid var(--border); font-size: 12px; }
.play-section { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.play-label { color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-size: 10px; font-weight: 700; }
.btn-xs { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); padding: 3px 8px; border-radius: 999px; font-size: 10px; cursor: pointer; font-weight: 600; }
.btn-xs:hover { border-color: var(--accent-dim); color: var(--text); }
.btn-xs.disabled, .btn-xs:disabled { opacity: 0.4; cursor: not-allowed; }

/* Conditions */
.conditions-list { display: flex; flex-wrap: wrap; gap: 4px; }
.condition-pill { background: rgba(168, 85, 247, 0.15); border: 1px solid rgba(168, 85, 247, 0.4); color: #c4b5fd; padding: 2px 4px 2px 9px; border-radius: 999px; display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; }
.condition-pill button { background: none; border: none; color: inherit; cursor: pointer; padding: 0 4px; font-size: 13px; line-height: 1; opacity: 0.7; }
.condition-pill button:hover { opacity: 1; }
.condition-pill em { font-style: italic; opacity: 0.85; font-weight: 400; margin-left: 2px; }
.conditions-list:empty::before { content: "— none —"; color: var(--text-muted); font-style: italic; font-size: 11px; }

/* Condition menu */
.condition-menu { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); padding: 6px; z-index: 2500; min-width: 220px; max-height: 70vh; overflow-y: auto; }
.condition-menu-header { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 6px 10px; font-weight: 700; }
.condition-option { padding: 6px 10px; font-size: 13px; cursor: pointer; border-radius: 4px; color: var(--text); }
.condition-option:hover { background: var(--bg-hover); color: var(--accent); }
.condition-option.selected { background: var(--accent-dim); color: var(--text); }
.condition-menu-divider { height: 1px; background: var(--border); margin: 4px 0; }
.condition-custom { display: flex; gap: 4px; padding: 6px 10px; }
.condition-custom input { flex: 1; background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; font-size: 12px; font-family: inherit; }
.condition-custom button { background: var(--accent-dim); border: 1px solid var(--accent); color: var(--text); padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }

/* Concentration */
.concentration-pill { background: rgba(34, 211, 238, 0.15); border: 1px solid rgba(34, 211, 238, 0.4); color: var(--concentration); padding: 2px 4px 2px 9px; border-radius: 999px; display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; }
.concentration-pill button { background: none; border: none; color: inherit; cursor: pointer; padding: 0 4px; font-size: 13px; line-height: 1; opacity: 0.7; }
.concentration-pill button:hover { opacity: 1; }
.card-conc-toggle { margin-top: 8px; padding-top: 6px; border-top: 1px dotted rgba(255,255,255,0.05); }
.card-conc-toggle .btn-xs.active { background: rgba(34, 211, 238, 0.15); border-color: var(--concentration); color: var(--concentration); }
.card.spell-card.is-concentrating { border-color: var(--concentration); box-shadow: 0 0 0 1px var(--concentration), 0 0 12px rgba(34, 211, 238, 0.12); }

/* Death saves */
.death-saves-section { padding: 2px 10px; background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; }
.ds-pips { display: inline-flex; gap: 4px; align-items: center; }
.ds-pip { width: 14px; height: 14px; border-radius: 50%; border: 2px solid; display: inline-block; cursor: pointer; box-sizing: border-box; transition: all 0.15s; }
.ds-pip.success { border-color: #22c55e; }
.ds-pip.success.used { background: #22c55e; }
.ds-pip.failure { border-color: var(--danger); }
.ds-pip.failure.used { background: var(--danger); }
.ds-pip:hover { transform: scale(1.1); }
.ds-sep { color: var(--text-muted); padding: 0 4px; }
.ds-status { font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.5px; }
.ds-status.stable { background: rgba(34, 197, 94, 0.15); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.4); }
.ds-status.dead   { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.5); }

/* Exhaustion */
.exhaustion-section .ex-stepper { display: inline-flex; align-items: center; gap: 4px; }
.ex-stepper button { width: 22px; height: 22px; background: var(--bg-hover); border: 1px solid var(--border); color: var(--text); border-radius: 4px; cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
.ex-stepper button:disabled { opacity: 0.3; cursor: not-allowed; }
.ex-value { font-weight: 700; min-width: 16px; text-align: center; color: var(--text); }
.ex-penalty { color: var(--text-dim); font-size: 11px; font-style: italic; }
.exhaustion-section.warn .ex-value { color: var(--warn); }
.exhaustion-section.warn .ex-penalty { color: var(--warn); }
.exhaustion-section.danger .ex-value,
.exhaustion-section.danger .ex-penalty { color: var(--danger); }
.exhaustion-section.critical { background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.4); border-radius: 8px; padding: 2px 10px; }
.exhaustion-section.critical .ex-value,
.exhaustion-section.critical .ex-penalty { color: var(--danger); font-weight: 700; }

</style>
</head>

<div id="app" class="hidden">
  <div class="top-bar">
    <div class="char-identity">
      <div class="char-thumbnail" id="char-thumbnail-wrap" data-portrait-target="thumbnail" title="Drag an image here to replace the thumbnail"></div>
      <div class="char-name-block">
        <div class="char-name" id="char-name"></div>
        <div class="sub" id="char-subtitle"></div>
      </div>
    </div>
    <div class="top-stats">
      <div class="stat-block hp-block">
        <div class="label">Hit Points</div>
        <div class="hp-display">
          <button class="btn-icon" onclick="adjustHP(-1)">&minus;</button>
          <input type="number" id="hp-current">
          <span class="sep">/</span>
          <span id="hp-max"></span>
          <button class="btn-icon" onclick="adjustHP(1)">+</button>
        </div>
        <div class="temp-hp">Temp: <input type="number" id="hp-temp"></div>
      </div>
      <div class="stat-block"><div class="label">AC</div><div class="value" id="ac-value"></div><div class="sub" id="ac-source"></div></div>
      <div class="stat-block"><div class="label">Initiative</div><div class="value" id="initiative-value"></div></div>
      <div class="inspiration-toggle" id="inspiration-toggle" onclick="toggleInspiration()" title="Inspiration">&starf;</div>
    </div>
    <div class="top-actions">
      <div class="rest-buttons">
        <button class="rest-btn short" onclick="openRest('short')">Short Rest</button>
        <button class="rest-btn long" onclick="openRest('long')">Long Rest</button>
      </div>
    </div>
  </div>
  <div id="advisory-banners"></div>
  <div id="play-state-bar" class="hidden"></div>
  <div class="main-layout">
    <aside>
      <div class="sidebar-panel"><h3>Ability Scores</h3><div class="ability-grid" id="ability-grid"></div></div>
      <div class="sidebar-panel"><h3>Combat</h3><div id="combat-stats"></div></div>
      <div class="sidebar-panel"><h3>Skills</h3><div id="skills-list"></div></div>
      <div class="sidebar-panel"><h3>Proficiencies</h3><div id="proficiencies-list"></div></div>
      <div class="sidebar-panel"><h3>Languages</h3><div id="languages-list"></div></div>
    </aside>
    <main class="main-content"><div class="tab-bar" id="tab-bar"></div><div id="tab-contents"></div></main>
  </div>
</div>
<div class="modal-overlay" id="rest-modal">
  <div class="modal">
    <h2 id="rest-title">Take a Rest?</h2>
    <p id="rest-desc"></p>
    <div id="rest-list"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeRest()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmRest()">Confirm</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="hit-die-modal">
  <div class="modal">
    <h2>Spend Hit Die</h2>
    <p id="hit-die-desc"></p>
    <div style="margin-bottom:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <label style="font-size:13px;color:var(--text-dim);">Rolled:</label>
      <input type="number" id="hit-die-roll" min="1" style="width:70px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:4px;font-size:14px;text-align:center;">
      <span id="hit-die-total" style="color:var(--accent);font-weight:700;"></span>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeHitDieModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmHitDieSpend()">Spend</button>
    </div>
  </div>
</div>
<div class="lightbox-overlay" id="lightbox" onclick="closeLightbox(event)">
  <img id="lightbox-img" alt="">
</div>

ice at creation — confirm source)"},{"language":"Common Sign Language","source":"DM grant"}],"skillBonuses":[{"skill":"Arcana","bonus":"=wisMod","source":"class:Druid (Primal Order: Magician)"},{"skill":"Nature","bonus":"=wisMod","source":"class:Druid (Primal Order: Magician)"}],"speeds":{"walk":30},"hp":{"hitDie":"d8","max":43},"ac":{"value":17,"source":"Studded leather (12 + DEX) + Shield (+2). 2024 Druid (Magician) is Light armor + Shields only."},"spellcasting":{"ability":"WIS","preparedLimit":9,"preparedLimitNote":"9 prepared spells + 4 Circle always-prepared. Swap on Long Rest."},"resources":[{"id":"spell.slots.1","display":"1st Level Spell Slots","max":4,"refresh":"longRest","poolType":"pips","pipClass":"slot"},{"id":"spell.slots.2","display":"2nd Level Spell Slots","max":3,"refresh":"longRest","poolType":"pips","pipClass":"slot"},{"id":"spell.slots.3","display":"3rd Level Spell Slots","max":2,"refresh":"longRest","poolType":"pips","pipClass":"slot"},{"id":"druid.wildShape","display":"Wild Shape / Selak Form","max":2,"refresh":"shortRest","poolType":"pips","note":"Bonus Action to activate. 1 hour duration. Gain 10 Temp HP on Selak entry."},{"id":"druid.wildResurgence","display":"Wild Resurgence","max":1,"refresh":"longRest","poolType":"pips","note":"When you use Wild Shape, regain one expended spell slot of 3rd level or lower."},{"id":"selak.waxingHour","display":"Waxing Hour","max":1,"refresh":"endOfCombat","poolType":"pips","note":"First Selak Form activation per combat at night is free. Does not work in magical darkness."},{"id":"cahaya.flickeringForm","display":"Flickering Form","max":3,"refresh":"longRest","poolType":"pips","note":"Cahaya reaction — add 1d8 to AC against an attack."},{"id":"druid.hitDice","display":"Hit Dice (d8)","max":"=druidLevel","refresh":"longRestHalf","poolType":"pips","hitDie":"d8","note":"Click a pip to spend on Short Rest: heals 1d8 + CON mod."},{"id":"wayfarer.luck","display":"Luck Points","max":"=pb","refresh":"longRest","poo ","id":"druid.wildCompanion","name":"Wild Companion","subtitle":"Druid 2","source":{"type":"class","name":"Druid","level":2},"categories":[],"text":"As a Magic action, expend a spell slot OR a Wild Shape use to cast Find Familiar without needing material components; the familiar is Fey (not Beast)."},{"kind":"action","id":"druid.wildResurgence","name":"Wild Resurgence","subtitle":"Druid 5 · two-way swap","source":{"type":"class","name":"Druid","level":5},"categories":["bonus","free","limited"],"actionType":"bonus","tags":["1/LR (slot-gain)"],"uses":{"consumes":{"resourceId":"druid.wildResurgence","amount":1}},"text":"2024 RAW two-way swap:  (a) When you have no Wild Shape uses left, Bonus Action to expend a spell slot and regain one Wild Shape use — once per turn, no daily cap.  (b) When you have no 1st-level spell slots left, expend a Wild Shape use (no action) on your turn to regain one 1st-level slot — once per Long Rest (this is what the pip tracks)."},{"kind":"feature","id":"subclass.selak.circleSpells","name":"Circle Spells","subtitle":"Subclass 3 · Always Prepared","source":{"type":"subclass","name":"Circle of the Selak","level":3},"categories":[],"tags":["Always Prepared"],"text":"Always prepared, don't count against your prepared limit: Hex (1st), Wither and Bloom (2nd), Blindness/Deafness (2nd), Phantasmal Force (2nd)."},{"kind":"feature","id":"subclass.selak.selakForm","name":"Selak Form","subtitle":"Subclass 3","source":{"type":"subclass","name":"Circle of the Selak","level":3},"categories":[],"text":"Instead of a normal Wild Shape, activate a Selak Form (Ekek, Cahaya, or Leyak). Bonus Action, costs 1 Wild Shape use. Gain 10 Temp HP. Duration = Wild Shape. Always-on while in form: Green Light, Nocturnal Predator, Selak Strikes."},{"kind":"feature","id":"subclass.selak.waxingHour","name":"Waxing Hour","subtitle":"Subclass 3","source":{"type":"subclass","name":"Circle of the Selak","level":3},"categories":[],"text":"First Selak activation per combat at night is free (no Wild Shape charge spent). Does not function in magical darkness."},{"kind":"feature","id":"species.human.resourceful","name":"Resourceful","source":{"type":"species","name":"Human","level":1},"categories":[],"text":"You gain Heroic Inspiration after each Long Rest."},{"kind":"feature","id":"species.human.skillful","name":"Skillful","source":{"type":"species","name":"Human","level":1},"categories":[],"text":"Proficiency in one skill of your choice: Survival."},{"kind":"feature","id":"species.human.versatile","name":"Versatile","source":{"type":"species","name":"Human","level":1},"categories":[],"text":"Gain an Origin feat: Magic Initiate: Wizard."},{"kind":"feature","id":"background.wayfarer","name":"Wayfarer","source":{"type":"background","name":"Wayfarer","level":1},"categories":[],"text":"Skill proficiencies: Insight, Stealth. Tool proficiency: Thieves' Tools. Ability boost: +2 WIS, +1 DEX. Origin feat: Lucky."},{"kind":"feature","id":"feat.lucky","name":"Lucky","subtitle":"Origin Feat (Wayfarer)","source":{"type":"feat","name":"Lucky","level":1},"categories":[],"text":"Luck Points equal to PB (3). Spend 1: Advantage on your own d20 Test; OR impose Disadvantage on an attack roll against you. Regain all on Long Rest."},{"kind":"feature","id":"feat.magicInitiateWizard","name":"Magic Initiate: Wizard","subtitle":"Origin Feat (Human Versatile)","source":{"type":"feat","name":"Magic Initiate: Wizard","level":1},"categories":[],"text":"Spellcasting ability: WIS. Cantrips: Mind Sliver, Toll the Dead. 1st-level spell: Shield — 1/LR free cast (can also be cast with a spell slot)."},{"kind":"feature","id":"feat.warCaster","name":"War Caster","subtitle":"Level 4 ASI","source":{"type":"feat","name":"War Caster","level":4},"categories":[],"text":"Advantage on Concentration CON saves. Perform somatic components while holding weapons or a shield. When a creature provokes an OA, cast a 1-action spell targeting only that creature instead of attacking."},{"kind":"action","id":"action.predatorsBite","name":"Predator's Bite","subtitle":"Ekek form · replaces one Attack-action attack","appliesWhen":{"selakForm":"ekek"},"source":{"type":"subclass","name":"Circle of the Selak","level":3},"categories":["action","attack"],"actionType":"action","attack":{"ability":"WIS","toHit":"+8","reach":"5 ft","type":"melee spell attack"},"damage":"2d6 + 5 Psychic","save":{"ability":"CON","dc":"=spellSaveDC","effect":"Poisoned until end of your next turn"},"text":"With Hex: +1d6 Necrotic per hit. (Note: Primal Strike is a L7 Elemental Fury option Galang doesn't have yet — bite does NOT count as magical.)"},{"kind":"action","id":"action.vampiricTongue","name":"Vampiric Tongue","subtitle":"Leyak form · replaces attack","appliesWhen":{"selakForm":"leyak"},"source":{"type":"subclass","name":"Circle of the Selak","level":3},"categories":["action","attack"],"actionType":"action","attack":{"ability":"WIS","toHit":"+8","reach":"15 ft","type":"melee spell attack"},"damage":"1d8 + 5 Necrotic","save":{"ability":"STR","dc":"=spellSaveDC","effect":"Grappled"},"text":"Heal 5 HP on hit. Pull target 10 ft. Counts as magical (Primal Strike)."},{"kind":"trait","id":"selak.constrictingFeed","name":"Constricting Feed","subtitle":"Leyak form · start of your turn","appliesWhen":{"selakForm":"leyak"},"source":{"type":"subclass","name":"Circle of the Selak","level":3},"categories":["free"],"passive":true,"text":"Creature Grappled by you takes 5 Necrotic. You heal 5 HP."},{"kind":"action","id":"action.ghostfireBolt","name":"Ghostfire Bolt","subtitle":"Cahaya form · 60 ft","appliesWhen":{"selakForm":"cahaya"},"source":{"type":"subclass","name":"Circle of the Selak","level":3},"categories":["bonus","attack"],"actionType":"bonus","attack":{"ability":"WIS","toHit":"+8","range":"60 ft","type":"ranged spell attack"},"damage":"1d10 + 5 Psychic","text":"Only while in Cahaya form."},{"kind":"action","id":"action.flickeringForm","name":"Flickering Form","subtitle":"Cahaya form · 3/LR","appliesWhen":{"selakForm":"cahaya"},"source":{"type":"subclass","name":"Circle of the Selak","level":3},"categories":["reaction","limited"],"actionType":"reaction","tags":["3/LR"],"uses":{"consumes":{"resourceId":"cahaya.flickeringForm","amount":1}},"text":"When attacked, add 1d8 to AC against that attack. 3 uses per Long Rest."},{"kind":"action","id":"action.auraOfDread","name":"Aura of Dread","subtitle":"Leyak form","appliesWhen":{"selakForm":"leyak"},"source":{"type":"subclass","name":"Circle of the Selak","level":3},"categories":["reaction"],"actionType":"reaction","save":{"ability":"WIS","dc":"=spellSaveDC","effect":"Frightened until end of its next turn"},"text":"When a creature within 30 ft (60 ft at night) makes an attack roll, force a WIS save or Frightened until end of its next turn."},{"kind":"trait","id":"selak.greenLight","name":"Green Light","subtitle":"while in Selak Form","source":{"type":"subclass","name":"Circle of the Selak","level":3},"categories":["free"],"passive":true,"text":"Dim light, 10-ft radius. Cannot be hidden by nonmagical means."},{"kind":"trait","id":"selak.nocturnalPredator","name":"Nocturnal Predator","subtitle":"Circle of the Selak · always-on (not Selak Form-gated, per v3-4)","source":{"type":"subclass","name":"Circle of the Selak","level":3},"categories":["free"],"passive":true,"text":"Always-on Circle feature. Darkvision 60 ft. Advantage on Dexterity (Stealth) checks in dim light or darkness. (Moved out of Selak Form block in v3-4 to resolve the Green Light conflict — Green Light would otherwise reveal you during stealth.)"},{"kind":"action","id":"weapon.quarterstaff","name":"Quarterstaff","subtitle":"versatile · druidic focus","categories":["action","attack"],"actionType":"action","itemRef":"inv.quarterstaff","attack":{"ability":"STR","toHit":"+4","reach":"5 ft"},"damage":"1d6 + 1 bludgeoning (1d8 + 1 two-handed)","properties":["Versatile"],"text":"With Shillelagh (not prepared): spell attack +8, 1d8 + 5 Force/Bludgeoning."},{"kind":"action","id":"weapon.unarmedStrike","name":"Unarmed Strike","categories":["action","attack"],"actionType":"action","attack":{"ability":"STR","toHit":"+4","reach":"5 ft"},"damage":"2 Bludgeoning, push 5 ft, or grapple","text":"Choose: damage, push 5 ft, or grapple (Athletics vs Athletics/Acrobatics)."},{"kind":"action","id":"universal.opportunityAttack","name":"Opportunity Attack","categories":["reaction"],"actionType":"reaction","text":"When a creature leaves your reach, make one melee attack against it."},{"kind":"action","id":"feat.warCasterOA","name":"War Caster OA — Cast a Spell","source":{"type":"feat","name":"War Caster","level":4},"categories":["reaction"],"actionType":"reaction","text":"Instead of an OA, cast a 1-action spell targeting only that creature. Good options: Thorn Whip (pull back), Toll the Dead, Mind Sliver."},{"kind":"action","id":"feat.lucky.disadvantage","name":"Lucky — Impose Disadvantage","subtitle":"Wayfarer feat · reactive","source":{"type":"feat","name":"Lucky","level":1},"categories":["reaction","limited"],"actionType":"reaction","tags":["1 Luck"],"uses":{"consumes":{"resourceId":"wayfarer.luck","amount":1}},"text":"Spend 1 Luck Point when a creature makes an attack roll against you: impose Disadvantage."},{"kind":"action","id":"feat.lucky.advantage","name":"Lucky — Advantage","subtitle":"Wayfarer feat · on your own d20 Test","source":{"type":"feat","name":"Lucky","level":1},"categories":["free","limited"],"actionType":"free","tags":["1 Luck"],"uses":{"consumes":{"resourceId":"wayfarer.luck","amount":1}},"text":"Spend 1 Luck Point on your own d20 Test to gain Advantage."},{"kind":"action","id":"spell.shield.freeCast","name":"Shield (free cast)","subtitle":"1/LR via Magic Initiate · Reaction","source":{"type":"feat","name":"Magic Initiate: Wizard","level":1},"categories":["reaction","limited"],"actionType":"reaction","tags":["1/LR"],"uses":{"consumes":{"resourceId":"magicInitiate.shield","amount":1}},"text":"Reaction when you're hit by an attack OR targeted by Magic Missile. +5 AC until the start of your next turn — can retroactively cause the triggering attack to miss. Also grants immunity to Magic Missile for the duration. Can alternately be cast with a 1st-level spell slot."},{"kind":"action","id":"action.callLightningRepeat","name":"Call Lightning — Repeat Strike","categories":["action"],"actionType":"action","text":"While Concentrating on Call Lightning, use an Action each turn to call another bolt: 3d10 Lightning (Dex save DC 16 half). +1d10 if outdoors in storm."},{"kind":"action","id":"action.moveMoonbeam","name":"Move Moonbeam","subtitle":"if prepared","categories":["action"],"actionType":"action","text":"Move the Moonbeam cylinder up to 60 ft. Shapechangers forced out must save or revert to true form."},{"kind":"spell","id":"spell.druidcraft","name":"Druidcraft","spellLevel":0,"school":"Transmutation","source":{"type":"class","name":"Druid (Primal Order)","level":1},"castingTime":"action","range":"30 ft","components":{"v":true,"s":true},"duration":"Instantaneous","categories":["action"],"actionType":"action","tags":["Cantrip"],"alwaysPrepared":true,"innate":false,"text":"Predict weather, bloom a flower, light/snuff a small flame, or create a harmless sensory effect."},{"kind":"spell","id":"spell.guidance","name":"Guidance","spellLevel":0,"school":"Divination","castingTime":"action","range":"Touch","components":{"v":true,"s":true},"duration":"Concentration, 1 min","concentration":true,"categories":["action"],"actionType":"action","tags":["Cantrip"],"text":"Choose one skill. For the duration, the target can add +1d4 to one ability check using that skill (one time) — before the roll."},{"kind":"spell","id":"spell.starryWisp","name":"Starry Wisp","spellLevel":0,"school":"Evocation","castingTime":"action","range":"60 ft","components":{"v":true,"s":true},"duration":"Instantaneous","categories":["action","attack"],"actionType":"action","tags":["Cantrip"],"attack":{"ability":"WIS","toHit":"=spellAttack","type":"ranged spell attack"},"damage":"2d8 Radiant","text":"On hit: 2d8 Radiant. Target sheds Dim Light 10 ft and can't benefit from Invisible until end of your next turn."},{"kind":"spell","id":"spell.thornWhip","name":"Thorn Whip","spellLevel":0,"school":"Transmutation","castingTime":"action","range":"30 ft","components":{"v":true,"s":true,"m":"stem of a plant with thorns"},"duration":"Instantaneous","categories":["action","attack"],"actionType":"action","tags":["Cantrip"],"attack":{"ability":"WIS","toHit":"=spellAttack","type":"melee spell attack"},"damage":"2d6 Piercing","text":"On hit: 2d6 Piercing. If Large or smaller, pull up to 10 ft closer. Combos with Spike Growth: pull them through the thorns."},{"kind":"spell","id":"spell.mindSliver","name":"Mind Sliver","spellLevel":0,"school":"Enchantment","source":{"type":"feat","name":"Magic Initiate: Wizard","level":1},"castingTime":"action","range":"60 ft","components":{"v":true},"duration":"Instantaneous","categories":["action"],"actionType":"action","tags":["Cantrip"],"save":{"ability":"INT","dc":"=spellSaveDC","effect":"2d6 Psychic and −1d4 to next save before end of your next turn"},"text":"On fail: 2d6 Psychic and −1d4 to next save before end of your next turn."},{"kind":"spell","id":"spell.tollTheDead","name":"Toll the Dead","spellLevel":0,"school":"Necromancy","source":{"type":"feat","name":"Magic Initiate: Wizard","level":1},"castingTime":"action","range":"60 ft","components":{"v":true,"s":true},"duration":"Instantaneous","categories":["action"],"actionType":"action","tags":["Cantrip"],"save":{"ability":"WIS","dc":"=spellSaveDC","effect":"2d8 Necrotic (2d12 if already damaged)"},"text":"On fail: 2d8 Necrotic (2d12 if already damaged)."},{"kind":"spell","id":"spell.hex","name":"Hex","spellLevel":1,"school":"Enchantment","source":{"type":"subclass","name":"Circle of the Selak — Circle Spell","level":3},"castingTime":"bonus","range":"90 ft","components":{"v":true,"s":true,"m":"eye of a newt"},"duration":"Concentration, 1 hr","concentration":true,"categories":["bonus"],"actionType":"bonus","tags":["Circle"],"alwaysPrepared":true,"upcast":"3rd–4th level: lasts 8 hours. 5th level+: lasts 24 hours (no concentration beyond 1 hour is standard — DM call).","text":"Curse a target: your hits deal +1d6 Necrotic. Target has Disadvantage on ability checks using chosen ability. Re-target as Bonus Action when target drops to 0. Default Concentration in Ekek form. Synergizes with Predator's Bite."},{"kind":"spell","id":"spell.witherAndBloom","name":"Wither and Bloom","spellLevel":2,"school":"Necromancy","source":{"type":"subclass","name":"Circle of the Selak — Circle Spell","level":3},"castingTime":"action","range":"60 ft","components":{"v":true,"s":true,"m":"a withered branch"},"duration":"Instantaneous","categories":["action"],"actionType":"action","tags":["Circle"],"alwaysPrepared":true,"save":{"ability":"CON","dc":"=spellSaveDC","effect":"2d6 Necrotic, half on success"},"upcast":"+1d6 Necrotic damage and +1 additional Hit Die recovered per slot level above 2nd.","text":"10-ft radius centred on a point you can see. One creature in the area (your choice) expends 1 Hit Die and regains HP equal to the die + your Wisdom modifier (+5)."},{"kind":"spell","id":"spell.blindnessDeafness","name":"Blindness/Deafness","spellLevel":2,"school":"Transmutation","source":{"type":"subclass","name":"Circle of the Selak — Circle Spell","level":3},"castingTime":"action","range":"30 ft","components":{"v":true},"duration":"1 min","categories":["action"],"actionType":"action","tags":["Circle"],"alwaysPrepared":true,"save":{"ability":"CON","dc":"=spellSaveDC","effect":"Blinded or Deafened (your choice) for 1 min"},"upcast":"Target +1 additional creature per slot level above 2nd.","text":"No Concentration — stack with Hex. Target saves at end of each turn."},{"kind":"spell","id":"spell.phantasmalForce","name":"Phantasmal Force","spellLevel":2,"school":"Illusion","source":{"type":"subclass","name":"Circle of the Selak — Circle Spell","level":3},"castingTime":"action","range":"60 ft","components":{"v":true,"s":true,"m":"bit of fleece"},"duration":"Concentration, 1 min","concentration":true,"categories":["action"],"actionType":"action","tags":["Circle"],"alwaysPrepared":true,"save":{"ability":"INT","dc":"=spellSaveDC","effect":"gripped by an illusion only it perceives"},"text":"If dangerous, illusion deals 2d8 Psychic on its turn."},{"kind":"spell","id":"spell.healingWord","name":"Healing Word","spellLevel":1,"school":"Evocation","castingTime":"bonus","range":"60 ft","components":{"v":true},"duration":"Instantaneous","categories":["bonus"],"actionType":"bonus","prepared":true,"upcast":"+2d4 healing per slot level above 1st.","text":"One creature regains 2d4 + 5 HP."},{"kind":"spell","id":"spell.cureWounds","name":"Cure Wounds","spellLevel":1,"school":"Abjuration","castingTime":"action","range":"Touch","components":{"v":true,"s":true},"duration":"Instantaneous","categories":["action"],"actionType":"action","prepared":true,"upcast":"+2d8 healing per slot level above 1st.","text":"Touched creature regains 2d8 + 5 HP."},{"kind":"spell","id":"spell.goodberry","name":"Goodberry","spellLevel":1,"school":"Conjuration","castingTime":"action","range":"Self","components":{"v":true,"s":true,"m":"sprig of mistletoe"},"duration":"24 hours","categories":["action"],"actionType":"action","prepared":true,"text":"Create 10 berries. Each restores 1 HP and feeds as a full meal. Lose potency after 24 hours."},{"kind":"spell","id":"spell.entangle","name":"Entangle","spellLevel":1,"school":"Conjuration","castingTime":"action","range":"90 ft","components":{"v":true,"s":true},"duration":"Concentration, 1 min","concentration":true,"categories":["action"],"actionType":"action","prepared":true,"save":{"ability":"STR","dc":"=spellSaveDC","effect":"Restrained"},"text":"20-ft square of grasping plants. Area is difficult terrain. Alt Concentration when Hex doesn't fit."},{"kind":"spell","id":"spell.shield","name":"Shield","subtitle":"Magic Initiate · 1/LR free + slot option · Reaction","spellLevel":1,"school":"Abjuration","source":{"type":"feat","name":"Magic Initiate: Wizard","level":1},"castingTime":"reaction","range":"Self","components":{"v":true,"s":true},"duration":"1 round (until the start of your next turn)","categories":["reaction"],"actionType":"reaction","alwaysPrepared":true,"text":"Trigger: you're hit by an attack roll OR targeted by the Magic Missile spell. Effect: +5 bonus to AC (including against the triggering attack, so it can retroactively miss) AND you have Immunity to Magic Missile damage — both last until the start of your next turn. Via Magic Initiate: cast 1/LR without a slot, or with a 1st-level spell slot."},{"kind":"spell","id":"spell.passWithoutTrace","name":"Pass Without Trace","spellLevel":2,"school":"Abjuration","castingTime":"action","range":"Self (30 ft)","components":{"v":true,"s":true,"m":"ashes from mistletoe burned in moonlight"},"duration":"Concentration, 1 hr","concentration":true,"categories":["action"],"actionType":"action","prepared":true,"text":"30-ft emanation centred on you. You and your allies inside the emanation each gain a +10 bonus to Stealth checks and can't be tracked except by magic. The emanation moves with you. (2024 change: it's an emanation, not a one-time 8-ally buff.) Stacks with Nocturnal Predator Advantage in darkness."},{"kind":"spell","id":"spell.spikeGrowth","name":"Spike Growth","spellLevel":2,"school":"Transmutation","castingTime":"action","range":"150 ft","components":{"v":true,"s":true,"m":"seven thorns"},"duration":"Concentration, 10 min","concentration":true,"categories":["action"],"actionType":"action","prepared":true,"text":"20-ft radius: difficult terrain. Each 5 ft of movement costs 2d4 Piercing. Combo: Thorn Whip pull them through."},{"kind":"spell","id":"spell.conjureAnimals","name":"Conjure Animals","spellLevel":3,"school":"Conjuration","castingTime":"action","range":"60 ft","components":{"v":true,"s":true},"duration":"Concentration, 1 hr","concentration":true,"categories":["action"],"actionType":"action","prepared":true,"save":{"ability":"DEX","dc":"=spellSaveDC","effect":"3d10 Slashing on fail, half on success"},"text":"Summon a spectral pack as a 20-ft emanation on you, moving with you at 30 ft. A creature takes 3d10 Slashing (DEX save, half on success) when (a) the pack enters a creature's space or the creature moves within 10 ft, (b) a creature starts its turn within 10 ft of the pack, OR (c) a creature ends its turn within 10 ft of the pack — once per creature per turn. Allies within 5 ft of the pack have Advantage on Strength saving throws."},{"kind":"spell","id":"spell.dispelMagic","name":"Dispel Magic","spellLevel":3,"school":"Abjuration","castingTime":"action","range":"120 ft","components":{"v":true,"s":true},"duration":"Instantaneous","categories":["action"],"actionType":"action","prepared":true,"upcast":"Auto-ends any spell/effect whose level is ≤ the slot you used (so 4th-level slot auto-dispels up to 4th-level effects).","text":"Choose one creature, object, or magical effect. Each spell of level ≤ your slot on the target ends automatically. For each spell of higher level, make a spellcasting ability check (+8) vs DC 10 + that spell's level; on success that spell ends."},{"kind":"spell","id":"spell.callLightning","name":"Call Lightning","spellLevel":3,"school":"Conjuration","castingTime":"action","range":"120 ft","components":{"v":true,"s":true},"duration":"Concentration, 10 min","concentration":true,"categories":["action"],"actionType":"action","prepared":true,"save":{"ability":"DEX","dc":"=spellSaveDC","effect":"3d10 Lightning on fail, half on success"},"upcast":"+1d10 Lightning damage per slot level above 3rd.","text":"Summon a storm cloud (60-ft cylinder, 10 ft tall) visible 100 ft overhead. On cast and again each subsequent turn as a Magic action, choose a point you can see under the cloud: 5-ft-radius 40-ft-tall cylinder. Creatures in that cylinder make a DEX save DC 16 — 3d10 Lightning on fail, half on success. +1d10 if you cast outdoors during a storm."},{"kind":"spell","id":"spell.findFamiliar","name":"Find Familiar","subtitle":"via Wild Companion","spellLevel":1,"school":"Conjuration","castingTime":"1 hour (ritual)","range":"10 ft","components":{"v":true,"s":true,"m":"charcoal, incense, herbs"},"duration":"Until dispel","ritual":true,"categories":["action"],"actionType":"action","tags":["Wild Companion"],"alwaysPrepared":true,"text":"Summon a Fey familiar in beast shape. Help action, pocket sense sharing, scout, deliver touch spells. Via Wild Companion: uses 1 Wild Shape charge and no material components."}],"spellsSwapCandidates":[{"name":"Moonbeam","reason":"anti-shapechanger"},{"name":"Faerie Fire","reason":"reveals invisible + advantage"},{"name":"Heat Metal","reason":"anti-armor"},{"name":"Plant Growth","reason":"urban control"}],"inventory":[{"id":"inv.studdedLeather","name":"Studded Leather Armor","quantity":1,"equipped":true,"description":"AC 12 + DEX = 15. Light armor (no Stealth disadvantage). Replaces Scale Mail — 2024 Druid (Magician) is Light armor + Shields only."},{"id":"inv.woodenShield","name":"Wooden Shield","quantity":1,"equipped":true,"description":"+2 AC (total AC 17). Retained in Ekek form via Fortified Form."},{"id":"inv.quarterstaff","name":"Quarterstaff","quantity":1,"equipped":true,"description":"1d6 / 1d8 bludgeoning (versatile). Serves as druidic focus. Shillelagh target if prepared."},{"id":"inv.sickle","name":"Sickle","quantity":1,"description":"1d4 slashing, light. Druid starting kit (Option A)."},{"id":"inv.daggers","name":"Daggers","quantity":2,"description":"1d4 piercing, finesse, light, thrown (20/60). Wayfarer background."},{"id":"inv.druidicFocus","name":"Druidic Focus","quantity":1,"description":"Quarterstaff or separate totem/talisman. Required as focus for V/S/M Druid spells."},{"id":"inv.thievesTools","name":"Thieves' Tools","quantity":1,"description":"Wayfarer background. Proficient."},{"id":"inv.gamingSet","name":"Gaming Set","quantity":1,"description":"Wayfarer background. Pick a specific game (dice, cards, etc.)."},{"id":"inv.bedroll","name":"Bedroll","quantity":1,"description":"Wayfarer background."},{"id":"inv.pouches","name":"Pouches","quantity":2,"description":"Wayfarer background."},{"id":"inv.travelersClothes","name":"Traveler's Clothes","quantity":1,"description":"Wayfarer background."},{"id":"inv.herbalismKit","name":"Herbalism Kit","quantity":1,"description":"DM grant (not a starting item — 2024 Druid class does not grant this). Not proficient with it unless the DM rules otherwise."},{"id":"inv.gold","name":"25 GP","quantity":1,"description":"Starting funds (Wayfarer default 16 GP or 50 GP alt — audit settled on 25 after accounting for purchases)."}],"wishlist":[{"name":"Half plate","description":"AC 17 + shield = 19 is a strong upgrade but imposes Stealth disadvantage — works against Nocturnal Predator's Advantage in darkness. Scale mail preserves the night-stalker fantasy."}],"narrative":{"knownAs":{"chant":"The name means 'bright' — his mother's last act of hope before the dark closed in.","chantNote":null},"flavorLine":"A Rangda-trained practitioner of ilmu selak who walked away — carrying the dark arts, hunted by his past, trying to remember how to use the light.","flavorNote":null,"personalityTraits":["Quiet and watchful. Speaks carefully. Listens more than he talks.","Uncomfortable with trust — both giving and receiving it. Kindness from strangers makes him wary, not grateful.","Has a dry, dark sense of humor that surfaces unexpectedly, usually at the worst possible moment.","Physically restless at night. Sleeps badly. Walks the perimeter of any camp. The selak transformation sits closer to the surface after dark."],"ideals":["Redemption. The powers are what they are. What matters is the hand that holds them. He can't undo Tanjung Luar, but he can make the next choice different.","Self-determination. No one else gets to decide what he becomes. Not his family, not the Rangda, not the darkness inside him."],"bonds":["Wira. A fisherman's son from Tanjung Luar, now living with a curse Galang's family put on him. Galang doesn't know if Wira is still alive.","His grandmother. Sent away for trying to teach him the sentulak counter-arts. Somewhere in the Islands of Suria, possibly.","His mother's name. He doesn't say it out loud. The name Galang was her last gift, and he carries it like a lantern he can't bring himself to light."],"flaws":["He still flinches from the word \"monster.\" It lands too close to something he's afraid might be true.","He is better at the dark arts than the light, and he knows it, and the ease of it frightens him.","He runs. When things get complicated — emotionally, socially — his first instinct is to leave."],"physicalDescription":"Lean, weathered, early twenties. Angular face, high cheekbones, broken-and-healed crooked nose. Watchful dark eyes under a heavy brow. Thick black hair roughly self-cut past his ears. Scarred hands and forearms — ritual work, not combat. A deliberate scar along his left collarbone he doesn't talk about. Dresses plainly: sun-faded cotton shirt, wrapped sarong over trousers, scale mail when armored, dull and unornamented. At night or in dim light, a faint greenish phosphorescence on his forehead — subtle in torchlight, unmistakable in true darkness.","overviewSummary":"Galang means 'bright' — a name his mother gave him the year she died. Raised in a Rangda-aligned family of ilmu selak practitioners, taught the transforming art from age eight, until at eighteen he walked away after a family 'message' to a neighboring village left his only friend cursed. He has been on the road for three years, piecing together the sentulak counter-arts from fragments his grandmother once tried to teach him. He is better at the dark arts than the light, and it frightens him. He arrived in Ruman a few weeks ago.","backstoryFull":"His mother named him Galang — \"bright,\" \"illuminate\" — and his father said nothing against it, which was the closest thing to tenderness anyone in the family ever offered. She was dead within the year, taken by a fever that the village healer would not touch because the village healer would not come to their house. No one came to their house unless they had to.\n\nThe family had a reputation. In the villages scattered across the Islands of Suria, where the rice paddies run right up to the edge of the jungle and the nights are so dark you can lose your hand in front of your face, people knew the name. They didn't speak it after dark.\n\nWhen Galang was born, the orang pintar who attended the birth held him for a long time. Too long. His father told the story later as a point of pride: how the seer's hands had trembled, how she had looked at the family and said nothing, which said everything. The child had ilmu. Strong ilmu. The kind that runs in bloodlines and deepens with each generation.\n\nHis father sent word to the Rangda Tribe that same week. The family had been Rangda for as long as anyone could remember — loyal practitioners who believed in what the Rangda stood for: freedom, the right of those with ilmu to live without the Barong Court's rules. It was a good philosophy, in the abstract. Galang's family took it further than the abstract. They called themselves practitioners of ilmu selak — the transforming art.\n\nHe participated. That is the part he cannot escape, no matter how far he walks.\n\nAs a child, he thought it was normal. Every family had its secrets, its rituals, its things-done-after-dark. He learned to draw the circles, the chants that tasted like copper on his tongue. He held still while the green light crept across his forehead for the first time — eight years old, shaking, feeling his spine reshape itself into something that wanted to crouch, to hunt, to feed — and his father's hand on his shoulder, steady, proud.\n\nThe discomfort came on gradually. He was fifteen when he first refused an assignment. His father beat him, and he went the next time, but the refusal had happened, and it sat inside him like a seed. By seventeen, the seed had roots. His father stopped answering his questions. His uncle stopped speaking to him entirely. Every night the green light came easier and the thing inside him that was not human grew more comfortable in his skin — and every morning he liked himself a little less.\n\nHis name was Wira. A fisherman's son from Tanjung Luar, a three-hour walk through the paddies from the family compound. They'd met as boys. Wira had no ilmu. For years, Wira was the only person in Galang's life who looked at him and saw a person rather than a practitioner.\n\nTanjung Luar's elders made a mistake — accepted a visit from a Barong Court envoy, declined publicly to ally. The Rangda cell decided a message needed to be sent. Galang's father volunteered the family. He brought Galang.\n\nWhat happened took less than an hour. Green light in the paddies. Shapes moving between the houses. No one was supposed to die. When Wira ran out and collided with Galang in the dark — close enough to see the green light and the human eyes still inside the thing — one of the cousins lashed out. Wira didn't die. What the selak curse did to him was worse: a lingering affliction that settled into his body like rot into wood.\n\nGalang packed a bag that night. He walked out through the rice paddies while the frogs screamed in the ditches. He did not look back. He has not been back.\n\nHe has been walking for three years. He has tried to learn the counter-arts — the sentulak, the \"returning\" — from fragments his grandmother once muttered about before his father silenced her. She knew the ilmu putih, the white knowledge; she tried to teach him quietly, in the gaps between his father's lessons, and was moved to a relative's house on another island when his father found out.\n\nHe arrived in Ruman a few weeks ago. The town is polite enough not to ask questions. He has heard the whispers: something dark moving in the towns and villages, refugees arriving with curses on their skin. The kind of infestation that smells, to Galang, uncomfortably like home.\n\nHe does not want to be a hero. He does not trust himself to be one. But he has dark powers and a debt he cannot name, and the screaming has started again in the nearby villages, and he is done walking away from it.","dmHooks":"Wira's fate — alive? Curse progressed? Could Galang hear news?  The grandmother, somewhere in the Islands of Suria, knows the sentulak tradition properly (possible quest tied to L6 feature Sentulak — The Returning). The family / Rangda cell — involved in the dark magic around Ruman, or coincidence? The green light — anyone from the selak tradition can recognize it on his forehead. Barong Court interest — a Rangda-trained practitioner who left voluntarily and wants to do good would be very interesting to them."},"tabs":[{"id":"overview","title":"Overview"},{"id":"actions","title":"Actions"},{"id":"spells","title":"Spells"},{"id":"resources","title":"Resources"},{"id":"selak","title":"Selak Forms","custom":true},{"id":"features","title":"Features"},{"id":"inventory","title":"Inventory"},{"id":"background","title":"Background"},{"id":"backstory","title":"Backstory"}],"customTabs":{"selak":{"title":"Selak Forms","type":"selak-forms","intro":"Activate: Bonus Action, costs 1 Wild Shape use · Duration: 1 hour · Temp HP on entry: 10 · Ends early if you dismiss, are Incapacitated, or Wild Shape again.","forms":[{"id":"ekek","name":"Ekek — The Prowler","subtitle":"(Go-To)","marker":"★","colorClass":"ekek","tagline":"Melee striker. Keeps armor + shield. Poisoning bite.","statPills":[{"label":"AC","value":18},{"label":"Temp HP","value":10},{"label":"Fortified Form","value":"keeps armor/shield"}],"body":["Predator's Bite — replaces one attack in Attack action. Melee spell attack +8, 2d6 + 5 Psychic. Target: DC 16 CON or Poisoned until end of your next turn.","Retained Grip — (v3-4 aspect ribbon; see homebrew doc for exact wording)","With Hex running: avg 15.5 damage per hit."]},{"id":"cahaya","name":"Cahaya — The Ghostlight","colorClass":"cahaya","tagline":"Ranged skirmisher. Phases through creatures. Defensive Reaction.","statPills":[{"label":"AC","value":"16 (no shield)"},{"label":"Temp HP","value":10}],"body":["Ghostfire Bolt (Bonus Action) — ranged spell attack +8, 60 ft, 1d10 + 5 Psychic.","Spectral Drift — move through creatures (difficult terrain). Shunted + 1d10 Force if you end inside one.","Flickering Form (Reaction, 3/LR) — add 1d8 to AC against an attack."]},{"id":"leyak","name":"Leyak — The Dread","colorClass":"leyak","tagline":"Controller. Floating head. Vampiric tongue with grapple. Fear aura.","statPills":[{"label":"AC","value":16},{"label":"Speed","value":"30 ft hover"},{"label":"Temp HP","value":10},{"label":"Terrain","value":"ignores difficult"}],"body":["Vampiric Tongue — replaces one attack. Melee spell attack +8, 15 ft reach, 1d8 + 5 Necrotic. Heal 5. Pull 10 ft. DC 16 STR or Grappled.","Constricting Feed (passive) — start of your turn, grappled target takes 5 Necrotic, you heal 5.","Aura of Dread (Reaction) — enemy within 30 ft (60 ft at night) attacks → DC 16 WIS or Frightened.","Floating Horror — 30 ft hover speed, ignores difficult terrain."]}],"shared":{"title":"Always Active in Selak Form","body":["Green Light — Dim light 10-ft radius. Cannot be hidden by nonmagical means.","Nocturnal Predator — (moved out of Selak Form in v3-4; now an always-on Circle feature instead — Darkvision 60 ft + Advantage on Stealth in dim light/darkness.)"]},"footer":{"title":"Waxing Hour (Night Benefit)","body":["First Selak Form activation in a combat at night (sunset–sunrise, or natural darkness like a deep cave) does not cost a Wild Shape use. Does not work in magical darkness."]}}}};

// ============ HELPERS ============
function esc(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmt(n) { return n >= 0 ? "+" + n : "" + n; }
function abilityMod(score) { return Math.floor((score - 10) / 2); }
function renderText(text) {
  if (!text) return "";
  return String(text).split(/\n\n+/).map(p => `<p>${esc(p).replace(/\n/g,"<br>")}</p>`).join("");
}

// ============ TOKEN RESOLUTION ============
function resolveToken(tok) {
  if (!derived) return null;
  for (const k of ABILITY_KEYS) {
    if (tok === "=" + k.toLowerCase())         return derived.abilities[k].total;
    if (tok === "=" + k.toLowerCase() + "Mod") return derived.abilities[k].mod;
  }
  if (tok === "=pb")           return derived.pb;
  if (tok === "=level")        return derived.totalLevel;
  if (tok === "=walkingSpeed") return derived.walkingSpeed;
  if (tok === "=monkDC")       return derived.monkDC;
  if (tok === "=spellSaveDC")  return derived.spellSaveDC;
  if (tok === "=spellAttack")  return derived.spellAttack != null ? fmt(derived.spellAttack) : null;
  const m = tok.match(/^=(\w+?)Level$/);
  if (m) {
    const name = m[1].toLowerCase();
    const cls = (character.classes || []).find(c => c.name.toLowerCase() === name);
    return cls ? cls.level : 0;
  }
  console.warn("Unknown token:", tok);
  return null;
}
function resolveValue(v) {
  if (typeof v === "string" && v.startsWith("=")) return resolveToken(v);
  return v;
}

// ============ DERIVATION ============
function derive() {
  const abilities = {};
  for (const k of ABILITY_KEYS) {
    const base = (character.abilities && character.abilities[k]) ?? 10;
    const bumps = (character.abilityBumps || []).filter(b => b.ability === k);
    const total = base + bumps.reduce((s, b) => s + (b.bonus || 0), 0);
    abilities[k] = { base, total, mod: abilityMod(total), bumps };
  }
  const totalLevel = (character.classes || []).reduce((s, c) => s + (c.level || 0), 0);
  const pb = PB_BY_LEVEL[totalLevel] || 2;
  const classLevels = {};
  for (const c of character.classes || []) classLevels[c.name.toLowerCase()] = c.level;
  const monkLevel = classLevels["monk"] || 0;

  let walkingSpeed = (character.speeds && character.speeds.walk) || 30;
  const hasTrait = (id) => (character.abilities_list || []).some(a => a.id === id);
  if (hasTrait("monk.unarmoredMovement") && monkLevel >= 2) walkingSpeed += 10;

  let ac, acSource;
  if (character.ac?.value != null) {
    ac = character.ac.value;
    acSource = character.ac.source || "";
  } else if (hasTrait("monk.unarmoredDefense")) {
    ac = 10 + abilities.DEX.mod + abilities.WIS.mod;
    acSource = "Unarmored Defense (DEX + WIS)";
  } else {
    ac = 10 + abilities.DEX.mod;
    acSource = "10 + DEX";
  }

  const monkDC = monkLevel > 0 ? (8 + pb + abilities.WIS.mod) : null;
  let spellSaveDC = null, spellAttack = null;
  if (character.spellcasting?.ability) {
    const mod = abilities[character.spellcasting.ability].mod;
    spellSaveDC = 8 + pb + mod;
    spellAttack = pb + mod;
  }

  const initiative = abilities.DEX.mod;
  const saveProfs = (character.proficiencies && character.proficiencies.saves) || [];
  const saves = {};
  for (const k of ABILITY_KEYS) {
    const prof = saveProfs.includes(k);
    saves[k] = { mod: abilities[k].mod + (prof ? pb : 0), proficient: prof };
  }
  const skillProfs = (character.proficiencies && character.proficiencies.skills) || [];
  const extraBonuses = character.skillBonuses || [];
  const resolveInline = (v) => {
    if (typeof v === "number") return v;
    if (typeof v !== "string" || !v.startsWith("=")) return 0;
    const m = v.match(/^=(str|dex|con|int|wis|cha)Mod$/i);
    if (m) return abilities[m[1].toUpperCase()].mod;
    if (v === "=pb") return pb;
    return 0;
  };
  const skills = {};
  for (const [name, abil] of Object.entries(SKILLS_TABLE)) {
    const profEntry = skillProfs.find(s => s.skill === name);
    const mod = abilities[abil].mod;
    const extras = extraBonuses.filter(b => b.skill === name).map(b => ({ amount: resolveInline(b.bonus), source: b.source, raw: b.bonus }));
    const extraTotal = extras.reduce((s, e) => s + e.amount, 0);
    const bonus = mod + (profEntry ? pb : 0) + extraTotal;
    skills[name] = { ability: abil, mod, proficient: !!profEntry, bonus, source: profEntry?.source, extras };
  }
  return { abilities, totalLevel, pb, classLevels, walkingSpeed, ac, acSource, monkDC, spellSaveDC, spellAttack, initiative, saves, skills };
}

// ============ RUNTIME STATE ============
function storageKey() { return character.storageKey || "charsheet_default"; }
function defaultRuntime() {
  const rt = {
    hp: { current: character.hp?.max ?? 10, temp: 0 },
    inspiration: false, resources: {}, userNotes: "",
    advisoryDismissed: {}, activeTab: (character.tabs || [{id:"overview"}])[0].id,
    activeFilters: {},
    // play-state
    conditions: [],
    concentration: null,
    deathSaves: { successes: 0, failures: 0 },
    exhaustion: 0
  };
  for (const res of character.resources || []) {
    const max = resolveValue(res.max);
    if (res.poolType === "pips")   rt.resources[res.id] = new Array(max).fill(false);
    else if (res.poolType === "hpPool") rt.resources[res.id] = max;
  }
  return rt;
}
function loadRuntime() {
  const d = defaultRuntime();
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(storageKey()) || "null"); } catch(e) {}
  if (!saved) return d;
  const merged = {
    hp: { current: saved.hp?.current ?? d.hp.current, temp: saved.hp?.temp ?? 0 },
    inspiration: !!saved.inspiration,
    resources: { ...d.resources },
    userNotes: saved.userNotes || "",
    advisoryDismissed: saved.advisoryDismissed || {},
    activeTab: saved.activeTab || d.activeTab,
    activeFilters: saved.activeFilters || {},
    conditions: Array.isArray(saved.conditions) ? saved.conditions : [],
    concentration: saved.concentration || null,
    deathSaves: {
      successes: Math.max(0, Math.min(3, saved.deathSaves?.successes || 0)),
      failures:  Math.max(0, Math.min(3, saved.deathSaves?.failures  || 0))
    },
    exhaustion: Math.max(0, Math.min(6, typeof saved.exhaustion === "number" ? saved.exhaustion : 0))
  };
  if (merged.hp.current > character.hp.max) merged.hp.current = character.hp.max;
  if (merged.hp.current < 0) merged.hp.current = 0;
  for (const res of character.resources || []) {
    const max = resolveValue(res.max);
    const savedVal = saved.resources?.[res.id];
    if (res.poolType === "pips") {
      if (Array.isArray(savedVal)) merged.resources[res.id] = new Array(max).fill(false).map((_, i) => savedVal[i] === true);
      else merged.resources[res.id] = new Array(max).fill(false);
    } else if (res.poolType === "hpPool") {
      merged.resources[res.id] = Math.min(max, typeof savedVal === "number" ? savedVal : max);
    }
  }
  return merged;
}
function saveRuntime() { try { localStorage.setItem(storageKey(), JSON.stringify(runtime)); } catch(e) {} }

function renderTabBody(tab) {

    if (custom?.type === "selak-forms") return renderSelakForms(custom);
    return `<p>[Unknown custom tab type: ${esc(custom?.type || "none")}]</p>`;
  }
  switch (tab.id) {
    case "overview":   return renderOverviewTab();
    case "actions":    return renderActionsTab();
    case "spells":     return renderSpellsTab();
    case "features":   return renderFeaturesTab();
    case "resources":  return renderResourcesTab();

    case "background": return renderBackgroundTab();
