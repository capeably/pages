<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pages</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 600px;
      margin: 80px auto;
      padding: 0 24px;
      color: #222;
    }
    h1 { font-size: 2rem; margin-bottom: 0.25em; }
    p { color: #666; margin-top: 0; }
    ul { padding: 0; list-style: none; margin-top: 2em; }
    li { margin: 0.75em 0; }
    a {
      color: #0070f3;
      text-decoration: none;
      font-size: 1.1rem;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Pages</h1>
  <p>A collection of random HTML pages.</p>
  <ul>
    <li><a href="hello.html">Hello World</a></li>
  </ul>
</body>
</html>
